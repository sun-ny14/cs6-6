<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-6 용사 본부</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --purple: #9b59b6; --bg: #ecf0f1; }
        
        /* 전체 글씨 크기 대폭 확대 */
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 60px; font-size: 1.2rem; }
        h1 { font-size: 2.5rem; }
        h2 { font-size: 2rem; }
        h3 { font-size: 1.6rem; }

        #loading-screen { display: flex; justify-content: center; align-items: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); color: white; z-index: 3000; font-size: 1.8rem; }
        #login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--dark); padding: 20px; }
        .login-box { background: white; padding: 50px 40px; border-radius: 30px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 450px; }
        #main-app { display: none; }
        
        /* 탭 메뉴 글씨 확대 */
        .tab-menu { display: flex; background: var(--dark); position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .tab-menu button { flex: 1; min-width: 90px; padding: 20px 10px; border: none; background: none; color: #95a5a6; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .tab-menu button.active { color: white; border-bottom: 5px solid var(--gold); }
        
        .tab-content { display: none; padding: 20px; max-width: 1200px; margin: auto; }
        .tab-content.active { display: block; }
        
        /* 카드 및 리스트 글씨 확대 */
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; gap: 15px; font-size: 1.2rem; }
        
        /* 입력창 큼직하게 수정 */
        input, button, textarea, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; font-size: 1.2rem; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }

        /* 점수 입력칸(팝업용) 특별 확대 */
        .pop-score-input { width: 80px !important; height: 60px !important; font-size: 1.5rem !important; text-align: center; border: 2px solid var(--primary) !important; }

        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 20px; }
        .hero-card { background: white; border-radius: 20px; padding: 25px 15px; text-align: center; box-shadow: 0 6px 15px rgba(0,0,0,0.1); border: 3px solid transparent; position: relative; cursor: pointer; }
        .hero-card.me { border-color: var(--gold); background: #fffdf2; transform: scale(1.03); }
        .card-no { position: absolute; top: 10px; left: 15px; font-size: 1rem; color: #999; font-weight: bold; }
        .card-avatar { font-size: 4rem; margin-bottom: 10px; display: block; }
        .card-lv { font-size: 1rem; background: var(--dark); color: white; padding: 4px 12px; border-radius: 15px; font-weight: bold; }
        .card-name { font-size: 1.4rem; font-weight: bold; margin: 10px 0; }
        .card-pt { font-size: 1.2rem; color: var(--primary); font-weight: bold; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .popup-box { background: white; padding: 30px; border-radius: 25px; width: 95%; max-width: 650px; text-align: center; max-height: 90vh; overflow-y: auto; }
        
        .pixel-avatar { width: 64px; height: 64px; background-image: url('avatars.png'); background-repeat: no-repeat; background-size: 384px 64px; display: inline-block; image-rendering: pixelated; vertical-align: middle; }
        .avatar-lv1 { background-position: 0px 0px; }
        .avatar-lv5 { background-position: -64px 0px; }
        .avatar-lv10 { background-position: -128px 0px; }
        .avatar-lv15 { background-position: -192px 0px; }
        .avatar-lv20 { background-position: -256px 0px; }
        .avatar-lv30 { background-position: -320px 0px; }
        
        .floating-btn { position: fixed; bottom: 25px; right: 25px; width: 80px; height: 80px; border-radius: 40px; background: var(--gold); color: var(--dark); box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 999; font-size: 2rem; display: none; align-items: center; justify-content: center; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="loading-screen">🏰 용사 본부 접속 중...</div>
    <div id="common-overlay" class="overlay"><div class="popup-box"><h2 id="pop-title">알림</h2><div id="pop-content" style="margin-bottom: 20px; white-space: pre-wrap; font-size: 1.3rem; text-align: left;">내용</div><button onclick="closePopup()" style="background:var(--green); font-size: 1.4rem; padding: 15px;">확인</button></div></div>
    <div id="point-popup" class="overlay"><div class="popup-box"><h2 id="point-pop-title">포인트 전령</h2><div id="point-pop-body"></div><div style="display:flex; gap:15px; margin-top:25px;"><button onclick="closePointPopup()" style="background:#95a5a6; font-size: 1.3rem;">닫기</button><button id="point-apply-btn" style="background:var(--gold); color:var(--dark); font-size: 1.3rem;">전체 반영하기</button></div></div></div>
    
    <div id="login-screen"><div class="login-box"><h1>🏰<br>6-6 용사 본부</h1><button onclick="handleLogin()" style="background:#4285F4; font-size: 1.4rem; padding: 20px;">Google 로그인</button></div></div>

    <div id="main-app">
        <nav class="tab-menu">
            <button id="btn-main" onclick="showTab('main')">🤺 용사들</button>
            <button id="btn-shop" onclick="showTab('shop')">🛍️ 상점</button>
            <button id="btn-guide" style="display:none;" onclick="showTab('guide')">📜 도감</button>
            <button id="btn-checkin" onclick="showTab('checkin')">⚔️ 등교</button>
            <button id="btn-logs" style="display:none;" onclick="showTab('logs')">📅 등교로그</button>
            <button id="btn-points" onclick="showTab('points')">💰 연대기</button>
            <button id="btn-admin" style="display:none;" onclick="showTab('admin')">🛡️ 관리</button>
        </nav>
        
        <section id="tab-main" class="tab-content active"><div id="hero-grid" class="hero-grid"></div></section>
        <section id="tab-shop" class="tab-content">
            <div id="admin-shop-mgr" class="card" style="display:none; border:3px solid var(--purple);">
                <h3>📦 물품 등록</h3>
                <select id="item-cat-in"><option value="🍕 먹거리">🍕 먹거리</option><option value="🎫 쿠폰">🎫 쿠폰</option><option value="🎲 뽑기">🎲 뽑기</option><option value="✏️ 학용품">✏️ 학용품</option><option value="✨ 기타">✨ 기타</option></select>
                <input type="text" id="item-name-in" placeholder="상품명"><input type="number" id="item-price-in" placeholder="가격 (P)"><button onclick="addItem()" style="background:var(--purple);">진열</button>
            </div>
            <div class="card"><h2>🛍️ 용사 보급소</h2><div id="shop-list"></div></div>
            <div id="admin-order-mgr" class="card" style="display:none; border:3px solid var(--red);"><h3>📜 사용 요청 목록</h3><div id="order-list"></div></div>
        </section>
        <section id="tab-guide" class="tab-content">
            <div id="admin-guide-mgr" class="card" style="display:none; border:3px solid var(--primary);"><h3>📋 사유 등록</h3><input type="text" id="guide-title" placeholder="항목"><input type="number" id="guide-p" placeholder="포인트 P"><input type="number" id="guide-e" placeholder="경험치 E"><button onclick="addGuide()">도감 등록</button></div>
            <div class="card"><h2>📜 포인트 도감</h2><div id="guide-list" class="hero-grid"></div></div>
        </section>
        <section id="tab-checkin" class="tab-content"><div class="card"><h2>⚔️ 등교 확인</h2><div id="checkin-guide" style="margin-bottom:15px; font-weight:bold; font-size: 1.4rem;"></div><input type="text" id="checkin-pass" placeholder="오늘의 암호" style="text-align: center; font-size: 1.5rem;"><button onclick="submitCheckIn()" style="padding:25px; font-size:1.6rem;">본부 소환!</button></div></section>
        <section id="tab-logs" class="tab-content"><div class="card"><h2>📅 등교 기록부</h2><div id="checkin-history"></div></div></section>
        <section id="tab-points" class="tab-content"><div id="my-inventory" class="card"><h3>🎁 나의 인벤토리</h3><div id="my-coupon-list"></div></div><div class="card"><h3>📜 포인트 연대기</h3><div id="point-history-list"></div></div></section>
        <section id="tab-admin" class="tab-content">
            <div class="card"><h3>👥 명단 관리</h3><div id="student-admin-list"></div></div>
            <div class="card"><h3>⚙️ 시스템 설정</h3>암호:<input type="text" id="conf-pass"> 지각:<input type="time" id="conf-late"> 마감:<input type="time" id="conf-close"> 루틴:<textarea id="conf-routine" rows="5"></textarea><button onclick="saveSettings()">저장</button></div>
            <div class="card"><h3>🎁 레벨업 보상</h3><textarea id="conf-gifts" rows="5"></textarea><button onclick="saveGifts()">저장</button></div>
            <div class="card"><h3>🆕 학생 일괄 등록</h3><textarea id="bulk-in" placeholder="이름,이메일" rows="3"></textarea><button onclick="bulkReg()">주입</button></div>
        </section>

        <button id="floating-point-btn" class="floating-btn" onclick="openPointBulkPopup()">⚖️</button>
        <button id="floating-score-btn" class="floating-btn" style="right: 120px;" onclick="openScorePopup()">🎯</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDWdWrw8LJ6tSiyF1X5tENJEvBfY-DzSw0",
            authDomain: "cs6-6class.firebaseapp.com",
            databaseURL: "https://cs6-6class-default-rtdb.firebaseio.com/", 
            projectId: "cs6-6class",
            storageBucket: "cs6-6class.firebasestorage.app",
            messagingSenderId: "644235499537",
            appId: "1:644235499537:web:2ede2611f4ec6a3e8179b0"
        };
        const adminEmail = "ksosuny@cberi.go.kr";
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        let myName = "", isAdmin = false, routineItems = [], currentUsers = [], allLogs = [], rIdx = 0;
        const urlParams = new URLSearchParams(window.location.search);
        const isShopMode = urlParams.get('mode') === 'shopkeeper';
        let currentTab = sessionStorage.getItem('activeTab') || 'main';

        function getAvatar(lv) {
            let lvClass = lv >= 30 ? "avatar-lv30" : lv >= 20 ? "avatar-lv20" : lv >= 15 ? "avatar-lv15" : lv >= 10 ? "avatar-lv10" : lv >= 5 ? "avatar-lv5" : "avatar-lv1";
            return `<div class="pixel-avatar ${lvClass}"></div>`;
        }

        auth.onAuthStateChanged((user) => {
            const loading = document.getElementById('loading-screen');
            if (user) {
                isAdmin = (user.email.toLowerCase() === adminEmail.toLowerCase());
                const eKey = user.email.replace(/\./g, ',');
                db.ref('userEmails/' + eKey).once('value', snap => {
                    if (snap.exists() || isAdmin) {
                        myName = snap.val() || "총사령관";
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('main-app').style.display = 'block';
                        if(isAdmin) {
                            ['floating-point-btn', 'floating-score-btn', 'btn-guide', 'btn-logs', 'btn-admin'].forEach(id => {
                                const el = document.getElementById(id);
                                if(el) el.style.display = id.includes('btn') ? 'block' : 'flex';
                            });
                        }
                        startApp();
                        showTab(currentTab);
                        if (loading) loading.style.display = 'none';
                    } else { alert("미등록 계정!"); auth.signOut(); }
                });
            } else {
                if (loading) loading.style.display = 'none';
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            }
        });

        function handleLogin() { auth.signInWithPopup(provider).catch(e => alert("로그인 오류: " + e.message)); }

        function showTab(t) {
            currentTab = t; sessionStorage.setItem('activeTab', t);
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-menu button').forEach(b => b.classList.remove('active'));
            if(document.getElementById('tab-'+t)) document.getElementById('tab-'+t).classList.add('active');
            if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.add('active');
        }

        function startApp() {
            // 연대기 로그 먼저 불러오기 (학생 클릭 시 바로 뜨도록)
            db.ref('pointLogs').on('value', snap => {
                allLogs = []; snap.forEach(c => allLogs.push(c.val()));
                renderHistory();
            });

            if (isAdmin) { ['admin-shop-mgr', 'admin-order-mgr', 'admin-guide-mgr'].forEach(id => document.getElementById(id).style.display = 'block'); }

            db.ref('settings').on('value', snap => {
                const s = snap.val() || {};
                document.getElementById('conf-pass').value = s.password || "";
                document.getElementById('conf-late').value = s.lateTime || "08:40";
                document.getElementById('conf-close').value = s.closeTime || "09:00";
                document.getElementById('conf-routine').value = s.routineText || "";
                document.getElementById('conf-gifts').value = (s.giftList || []).join('\n');
                routineItems = (s.routineText || "").split('\n').filter(t => t.trim() !== "");
                document.getElementById('checkin-guide').innerText = `✅ 정상: ~${s.lateTime} | ⚠️ 지각: ~${s.closeTime}`;
            });

            db.ref('users').on('value', snap => {
                let users = [];
                snap.forEach(c => { let u = c.val(); if(u){ u.name = u.name || c.key; users.push(u); }});
                users.sort((a, b) => (parseInt(a.no) || 999) - (parseInt(b.no) || 999));
                currentUsers = users;
                let gH = "", aH = "";
                users.forEach(u => {
                    gH += `<div class="hero-card ${u.name===myName?'me':''}" onclick="openUserHistory('${u.name}')"><span class="card-no">${u.no||''}</span><span class="card-lv">LV.${u.lv||1}</span><span class="card-avatar">${getAvatar(u.lv||1)}</span><div class="card-name">${u.name}</div><div class="card-pt">${u.points||0}P</div></div>`;
                    aH += `<div class="list-item"><input type="number" data-name="${u.name}" class="edit-no" value="${u.no||''}" style="width:100px;"><input type="text" data-name="${u.name}" class="edit-name" value="${u.name}"><button onclick="updateHeroInfo('${u.name}')" style="width:auto;">저장</button><button onclick="deleteHero('${u.name}', '${u.email}')" style="background:var(--red); width:auto;">삭제</button></div>`;
                });
                document.getElementById('hero-grid').innerHTML = gH;
                document.getElementById('student-admin-list').innerHTML = aH;
            });

            db.ref('orders').on('value', snap => {
                let cH = "", oH = "";
                snap.forEach(c => {
                    const o = c.val();
                    if(o.user === myName && o.status === '대기') cH += `<div class="coupon-card"><span>${o.item}</span><button class="btn-use" onclick="requestUseCoupon('${c.key}', '${o.item}')">사용하기</button></div>`;
                    if((isAdmin || isShopMode) && o.status === '사용요청') oH += `<div class="list-item" style="background:#fff0f0; border:2px solid var(--red);"><span><strong>${o.user}</strong>: ${o.item} (사용요청!)</span><button onclick="approveOrder('${c.key}')" style="background:var(--green); width:auto;">승인</button></div>`;
                });
                document.getElementById('my-coupon-list').innerHTML = cH || "보유 중인 쿠폰이 없습니다.";
                if(isAdmin || isShopMode) document.getElementById('order-list').innerHTML = oH || "사용 요청이 없습니다.";
            });

            db.ref('checkinLogs').limitToLast(50).on('value', snap => {
                let hH = ""; let logs = []; snap.forEach(c => logs.push(c.val()));
                logs.reverse().forEach(l => {
                    const color = l.result.includes('정상') ? 'var(--green)' : 'var(--red)';
                    hH += `<div class="list-item"><span><strong>${l.name}</strong></span><span style="color:${color}">${l.result}</span><small style="color:#888;">${l.time}</small></div>`;
                });
                document.getElementById('checkin-history').innerHTML = hH || "기록 없음";
            });

            db.ref('shop').on('value', snap => {
                let items = []; snap.forEach(c => { let i = c.val(); i.key = c.key; items.push(i); });
                items.sort((a,b) => (a.category||"").localeCompare(b.category||""));
                let sH = "", currentCat = "";
                items.forEach(i => {
                    if(i.category !== currentCat) { currentCat = i.category || "기타"; sH += `<div style="background:var(--purple); color:white; padding:8px; border-radius:10px; margin-top:15px; font-size:1rem; font-weight:bold;">${currentCat}</div>`; }
                    sH += `<div class="list-item"><span>${i.name} (<strong>${i.price}P</strong>)</span><div style="display:flex; gap:10px;"><button onclick="buyItem('${i.key}', '${i.name}', ${i.price})" style="width:auto; padding:10px 20px;">구매</button>${isAdmin ? `<button onclick="db.ref('shop/${i.key}').remove()" style="background:red; width:auto;">삭제</button>`:''}</div></div>`;
                });
                document.getElementById('shop-list').innerHTML = sH || "비어있음";
            });

            db.ref('guides').on('value', snap => {
                let gH = ""; snap.forEach(c => { const g = c.val(); gH += `<div class="hero-card" onclick="applyGuide('${g.title}', ${g.p}, ${g.e})"><strong>${g.title}</strong><br><small>${g.p}P / ${g.e}E</small></div>`; });
                document.getElementById('guide-list').innerHTML = gH || "항목 없음";
            });
        }

        function renderHistory() {
            let html = ""; [...allLogs].reverse().forEach(l => {
                if (isAdmin || l.name === myName) {
                    const color = l.amount > 0 ? "var(--green)" : (l.amount < 0 ? "var(--red)" : "#888");
                    html += `<div class="list-item" style="border-left:8px solid ${color}"><strong>${l.name}</strong> <span style="color:${color}; font-weight:bold;">${l.amount>0?'+':''}${l.amount}P</span><br><small>${l.reason} (${l.time})</small></div>`;
                }
            });
            document.getElementById('point-history-list').innerHTML = html || "기록이 없습니다.";
        }

        function openUserHistory(userName) {
            let userLogs = allLogs.filter(l => l.name === userName).reverse();
            let html = `<div style="text-align:left; font-size:1.1rem;">`;
            if(userLogs.length === 0) html += "<p>기록이 없습니다.</p>";
            userLogs.forEach(l => {
                const color = l.amount > 0 ? "var(--green)" : (l.amount < 0 ? "var(--red)" : "#888");
                html += `<div class="list-item" style="border-left:8px solid ${color}; margin-bottom:10px;">
                    <span>${l.reason}</span><strong style="color:${color}">${l.amount>0?'+':''}${l.amount}P</strong><br><small>${l.time}</small>
                </div>`;
            });
            html += `</div>`;
            openPopup(`${userName} 용사의 연대기`, html);
        }

        function requestUseCoupon(key, itemName) { if(confirm(`'${itemName}' 쿠폰을 지금 사용하시겠습니까?`)) db.ref('orders/'+key).update({status:'사용요청', useTime:new Date().toLocaleString()}).then(()=>alert("사용 요청 완료! 상점 친구에게 보여주세요.")); }
        function approveOrder(id) { if(confirm("사용 승인하시겠습니까?")) db.ref('orders/'+id).update({status:'완료'}); }
        function buyItem(k, n, p) { db.ref('users/'+myName).once('value', sn => { if((sn.val().points||0) < p) return alert("P가 부족하여 구매할 수 없습니다!"); if(confirm(`'${n}'을(를) ${p}P에 구매할까요?`)) { updatePoint(myName, -p, n+" 구매"); db.ref('orders').push({user:myName, item:n, status:'대기', time:new Date().toLocaleString()}); } }); }
        function updatePoint(n, a, r) { db.ref('users/'+n).once('value', sn => { if(sn.val()) db.ref('users/'+n).update({points: (sn.val().points||0)+a}); db.ref('pointLogs').push({name:n, amount:a, reason:r, time:new Date().toLocaleString()}); }); }
        function addScore(name, p, e, reason) { db.ref('users/'+name).once('value', sn => { const u = sn.val(); if(!u) return; let nE=(u.exp||0)+e, nL=(u.lv||1), nP=(u.points||0)+p; while(nE>=100){ nL++; nE-=100; } db.ref('users/'+name).update({exp:nE, lv:nL, points:nP}); db.ref('pointLogs').push({name, amount:p, reason, time:new Date().toLocaleString()}); }); }
        
        function submitCheckIn() {
            const pw = document.getElementById('checkin-pass').value;
            db.ref('settings').once('value', snap => {
                const s = snap.val(); if(pw !== s.password) return alert("암호가 틀렸습니다!");
                const now = new Date(); const curT = now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');
                if(curT > s.closeTime) return alert("등교 본부 소환이 마감되었습니다!");
                let msg = "✨ 등교 성공!", penalty = 0, res = "정상 등교";
                if(curT > s.lateTime) { const [lh, lm] = s.lateTime.split(':').map(Number); const diff = (now.getHours()*60+now.getMinutes())-(lh*60+lm); penalty = -diff; res = `지각(${diff}분)`; msg = `⚠️ 지각! ${penalty}P 차감`; }
                updatePoint(myName, penalty, res);
                db.ref('checkinLogs').push({ name: myName, result: res, time: now.toLocaleTimeString('ko-KR') });
                rIdx = 0; if(routineItems.length > 0) openPopup(msg, `[루틴 대기중]\n1단계: ${routineItems[0]}`, true); else openPopup("🎊 완료", msg);
                document.getElementById('checkin-pass').value = "";
            });
        }

        function updateHeroInfo(oldN) {
            const list = document.querySelectorAll('#student-admin-list .list-item');
            let nNo = "", nN = "";
            list.forEach(i => { const inp = i.querySelector('.edit-name'); if(inp.dataset.name === oldN) { nNo = i.querySelector('.edit-no').value; nN = inp.value; } });
            db.ref('users/'+oldN).once('value', sn => { let d = sn.val(); d.no = nNo; d.name = nN; db.ref('users/'+nN).set(d).then(() => { if(oldN!==nN) { db.ref('users/'+oldN).remove(); db.ref('userEmails').once('value', es => { es.forEach(e => { if(e.val()===oldN) db.ref('userEmails/'+e.key).set(nN); }); }); } alert("정보가 수정되었습니다!"); }); });
        }
        function deleteHero(n, e) { if(confirm(`${n} 용사를 삭제할까요?`)) { db.ref('users/'+n).remove(); if(e) db.ref('userEmails/'+e.replace(/\./g,',')).remove(); } }
        function saveSettings() { db.ref('settings').update({password: document.getElementById('conf-pass').value, lateTime: document.getElementById('conf-late').value, closeTime: document.getElementById('conf-close').value, routineText: document.getElementById('conf-routine').value}).then(()=>alert("시스템 설정 저장 완료!")); }
        function saveGifts() { db.ref('settings').update({giftList: document.getElementById('conf-gifts').value.split('\n')}).then(()=>alert("레벨업 보상 저장 완료!")); }
        
        function openPopup(t, c, isR=false) { document.getElementById('pop-title').innerText=t; document.getElementById('pop-content').innerHTML=c; document.getElementById('common-overlay').style.display='flex'; window.routineActive=isR; }
        function closePopup() { if(window.routineActive) { rIdx++; if(rIdx < routineItems.length) document.getElementById('pop-content').innerText = `다음 루틴: ${routineItems[rIdx]}`; else document.getElementById('common-overlay').style.display = 'none'; } else document.getElementById('common-overlay').style.display = 'none'; }
        
        function openPointBulkPopup() {
            let html = `<input type="text" id="pop-bulk-reason" placeholder="사유 입력 (예: 청소 우수)" style="font-size:1.3rem;"><div style="max-height:400px; overflow-y:auto; margin-top:15px;">`;
            currentUsers.forEach(u => { html += `<div class="list-item"><span>${u.no}. <strong>${u.name}</strong></span><div>P <input type="number" class="pop-bulk-p pop-score-input" data-name="${u.name}"> E <input type="number" class="pop-bulk-e pop-score-input" data-name="${u.name}"></div></div>`; });
            html += `</div>`; document.getElementById('point-pop-title').innerText = "⚖️ 일괄 점수 지급"; document.getElementById('point-pop-body').innerHTML = html;
            document.getElementById('point-apply-btn').onclick = () => {
                const r = document.getElementById('pop-bulk-reason').value; if(!r) return alert("사유를 입력하세요!");
                document.querySelectorAll('.pop-bulk-p').forEach((pI, i) => { const p=parseInt(pI.value)||0, e=parseInt(document.querySelectorAll('.pop-bulk-e')[i].value)||0; if(p||e) addScore(pI.dataset.name, p, e, r); });
                alert("반영되었습니다!"); closePointPopup();
            };
            document.getElementById('point-popup').style.display = 'flex';
        }
        function openScorePopup() {
            let html = `<div style="max-height:500px; overflow-y:auto;">`;
            currentUsers.forEach(u => { html += `<div class="list-item"><span>${u.no}. <strong>${u.name}</strong></span><div>P <input type="number" class="pop-one-p pop-score-input"> E <input type="number" class="pop-one-e pop-score-input"><button onclick="applyOneS('${u.name}', ${currentUsers.indexOf(u)})" style="width:auto; padding:10px 20px; margin-left:10px;">OK</button></div></div>`; });
            html += `</div>`; document.getElementById('point-pop-title').innerText = "🎯 개별 점수 지급"; document.getElementById('point-pop-body').innerHTML = html;
            document.getElementById('point-apply-btn').style.display = 'none'; document.getElementById('point-popup').style.display = 'flex';
        }
        function applyOneS(n, idx) { const p=parseInt(document.querySelectorAll('.pop-one-p')[idx].value)||0, e=parseInt(document.querySelectorAll('.pop-one-e')[idx].value)||0; addScore(n, p, e, "개별 지급"); alert(n+" 용사 반영 완료!"); }
        function closePointPopup() { document.getElementById('point-popup').style.display = 'none'; document.getElementById('point-apply-btn').style.display = 'block'; }
        function addGuide() { const t=document.getElementById('guide-title').value, p=parseInt(document.getElementById('guide-p').value)||0, e=parseInt(document.getElementById('guide-e').value)||0; if(t) db.ref('guides').push({title:t, p, e}).then(()=>alert("등록 완료!")); }
        function addItem() { const c=document.getElementById('item-cat-in').value, n=document.getElementById('item-name-in').value, p=parseInt(document.getElementById('item-price-in').value); if(n&&p) db.ref('shop').push({category:c, name:n, price:p}).then(()=>alert("진열 완료!")); }
        function applyGuide(t, p, e) { if(isAdmin && confirm(`전체 용사에게 [${t}] 항목을 적용할까요?`)) currentUsers.forEach(u => addScore(u.name, p, e, t)); }
        function bulkReg() { document.getElementById('bulk-in').value.split('\n').forEach(l => { const [n, e] = l.split(',').map(s=>s.trim()); if(n&&e) { db.ref('userEmails/'+e.replace(/\./g,',')).set(n); db.ref('users/'+n).update({name:n, email:e, points:0, exp:0, lv:1, no:""}); } }); alert("일괄 등록 완료!"); }
    </script>
</body>
</html>
