<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-6 용사 본부</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --purple: #9b59b6; --bg: #ecf0f1; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 60px; font-size: 1.4rem; }
        input, button, textarea, select { width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; border: 2px solid #ccc; box-sizing: border-box; font-size: 1.4rem; }
        #loading-screen { display: flex; justify-content: center; align-items: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); color: white; z-index: 3000; font-size: 1.8rem; }
        #login-screen { display: none; justify-content: center; align-items: center; min-height: 100vh; background: var(--dark); padding: 20px; }
        .login-box { background: white; padding: 50px 40px; border-radius: 30px; text-align: center; width: 100%; max-width: 450px; }
        #main-app { display: none; }
        .tab-menu { display: flex; background: var(--dark); position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .tab-menu button { flex: 1; min-width: 95px; padding: 20px 10px; border: none; background: none; color: #95a5a6; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .tab-menu button.active { color: white; border-bottom: 5px solid var(--gold); }
        .tab-content { display: none; padding: 20px; max-width: 1200px; margin: auto; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #eee; gap: 10px; font-size: 1.3rem; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 20px; margin-top: 20px; }
        .hero-card { background: white; border-radius: 20px; padding: 25px 15px; text-align: center; box-shadow: 0 6px 15px rgba(0,0,0,0.1); border: 3px solid transparent; cursor: pointer; }
        .hero-card.me { border-color: var(--gold); background: #fffdf2; transform: scale(1.03); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .popup-box { background: white; padding: 20px; border-radius: 25px; width: 95%; max-width: 700px; display: flex; flex-direction: column; max-height: 95vh; }
        #pop-close-btn { order: -1; margin-bottom: 15px; background: var(--green); color: white; border: none; border-radius: 15px; padding: 15px; font-size: 1.4rem; font-weight: bold; }
        #pop-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-right: 5px; border-top: 1px solid #eee; }
        .floating-btn { position: fixed; bottom: 25px; width: 85px; height: 85px; border-radius: 45px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 999; font-size: 2.2rem; display: none; align-items: center; justify-content: center; border: none; cursor: pointer; }
        #floating-point-btn { right: 25px; background: var(--gold); color: var(--dark); }
        #floating-multi-btn { right: 120px; background: #2ecc71; color: white; }
        .pixel-avatar { width: 64px; height: 64px; background: url('avatars.png') no-repeat; background-size: 384px 64px; display: inline-block; image-rendering: pixelated; vertical-align: middle; }
    </style>
</head>
<body>
    <div id="loading-screen">🏰 용사 본부 접속 중...</div>
    <div id="common-overlay" class="overlay"><div class="popup-box"><h2 id="pop-title" style="margin:0; text-align:center;">알림</h2><div id="pop-content"></div><button onclick="closePopup()" id="pop-close-btn">확인(닫기)</button></div></div>
    
    <div id="point-popup" class="overlay"><div class="popup-box"><h2 id="point-pop-title" style="margin-top:0; text-align:center;">⚖️ 포인트 전령</h2><div id="point-pop-body" style="overflow-y:auto; flex:1;"></div><div style="display:flex; gap:15px; margin-top:20px;"><button onclick="closePointPopup()" style="background:#95a5a6; color:white; border:none; border-radius:15px; flex:1; padding:15px;">닫기</button><button id="point-apply-btn" style="background:var(--gold); font-weight:bold; border:none; border-radius:15px; flex:1; padding:15px;">반영하기</button></div></div></div>

    <div id="multi-popup" class="overlay">
        <div class="popup-box">
            <h2 style="text-align:center; margin-top:0;">📋 일괄 지급</h2>
            <div style="background:#f8f9fa; padding:15px; border-radius:15px; margin-bottom:15px;">
                <input type="text" id="multi-reason" placeholder="사유">
                <div style="display:flex; gap:10px;"><input type="number" id="multi-p" placeholder="P"><input type="number" id="multi-e" placeholder="E"></div>
                <div style="display:flex; justify-content:space-between; margin-top:10px;"><button onclick="checkAllMulti(true)" style="width:48%; background:var(--dark); color:white; padding:10px;">전체 선택</button><button onclick="checkAllMulti(false)" style="width:48%; background:#95a5a6; color:white; padding:10px;">해제</button></div>
            </div>
            <div id="multi-list" style="flex:1; overflow-y:auto; border:1px solid #ddd; border-radius:10px; padding:5px;"></div>
            <div style="display:flex; gap:10px; margin-top:20px;"><button onclick="closeMultiPopup()" style="background:#95a5a6; color:white; border:none; border-radius:15px; flex:1; padding:18px;">취소</button><button onclick="applyMultiScores()" style="background:var(--gold); font-weight:bold; border:none; border-radius:15px; flex:1; padding:18px;">지급 완료</button></div>
        </div>
    </div>

    <div id="login-screen"><div class="login-box"><h1>🏰 6-6 본부</h1><button onclick="handleLogin()" style="background:#4285F4; color:white; border:none; border-radius:15px; padding:20px;">Google 로그인</button></div></div>

    <div id="main-app">
        <nav class="tab-menu">
            <button id="btn-main" onclick="showTab('main')">🤺 용사들</button>
            <button id="btn-shop" onclick="showTab('shop')">🛍️ 상점</button>
            <button id="btn-guide" style="display:none;" onclick="showTab('guide')">📜 도감</button>
            <button id="btn-checkin" onclick="showTab('checkin')">⚔️ 등교</button>
            <button id="btn-logs" style="display:none;" onclick="showTab('logs')">📅 등교로그</button>
            <button id="btn-points" onclick="showTab('points')">💰 연대기</button>
            <button id="btn-admin" style="display:none;" onclick="showTab('admin')">🛡️ 관리</button>
        </nav>

        <section id="tab-main" class="tab-content active"><div id="hero-grid" class="hero-grid"></div></section>
        
        <section id="tab-shop" class="tab-content">
            <div id="admin-shop-mgr" class="card" style="display:none; border:3px solid var(--purple);">
                <h3>📦 물품 등록</h3>
                <select id="item-cat-in"><option value="🍕 먹거리">🍕 먹거리</option><option value="🎫 쿠폰">🎫 쿠폰</option><option value="🎲 뽑기">🎲 뽑기</option><option value="✏️ 학용품">✏️ 학용품</option><option value="✨ 기타">✨ 기타</option></select>
                <input type="text" id="item-name-in" placeholder="상품명"><input type="number" id="item-price-in" placeholder="가격(P)"><input type="number" id="item-limit-in" placeholder="인당 제한(0:무제한)">
                <button onclick="addItem()" style="background:var(--purple); color:white; border:none; border-radius:12px;">진열</button>
            </div>
            <div class="card"><h2>🛍️ 용사 보급소</h2><div id="shop-list"></div></div>
            <div id="admin-order-mgr" class="card" style="display:none; border:2px solid var(--red);"><h3>📜 사용 요청 승인</h3><div id="order-list"></div></div>
        </section>

        <section id="tab-guide" class="tab-content">
            <div id="admin-guide-mgr" class="card" style="display:none;"><input type="text" id="guide-title" placeholder="항목"><input type="number" id="guide-p" placeholder="P"><input type="number" id="guide-e" placeholder="E"><button onclick="addGuide()" style="background:var(--primary); color:white; border:none; border-radius:12px;">등록</button></div>
            <div class="card"><h2>📜 포인트 도감</h2><div id="guide-list" class="hero-grid"></div></div>
        </section>

        <section id="tab-checkin" class="tab-content"><div class="card"><h2>⚔️ 등교 확인</h2><div id="checkin-guide" style="font-weight:bold; margin-bottom:15px; color:var(--dark);"></div><input type="text" id="checkin-pass" placeholder="오늘의 암호" style="text-align:center;"><button onclick="submitCheckIn()" style="background:var(--primary); color:white; border:none; border-radius:15px; padding:20px;">본부 소환!</button></div></section>
        
        <section id="tab-logs" class="tab-content"><div class="card"><h2>📅 등교 기록부</h2><div style="margin-bottom:15px; display:flex; align-items:center; gap:10px;"><span style="font-weight:bold;">날짜 선택:</span><input type="date" id="checkin-date-filter" style="flex:1; padding:10px;"></div><div id="checkin-history" style="width:100%;"></div></div></section>

        <section id="tab-points" class="tab-content">
            <div id="my-inventory" class="card">
                <h3>🎁 나의 인벤토리</h3>
                <div id="inv-unused" class="inv-section"><h4>📦 미사용 보관함</h4><div class="list"></div></div>
                <div id="inv-waiting" class="inv-section"><h4>⏳ 사용 대기중</h4><div class="list"></div></div>
            </div>
            <div class="card"><h3>📜 포인트 연대기</h3><div id="point-history-list"></div></div>
        </section>

        <section id="tab-admin" class="tab-content">
            <div class="card"><h3>👥 명단 관리 (번호/도우미)</h3><div id="student-admin-list"></div></div>
            <div class="card"><h3>⚙️ 시스템 설정</h3>암호:<input type="text" id="conf-pass"> 지각:<input type="time" id="conf-late"> 마감:<input type="time" id="conf-close"> 
                루틴:<textarea id="conf-routine" rows="4"></textarea><button onclick="saveSettings()">시스템 저장</button></div>
            <div class="card"><h3>🎁 레벨업 보상</h3>보상목록:<textarea id="conf-gifts" rows="4"></textarea><button onclick="saveGifts()">보상 저장</button></div>
            <div class="card"><h3>🆕 학생 일괄 등록</h3><textarea id="bulk-in" rows="3" placeholder="이름,이메일"></textarea><button onclick="bulkReg()">주입</button></div>
        </section>
        <button id="floating-point-btn" class="floating-btn" onclick="openPointBulkPopup()">⚖️</button>
        <button id="floating-multi-btn" class="floating-btn" onclick="openMultiPopup()">📋</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDWdWrw8LJ6tSiyF1X5tENJEvBfY-DzSw0", authDomain: "cs6-6class.firebaseapp.com", databaseURL: "https://cs6-6class-default-rtdb.firebaseio.com/", projectId: "cs6-6class", storageBucket: "cs6-6class.firebasestorage.app", messagingSenderId: "644235499537", appId: "1:644235499537:web:2ede2611f4ec6a3e8179b0" };
        const adminEmail = "ksosuny@cberi.go.kr"; 
        firebase.initializeApp(firebaseConfig); 
        const db = firebase.database(); 
        const auth = firebase.auth(); 
        const provider = new firebase.auth.GoogleAuthProvider();

        let myName = "", isAdmin = false, isHelper = false, currentUsers = [], routineItems = [], giftList = [], rIdx = 0;
        let currentTab = sessionStorage.getItem('activeTab') || 'main';

        function getTodayKST() { const now = new Date(); const krTime = new Date(now.getTime() + (9 * 60 * 60 * 1000)); return krTime.getUTCFullYear() + "-" + String(krTime.getUTCMonth() + 1).padStart(2, '0') + "-" + String(krTime.getUTCDate()).padStart(2, '0'); }
        function forceScreenDisplay(status) {
            const load = document.getElementById('loading-screen'), login = document.getElementById('login-screen'), app = document.getElementById('main-app');
            if(load) load.style.display = 'none';
            if(status === 'app') { if(login) login.style.display = 'none'; if(app) app.style.display = 'block'; }
            else { if(login) login.style.display = 'flex'; if(app) app.style.display = 'none'; }
        }
function getAvatar(lv) {
    // DiceBear의 오픈 API를 활용해 레벨별로 다른 픽셀 캐릭터를 생성합니다 (seed값에 레벨 사용)
    // 레벨이 올라갈수록 캐릭터 모양이 자동으로 변합니다.
    const avatarUrl = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${lv}&backgroundColor=b6e3f4,c0aede,d1d4f9`; 
    return `<img src="${avatarUrl}" style="width:80px; height:80px; image-rendering: pixelated; border-radius:10px; background:white; padding:5px; border:2px solid #eee;">`;
}

        function handleLogin() { auth.signInWithPopup(provider); }
        function showTab(t) { currentTab = t; sessionStorage.setItem('activeTab', t); document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active')); document.querySelectorAll('.tab-menu button').forEach(b => b.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active'); if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.add('active'); if(t==='points') loadMyLogs(); if(t==='logs') renderCheckinBoard(); }
        function openPopup(t,h,r=false) { document.getElementById('pop-title').innerHTML=t; document.getElementById('pop-content').innerHTML=h; document.getElementById('common-overlay').style.display='flex'; window.routineActive=r; }
        function closePopup() { if(window.routineActive && ++rIdx < routineItems.length) document.getElementById('pop-content').innerText = `[루틴 ${rIdx+1}단계]\n${routineItems[rIdx]}`; else { document.getElementById('common-overlay').style.display='none'; rIdx = 0; } }
        function closePointPopup() { document.getElementById('point-popup').style.display='none'; }
        function closeMultiPopup() { document.getElementById('multi-popup').style.display = 'none'; }

        function renderCheckinBoard() {
    const td = document.getElementById('checkin-date-filter').value || getTodayKST();
    const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
    const dayOfWeek = dayNames[new Date(td).getDay()];

    db.ref('settings/excludeList').once('value', exSnap => {
        const excludeData = exSnap.val() || {};
        const todayExcludesStr = excludeData[dayOfWeek] || ""; // 예: "홍길동(방과후), 김철수(봉사)"

        db.ref('checkinLogs').once('value', snap => {
            const logs = {}; 
            snap.forEach(c => { const l = c.val(); if(l.date === td) logs[l.name] = l; });

            // 상단 요일별 사유 박스
            let exH = `
                <div style="padding:15px; background:#fff3cd; border-radius:15px; margin-bottom:15px; border:2px solid #ffeeba; display:flex; justify-content:space-between; align-items:center; font-size:1.2rem;">
                    <div><strong>📅 ${dayOfWeek}요일 제외:</strong> <span style="color:#856404;">${todayExcludesStr || '없음'}</span></div>
                    ${isAdmin ? `<button onclick="openExcludeSettingPopup()" style="width:auto; padding:8px 15px; background:var(--dark); color:white; border:none; border-radius:10px; font-size:1rem; cursor:pointer;">설정 ⚙️</button>` : ''}
                </div>
            `;

            let h = exH + `<div style="margin-bottom:20px; font-weight:bold; font-size:1.8rem; text-align:center; border-bottom:4px solid var(--dark); padding-bottom:15px; color:var(--dark);">📌 [${td}] 등교 용사 명부</div>`;
            
            currentUsers.forEach(u => {
                if(u.name === "총사령관") return;
                const log = logs[u.name];
                
                // 기본 상태: 미등교 (노란색)
                let bgColor = "#ffff00"; 
                let statusText = "🚩 미등교";
                let textColor = "#333";

                // [추가] 오늘 제외 대상인지 확인 (문자열에 이름이 포함되어 있는지 체크)
                const isExcluded = todayExcludesStr.includes(u.name);

                if (log) {
                    // 등교 완료 상태 (초록색 또는 빨간색)
                    if(log.result.includes('정상')) { 
                        bgColor = "#a2fca2"; 
                        statusText = "⚔️ 정상 등교"; 
                    } else { 
                        bgColor = "#ffadad"; 
                        statusText = "⚠️ " + log.result; 
                    }
                } else if (isExcluded) {
                    // 등교 전인데 제외 대상인 경우 (파란색)
                    bgColor = "#d1ecf1"; // 연한 파란색
                    statusText = "🔵 제외 대상";
                    textColor = "#0c5460";
                }

                h += `
                    <div style="display:flex; align-items:center; justify-content:center; padding:22px; margin-bottom:10px; border-radius:12px; font-size:1.7rem; background-color:${bgColor}; border:2px solid rgba(0,0,0,0.1); color:${textColor};">
                        <span style="width:50px; text-align:right; margin-right:20px; font-weight:bold;">${u.no||''}</span>
                        <span style="width:120px; font-weight:bold;">${u.name}</span>
                        <span style="flex:1; text-align:center;">${statusText}</span>
                        <span style="width:130px; text-align:right; font-size:1.3rem;">${log?.time || (isExcluded ? '사유확인' : '-')}</span>
                    </div>`;
            });

            if(document.getElementById('checkin-history')) document.getElementById('checkin-history').innerHTML = h;
        });
    });
}

        function addScore(name, p, e, reason) {
            db.ref('users/' + name).once('value', sn => {
                const u = sn.val(); if (!u) return;
                // 1. 포인트 합산
                let nP = (parseInt(u.points) || 0) + parseInt(p);
                // 2. 경험치 합산 (선생님 코드에 이게 빠져있었습니다!)
                let nE = (parseInt(u.exp) || 0) + parseInt(e);
                let nL = (parseInt(u.lv) || 1);
                let up = false; // 3. 변수 선언 (이게 없어서 로딩이 멈췄던 겁니다!)

                while (nE >= 100) { nL++; nE -= 100; up = true; }
                
                db.ref('users/' + name).update({ points: nP, exp: nE, lv: nL }).then(() => {
                    if (reason !== "정상 등교") {
                        db.ref('pointLogs').push({ name, amount: p, reason, time: new Date().toLocaleString(), date: getTodayKST() });
                    }
                    if (up) triggerLevelUpRoulette(name, nL); 
                });
            });
        }

        function loadMyLogs() {
    // 관리자라면 전체 로그를 가져오고, 학생이라면 본인 로그만 필터링
    let logQuery = isAdmin ? db.ref('pointLogs') : db.ref('pointLogs').orderByChild('name').equalTo(myName);

    logQuery.once('value', snap => {
        let h = "";
        let logs = [];
        snap.forEach(l => { logs.push(l.val()); });
        
        // 최신순 정렬 (최근 기록이 위로)
        logs.reverse();

        if (isAdmin) {
            // [관리자용] 전체 학생의 기록을 이름과 함께 표시
            h += `<div style="background:var(--dark); color:white; padding:15px; border-radius:15px; margin-bottom:15px; text-align:center; font-weight:bold;">🛡️ 실시간 전체 용사 연대기</div>`;
            logs.slice(0, 50).forEach(l => { // 너무 많으면 느려지니 최근 50개만
                const color = l.amount >= 0 ? "var(--green)" : "var(--red)";
                h += `
                    <div class="list-item" style="border-left:10px solid ${color}; background:#fff; margin-bottom:8px; padding:15px;">
                        <span style="flex:1;">
                            <strong style="font-size:1.5rem; color:var(--dark);">[${l.name}]</strong> ${l.reason}
                            <br><small style="color:#888;">${l.time}</small>
                        </span>
                        <div style="text-align:right; min-width:80px;">
                            <strong style="color:${color}; font-size:1.5rem;">${l.amount >= 0 ? '+' : ''}${l.amount}P</strong>
                        </div>
                    </div>`;
            });
        } else {
            // [학생용] 본인 기록만 표시
            logs.slice(0, 30).forEach(l => {
                const color = l.amount >= 0 ? "var(--green)" : "var(--red)";
                h += `
                    <div class="list-item" style="border-left:8px solid ${color};">
                        <span><b>${l.reason}</b><br><small>${l.time}</small></span>
                        <strong>${l.amount >= 0 ? '+' : ''}${l.amount}P</strong>
                    </div>`;
            });
        }
        
        document.getElementById('point-history-list').innerHTML = h || "<p style='text-align:center; padding:20px; color:#999;'>기록이 아직 없습니다.</p>";
    });
}
        function startApp() {
            db.ref('settings').on('value', snap => {
                const s = snap.val() || {}; giftList = s.giftList || []; routineItems = s.routineText?.split('\n').filter(t=>t.trim()) || [];
                if(isAdmin) { document.getElementById('conf-pass').value = s.password || ""; document.getElementById('conf-late').value = s.lateTime || "08:40"; document.getElementById('conf-close').value = s.closeTime || "09:00"; document.getElementById('conf-routine').value = s.routineText || ""; document.getElementById('conf-gifts').value = s.giftList?.join('\n') || ""; }
                document.getElementById('checkin-guide').innerText = `✅ 정상: ~${s.lateTime || '08:40'} | ⚠️ 지각: ${s.closeTime || '09:00'} 마감`;
            });

                        db.ref('users').on('value', snap => {
                let users = []; 
                snap.forEach(c => { let u = c.val(); u.name = c.key; users.push(u); });
                
                // [정렬 로직] 1순위: 나(myName), 2순위: 번호순
                currentUsers = users.sort((a, b) => {
                    if (a.name === myName) return -1;
                    if (b.name === myName) return 1;
                    return (a.no || 99) - (b.no || 99);
                });

                let h = ""; 
                currentUsers.forEach(u => { 
                    if(u.name === "총사령관") return; 
                    const isMe = (u.name === myName);
                    // 본인일 경우 카드 스타일 강조 및 별 표시
                    h += `
                        <div class="hero-card ${isMe ? 'me' : ''}" onclick="openUserHistory('${u.name}')" 
                             style="${isMe ? 'border: 4px solid var(--gold); background: #fffdf2; transform: scale(1.05);' : ''}">
                            <span>${getAvatar(u.lv || 1)}</span><br>
                            <b style="font-size:1.3rem;">${isMe ? '⭐ ' : ''}LV.${u.lv || 1} ${u.name}</b><br>
                            <span style="color:var(--primary); font-weight:bold;">${u.points || 0}P</span>
                        </div>`; 
                });
                document.getElementById('hero-grid').innerHTML = h;

                if (isAdmin) {
                    let aH = ""; 
                    currentUsers.forEach(u => { 
                        if(u.name === "총사령관") return;
                        aH += `<div class="list-item" style="padding:10px 15px; background:#fff; border-bottom:1px solid #eee; display:flex; align-items:center; gap:12px;">
                                <input type="number" value="${u.no || ''}" onchange="updateNo('${u.name}', this.value)" style="width:100px; height:60px; margin:0; text-align:center; font-size:1.8rem; border:3px solid var(--primary); font-weight:bold; background:#f0f8ff; border-radius:10px;">
                                <div style="flex:1; display:flex; align-items:center; gap:10px;"><strong style="font-size:1.7rem; min-width:85px;">${u.name}</strong>
                                <button onclick="toggleHelper('${u.name}',${u.isHelper || false})" style="width:auto; padding:8px 15px; background:${u.isHelper ? 'var(--primary)' : '#95a5a6'}; color:white; border:none; border-radius:10px; font-size:1.2rem; font-weight:bold;">${u.isHelper ? '도우미' : '일반'}</button></div>
                                <button onclick="delUser('${u.name}')" style="width:auto; padding:8px 15px; background:var(--red); color:white; border:none; border-radius:10px; font-size:1.2rem; font-weight:bold;">제거</button></div>`;
                    });
                    document.getElementById('student-admin-list').innerHTML = aH;
                }
                renderCheckinBoard();
            });


            // --- 상점 카테고리 로직 ---
            let currentShopCat = "전체";
            db.ref('shop').on('value', snap => { window.shopData = snap; renderShop(); });

            window.renderShop = function() {
                if (!window.shopData) return;
                const cats = ["전체", "🍕 먹거리", "🎫 쿠폰", "🎲 뽑기", "✏️ 학용품", "✨ 기타"];
                let tabH = `<div style="display:flex; overflow-x:auto; gap:10px; margin-bottom:15px; padding-bottom:10px; -webkit-overflow-scrolling:touch;">`;
                cats.forEach(c => {
                    const activeStyle = (currentShopCat === c) ? 'background:var(--primary); color:white;' : 'background:#eee;';
                    tabH += `<button onclick="filterShop('${c}')" style="width:auto; padding:10px 20px; border-radius:12px; font-weight:bold; border:none; ${activeStyle} white-space:nowrap;">${c}</button>`;
                });
                tabH += `</div>`;
                let itemH = ""; 
                window.shopData.forEach(c => { 
                    const i = c.val(); if (currentShopCat !== "전체" && i.cat !== currentShopCat) return; 
                    itemH += `<div class="list-item"><span>[${i.cat||'✨'}] <b>${i.name}</b> (${i.price}P)</span><div style="display:flex; gap:8px;"><button onclick="buyItem('${c.key}','${i.name}',${i.price},${i.limit||0})" style="width:auto; padding:10px 18px;">구매</button>${isAdmin ? `<button onclick="openEditShopPopup('${c.key}')" style="width:auto; padding:10px 18px; background:var(--dark); color:white;">관리</button>` : ''}</div></div>`; 
                }); 
                document.getElementById('shop-list').innerHTML = tabH + (itemH || "<p style='padding:20px;'>물품 없음</p>"); 
            };

            window.filterShop = function(cat) { currentShopCat = cat; renderShop(); };

            db.ref('pointGuide').on('value', snap => { 
                let h = ""; snap.forEach(c => { const g = c.val(); h += `<div class="hero-card" style="position:relative;"><div onclick="openMultiPopup('${g.title}', ${g.p}, ${g.e})"><b>${g.title}</b><br><span style="color:var(--primary); font-weight:bold;">${g.p}P / ${g.e}E</span></div>${isAdmin ? `<button onclick="openEditGuidePopup('${c.key}')" style="margin-top:10px; padding:5px; font-size:1.1rem; background:#eee; border:none; border-radius:5px;">수정 ⚙️</button>` : ''}</div>`; }); 
                document.getElementById('guide-list').innerHTML = h;
            });

            db.ref('orders').on('value', snap => {
                let uH = "", wH = "", adminH = ""; let myInv = {}, myWait = {}, adminReq = {};
                snap.forEach(c => {
                    const o = c.val(); const key = c.key;
                    if (o.user === myName) {
                        if (o.status === '대기') { myInv[o.item] = (myInv[o.item] || 0) + 1; myInv[o.item + "_key"] = key; } 
                        else if (o.status === '사용요청') { myWait[o.item] = (myWait[o.item] || 0) + 1; }
                    }
                    if (isAdmin && o.status === '사용요청') {
                        const adminKey = o.user + "||" + o.item;
                        if (!adminReq[adminKey]) adminReq[adminKey] = { user: o.user, item: o.item, count: 0, keys: [] };
                        adminReq[adminKey].count++; adminReq[adminKey].keys.push(key);
                    }
                });
                Object.keys(myInv).forEach(item => { if (item.endsWith("_key")) return; uH += `<div class="list-item"><span>${item} <b>x ${myInv[item]}</b></span><button onclick="reqUse('${myInv[item + "_key"]}')" style="width:auto;">1개 사용</button></div>`; });
                Object.keys(myWait).forEach(item => { wH += `<div class="list-item"><span>${item} <b>x ${myWait[item]}</b></span><b style="color:#888;">대기중</b></div>`; });
                if (isAdmin) {
                    Object.keys(adminReq).forEach(k => { const req = adminReq[k]; adminH += `<div class="list-item"><span><b>${req.user}</b>: ${req.item} <b>x ${req.count}</b></span><button onclick="approveMulti('${req.keys.join(',')}')" style="width:auto; background:var(--red); color:white;">전체승인</button></div>`; });
                }
                document.getElementById('inv-unused').querySelector('.list').innerHTML = uH || "없음";
                document.getElementById('inv-waiting').querySelector('.list').innerHTML = wH || "없음";
                if (isAdmin) document.getElementById('order-list').innerHTML = adminH || "요청 없음";
            });
        } // startApp 종료

        auth.onAuthStateChanged(user => {
            if (user) {
                isAdmin = (user.email === adminEmail);
                db.ref('userEmails/' + user.email.replace(/\./g, ',')).once('value', snap => {
                    if (snap.exists() || isAdmin) {
                        myName = snap.val() || "총사령관";
                        db.ref('users/' + myName).once('value', uSnap => {
                            isHelper = uSnap.val()?.isHelper || false;
                            forceScreenDisplay('app');
                            if (isAdmin) { ['btn-logs', 'btn-admin', 'admin-shop-mgr', 'admin-order-mgr', 'btn-guide', 'admin-guide-mgr', 'floating-point-btn', 'floating-multi-btn'].forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'block'; }); } 
                            else if (isHelper) { ['btn-shop', 'admin-order-mgr'].forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'block'; }); }
                            startApp(); showTab(currentTab);
                        });
                    } else { alert("미등록 용사!"); auth.signOut(); }
                });
            } else { forceScreenDisplay('login'); }
        });

        function openEditShopPopup(key) {
            db.ref('shop/' + key).once('value', snap => {
                const i = snap.val();
                let h = `<h3>🛍️ 물품 수정</h3>상품명: <input type="text" id="edit-shop-name" value="${i.name}">가격: <input type="number" id="edit-shop-price" value="${i.price}">카테고리: <select id="edit-shop-cat"><option value="🍕 먹거리" ${i.cat==='🍕 먹거리'?'selected':''}>🍕 먹거리</option><option value="🎫 쿠폰" ${i.cat==='🎫 쿠폰'?'selected':''}>🎫 쿠폰</option><option value="🎲 뽑기" ${i.cat==='🎲 뽑기'?'selected':''}>🎲 뽑기</option><option value="✏️ 학용품" ${i.cat==='✏️ 학용품'?'selected':''}>✏️ 학용품</option><option value="✨ 기타" ${i.cat==='✨ 기타'?'selected':''}>✨ 기타</option></select>
                <button onclick="db.ref('shop/${key}').update({name:document.getElementById('edit-shop-name').value, price:parseInt(document.getElementById('edit-shop-price').value), cat:document.getElementById('edit-shop-cat').value}).then(()=>{alert('수정됨');closePopup();})" style="background:var(--primary); color:white;">저장</button>
                <button onclick="if(confirm('삭제?')) db.ref('shop/${key}').remove().then(()=>{closePopup();})" style="background:var(--red); color:white;">삭제</button>`;
                openPopup("물품 관리", h);
            });
        }

        function openEditGuidePopup(key) {
            db.ref('pointGuide/' + key).once('value', snap => {
                const g = snap.val();
                let h = `<h3>📜 도감 수정</h3>항목: <input type="text" id="edit-guide-title" value="${g.title}">P: <input type="number" id="edit-guide-p" value="${g.p}">E: <input type="number" id="edit-guide-e" value="${g.e}">
                <button onclick="db.ref('pointGuide/${key}').update({title:document.getElementById('edit-guide-title').value, p:parseInt(document.getElementById('edit-guide-p').value), e:parseInt(document.getElementById('edit-guide-e').value)}).then(()=>{alert('수정됨');closePopup();})" style="background:var(--primary); color:white;">저장</button>
                <button onclick="if(confirm('삭제?')) db.ref('pointGuide/${key}').remove().then(()=>{closePopup();})" style="background:var(--red); color:white;">삭제</button>`;
                openPopup("도감 관리", h);
            });
        }

        function approveMulti(keysStr) {
            if (confirm("모두 승인하시겠습니까?")) {
                const updates = {}; keysStr.split(',').forEach(k => { updates[`orders/${k}/status`] = '완료'; });
                db.ref().update(updates).then(() => alert("일괄 승인 완료!"));
            }
        }

        function updateNo(n, v) { db.ref('users/' + n).update({ no: v }); }
        function toggleHelper(n,s) { if(confirm(`${n} 권한 변경?`)) db.ref('users/'+n).update({isHelper:!s}); }
        function delUser(n) { if(confirm(n+" 제거?")) db.ref('users/'+n).remove(); }
        function saveSettings() { db.ref('settings').update({ password: document.getElementById('conf-pass').value, lateTime: document.getElementById('conf-late').value, closeTime: document.getElementById('conf-close').value, routineText: document.getElementById('conf-routine').value }).then(()=>alert("저장됨")); }
        function saveGifts() { db.ref('settings').update({ giftList: document.getElementById('conf-gifts').value.split('\n').filter(t=>t.trim()) }).then(() => alert("보상 저장 완료!")); }
        function bulkReg() { document.getElementById('bulk-in').value.split('\n').forEach(l => { const [n,e]=l.split(',').map(s=>s.trim()); if(n&&e) { db.ref('userEmails/'+e.replace(/\./g,',')).set(n); db.ref('users/'+n).update({points:0, exp:0, lv:1}); }}); alert("완료"); }
        async function buyItem(k, n, p, l) { const sn = await db.ref('users/'+myName).once('value'); if((sn.val().points||0) < p) return alert("부족!"); db.ref('orders').push({ user: myName, item: n, status: '대기', time: new Date().toLocaleString() }); addScore(myName, -p, 0, `${n} 구매`); }
        function reqUse(k) { if(confirm("사용 요청?")) db.ref('orders/'+k).update({status:'사용요청'}); }
        function addGuide() { const t=document.getElementById('guide-title').value, p=parseInt(document.getElementById('guide-p').value)||0, e=parseInt(document.getElementById('guide-e').value)||0; if(t) db.ref('pointGuide').push({title:t, p, e}); }
        function addItem() { const n=document.getElementById('item-name-in').value, p=parseInt(document.getElementById('item-price-in').value), l=parseInt(document.getElementById('item-limit-in').value)||0, c=document.getElementById('item-cat-in').value; if(n&&p) db.ref('shop').push({cat:c, name:n, price:p, limit:l}); }
        function triggerLevelUpRoulette(name, newLv) { if (!giftList.length) return; const pick = giftList[Math.floor(Math.random() * giftList.length)]; db.ref('orders').push({ user: name, item: `[레벨업 보상] ${pick}`, status: '대기', time: new Date().toLocaleString() }); if (name === myName) openPopup("LEVEL UP!", `LV.${newLv} 달성! 보상: [${pick}]`); }
           // [개인 정보창 팝업 함수 - 설계도 반영 버전]
        function openUserHistory(un) {
            db.ref('users/' + un).once('value', sn => {
                const u = sn.val() || {}, exp = u.exp || 0, lv = u.lv || 1, pts = u.points || 0;
                
                // 가로형 레이아웃 (캐릭터와 정보 나란히 배치)
                let h = `
                    <div style="display:flex; gap:20px; align-items:center; background:#f8f9fa; padding:20px; border-radius:20px; margin-bottom:15px; border:2px solid #eee;">
                        <div style="flex: 0 0 100px; text-align:center;">
                            ${getAvatar(lv)}
                            <div style="margin-top:8px; font-weight:bold; color:var(--dark); font-size:1.2rem;">LV.${lv}</div>
                        </div>
                        <div style="flex:1;">
                            <h3 style="margin:0 0 10px 0; font-size:1.6rem;">${un} 용사</h3>
                            <div style="font-size:1.4rem; margin-bottom:5px; color:var(--primary);">💰 <b>${pts}P</b></div>
                            <div style="font-size:1.2rem; color:#666;">✨ EXP: <b>${exp} / 100</b></div>
                            <div style="background:#ddd; height:15px; border-radius:10px; margin-top:10px; overflow:hidden; border:1px solid #ccc;">
                                <div style="background:var(--primary); width:${exp}%; height:100%;"></div>
                            </div>
                        </div>
                    </div>`;

                // 로그 표시 로직 (관리자나 본인만 확인 가능)
                if (isAdmin || un === myName) {
                    db.ref('pointLogs').once('value', lsn => {
                        let uL = []; 
                        lsn.forEach(l => { if (l.val().name === un) uL.push(l.val()); });
                        
                        let logHtml = `<div style="max-height:300px; overflow-y:auto; border-top:2px solid #eee; padding-top:10px;">`;
                        uL.reverse().slice(0, 20).forEach(l => { 
                            const color = l.amount > 0 ? "var(--green)" : "var(--red)"; 
                            logHtml += `
                                <div class="list-item" style="border-left:8px solid ${color}; background:#fff; margin-bottom:5px; padding:10px;">
                                    <span>${l.reason}<br><small style="color:#999;">${l.time}</small></span>
                                    <strong style="color:${color};">${l.amount > 0 ? '+' : ''}${l.amount}P</strong>
                                </div>`; 
                        });
                        logHtml += `</div>`;
                        openPopup(`${un} 용사 상세 정보`, h + logHtml);
                    });
                } else {
                    h += `<p style="text-align:center; color:#999; padding:20px;">🛡️ 보안상 다른 용사의 연대기는 볼 수 없습니다.</p>`;
                    openPopup(`${un} 용사 정보`, h);
                }
            });
        }

    </script>
</body>
</html>
