<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-6 용사 본부</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --purple: #9b59b6; --bg: #ecf0f1; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 50px; }
        #login-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--dark); }
        #main-app { display: none; }
        .tab-menu { display: flex; background: var(--dark); position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .tab-menu button { flex: 1; min-width: 80px; padding: 15px 5px; border: none; background: none; color: #95a5a6; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .tab-menu button.active { color: white; border-bottom: 4px solid var(--gold); }
        .tab-content { display: none; padding: 15px; max-width: 1000px; margin: auto; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 15px; }
        .hero-card { background: white; border-radius: 12px; padding: 15px 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 2px solid transparent; cursor: pointer; }
        .hero-card.me { border-color: var(--gold); background: #fffdf2; transform: scale(1.05); z-index: 10; }
        .card-avatar { font-size: 2.8rem; margin-bottom: 8px; display: block; }
        .card-name { font-weight: bold; font-size: 1rem; color: var(--dark); }
        .card-job { font-size: 0.7rem; color: var(--primary); font-weight: bold; margin-bottom: 5px; display: block; }
        .card-lv { font-size: 0.75rem; background: var(--dark); color: white; padding: 2px 6px; border-radius: 10px; margin-bottom: 5px; display: inline-block; }
        .exp-bar-bg { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .exp-bar-fill { height: 100%; background: var(--green); transition: width 0.5s; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input, button, textarea, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .popup-box { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; }
        .manage-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="common-overlay" class="overlay">
        <div class="popup-box">
            <h2 id="pop-title">알림</h2>
            <div id="pop-content" style="margin-bottom: 20px; white-space: pre-wrap;">내용</div>
            <button onclick="handlePopupBtn()" style="background:var(--green);">확인</button>
        </div>
    </div>

    <div id="login-screen">
        <div style="background:white; padding:30px; border-radius:15px; text-align:center;">
            <h1>🏰 6-6 용사 본부</h1>
            <button onclick="handleLogin()">Google 로그인</button>
        </div>
    </div>

    <div id="main-app">
        <nav class="tab-menu">
            <button id="btn-main" class="active" onclick="showTab('main')">🤺 용사들</button>
            <button id="btn-shop" onclick="showTab('shop')">🛍️ 상점</button>
            <button id="btn-checkin" onclick="showTab('checkin')">⚔️ 등교</button>
            <button id="btn-manage" onclick="showTab('manage')" style="display:none;">📝 관리</button>
            <button id="btn-admin" onclick="showTab('admin')" style="display:none;">🛡️ 설정</button>
        </nav>
        
        <section id="tab-main" class="tab-content active"><div id="hero-grid" class="hero-grid"></div></section>
        <section id="tab-shop" class="tab-content"><div class="card"><h2>🛍️ 상점</h2><div id="shop-list"></div></div></section>
        <section id="tab-checkin" class="tab-content">
            <div class="card">
                <h2>⚔️ 등교 확인</h2>
                <div id="checkin-guide" style="font-size:0.9rem; color:#666; margin-bottom:10px;"></div>
                <input type="text" id="checkin-pass" placeholder="오늘의 암호">
                <button onclick="submitCheckIn()">소환!</button>
            </div>
        </section>

        <section id="tab-manage" class="tab-content"><div class="card"><h3>⚖️ 점수 부여</h3><div id="mass-score-board"></div><button onclick="applyMassScores()">반영하기</button></div></section>

        <section id="tab-admin" class="tab-content">
            <div class="card">
                <h3>⚙️ 시간 및 암호 설정</h3>
                암호: <input type="text" id="conf-pass">
                지각 시작: <input type="time" id="conf-late">
                등교 마감: <input type="time" id="conf-close">
                🌅 루틴 메세지: <textarea id="conf-routine" placeholder="줄바꿈으로 단계 구분"></textarea>
                <button onclick="saveSettings()" style="background:var(--dark);">설정 저장</button>
            </div>
            <div class="card">
                <h3>💼 직업 도감 등록</h3>
                <input type="text" id="job-name-in" placeholder="직업명">
                <textarea id="job-desc-in" placeholder="직업 설명"></textarea>
                <button onclick="addJob()">직업 등록</button>
                <div id="job-admin-list" style="margin-top:10px;"></div>
            </div>
            <div class="card">
                <h3>🎁 상점 물품 등록</h3>
                <input type="text" id="it-name" placeholder="물품명">
                <input type="number" id="it-price" placeholder="가격(P)">
                <button onclick="addShopItem()">물품 등록</button>
                <div id="admin-shop-list"></div>
            </div>
            <div class="card"><h3>🆕 학생 일괄 등록</h3><textarea id="bulk-in" placeholder="이름,이메일 (엔터로 구분)"></textarea><button onclick="bulkReg()">등록</button></div>
            <div id="student-delete-list" class="card"></div>
        </section>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDWdWrw8LJ6tSiyF1X5tENJEvBfY-DzSw0",
            authDomain: "cs6-6class.firebaseapp.com",
            databaseURL: "https://cs6-6class-default-rtdb.firebaseio.com/", 
            projectId: "cs6-6class",
            storageBucket: "cs6-6class.firebasestorage.app",
            messagingSenderId: "644235499537",
            appId: "1:644235499537:web:2ede2611f4ec6a3e8179b0"
        };
        const adminEmail = "ksosuny@cberi.go.kr";
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        let myName = "", isAdmin = false, jobData = {}, routineItems = [], rIdx = 0, isRoutineMode = false;

        function getAvatar(lv) { if(lv >= 20) return "🐲"; if(lv >= 10) return "🛡️"; return "🐣"; }

        auth.onAuthStateChanged((user) => {
            if (user) {
                isAdmin = (user.email === adminEmail);
                const eKey = user.email.replace(/\./g, ',');
                db.ref('userEmails/' + eKey).once('value', (snap) => {
                    if (snap.exists() || isAdmin) {
                        myName = snap.val() || "총사령관";
                        if(isAdmin) document.querySelectorAll('#btn-manage, #btn-admin').forEach(e => e.style.display='block');
                        startApp();
                    } else { alert("미등록 사용자입니다."); auth.signOut(); }
                });
            } else { 
                document.getElementById('login-screen').style.display='flex'; 
                document.getElementById('main-app').style.display='none'; 
            }
        });

        function handleLogin() { auth.signInWithPopup(provider); }

        function startApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';

            db.ref('settings').on('value', snap => {
                const s = snap.val() || {};
                document.getElementById('conf-pass').value = s.password || "";
                document.getElementById('conf-late').value = s.lateTime || "08:40";
                document.getElementById('conf-close').value = s.closeTime || "09:00";
                document.getElementById('conf-routine').value = s.routineText || "";
                document.getElementById('checkin-guide').innerText = `✅ 정상: ~${s.lateTime} | ⚠️ 지각: ~${s.closeTime}`;
                routineItems = (s.routineText || "").split('\n').filter(t => t.trim() !== "");
            });

            db.ref('jobs').on('value', snap => {
                jobData = snap.val() || {};
                let jH = ""; window.jobOpts = "<option value=''>직업 없음</option>";
                for(let k in jobData) {
                    jH += `<div style="padding:5px; border-bottom:1px solid #eee;"><strong>${jobData[k].name}</strong> <button onclick="db.ref('jobs/${k}').remove()" style="width:auto; padding:2px 5px; background:red;">❌</button></div>`;
                    window.jobOpts += `<option value="${jobData[k].name}">${jobData[k].name}</option>`;
                }
                document.getElementById('job-admin-list').innerHTML = jH;
            });

            db.ref('users').on('value', snap => {
                let gH = "", mH = "", dH = "<h3>👥 용사 명단</h3>";
                const users = []; snap.forEach(c => users.push(c.val()));
                users.forEach(u => {
                    gH += `<div class="hero-card ${(u.name===myName)?'me':''}" onclick="showJobInfo('${u.job || '평민'}')">
                        <span class="card-lv">LV.${u.lv}</span><span class="card-avatar">${getAvatar(u.lv)}</span>
                        <span class="card-job">${u.job || '평민'}</span><div class="card-name">${u.name}</div>
                        <div>💰 ${u.points}P</div>
                    </div>`;
                    mH += `<div class="manage-row"><span>${u.name}</span><input type="number" class="m-exp" data-name="${u.name}" placeholder="EXP"><input type="number" class="m-pts" data-name="${u.name}" placeholder="P"></div>`;
                    dH += `<div style="margin-bottom:5px;">${u.name} <select onchange="db.ref('users/${u.name}').update({job:this.value})">${window.jobOpts}</select></div>`;
                });
                document.getElementById('hero-grid').innerHTML = gH;
                document.getElementById('mass-score-board').innerHTML = mH;
                document.getElementById('student-delete-list').innerHTML = dH;
            });

            db.ref('shop').on('value', snap => {
                let sH = "", aH = "";
                snap.forEach(c => {
                    const i = c.val();
                    sH += `<div class="manage-row" style="grid-template-columns: 2fr 1fr;"><span>${i.name} (${i.price}P)</span><button onclick="buyItem('${i.name}',${i.price})">구매</button></div>`;
                    aH += `<div>${i.name} <button onclick="db.ref('shop/${c.key}').remove()" style="width:auto; background:red;">X</button></div>`;
                });
                document.getElementById('shop-list').innerHTML = sH || "물건 없음";
                document.getElementById('admin-shop-list').innerHTML = aH;
            });
        }

        function addJob() {
            const n = document.getElementById('job-name-in').value, d = document.getElementById('job-desc-in').value;
            if(!n || !d) return alert("이름과 설명을 입력하세요!");
            db.ref('jobs').push({name:n, desc:d}).then(() => {
                alert("직업 등록 완료!");
                document.getElementById('job-name-in').value = "";
                document.getElementById('job-desc-in').value = "";
            });
        }

        function saveSettings() {
            db.ref('settings').update({
                password: document.getElementById('conf-pass').value,
                lateTime: document.getElementById('conf-late').value,
                closeTime: document.getElementById('conf-close').value,
                routineText: document.getElementById('conf-routine').value
            }).then(() => alert("설정 저장 완료!"));
        }

        function submitCheckIn() {
            const pw = document.getElementById('checkin-pass').value;
            db.ref('settings').once('value', snap => {
                const s = snap.val();
                if(pw !== s.password) return alert("암호 오류!");
                const now = new Date();
                const time = now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');
                if(time > s.closeTime) return alert("등교 마감!");
                rIdx = 0;
                if(routineItems.length > 0) openPopup("🌅 아침 루틴", routineItems[0], 'routine');
                else alert("등교 완료!");
            });
        }

        function applyMassScores() {
            document.querySelectorAll('.m-exp').forEach((e, i) => {
                const n = e.dataset.name, ae = parseInt(e.value)||0, ap = parseInt(document.querySelectorAll('.m-pts')[i].value)||0;
                if(ae || ap) db.ref('users/'+n).once('value', sn => {
                    const u = sn.val();
                    let nE = (u.exp||0)+ae, nL = (u.lv||1), nP = (u.points||0)+ap;
                    while(nE >= 100) { nL++; nE -= 100; }
                    db.ref('users/'+n).update({exp:nE, lv:nL, points:nP});
                });
                e.value = ""; document.querySelectorAll('.m-pts')[i].value = "";
            });
            alert("처리되었습니다.");
        }

        function addShopItem() {
            const n = document.getElementById('it-name').value, p = parseInt(document.getElementById('it-price').value);
            if(n && p) db.ref('shop').push({name:n, price:p});
        }

        function buyItem(n, p) {
            db.ref('users/'+myName).once('value', sn => {
                const u = sn.val();
                if(u.points < p) return alert("포인트 부족!");
                db.ref('users/'+myName).update({points: u.points - p});
                db.ref('orders').push({user:myName, item:n, status:'대기'});
                alert("요청 완료!");
            });
        }

        function showJobInfo(jn) {
            let desc = "특별한 능력이 없습니다.";
            for(let k in jobData) { if(jobData[k].name === jn) desc = jobData[k].desc; }
            openPopup(`💼 직업: ${jn}`, desc);
        }

        function openPopup(t, c, m) {
            document.getElementById('pop-title').innerText = t;
            document.getElementById('pop-content').innerText = c;
            document.getElementById('common-overlay').style.display = 'flex';
            isRoutineMode = (m === 'routine');
        }

        function handlePopupBtn() {
            if(isRoutineMode) {
                rIdx++;
                if(rIdx < routineItems.length) document.getElementById('pop-content').innerText = routineItems[rIdx];
                else { document.getElementById('common-overlay').style.display = 'none'; alert("소환 완료!"); }
            } else { document.getElementById('common-overlay').style.display = 'none'; }
        }

        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(s=>s.classList.remove('active'));
            document.querySelectorAll('.tab-menu button').forEach(b=>b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.getElementById('btn-'+t).classList.add('active');
        }

        function bulkReg() {
            document.getElementById('bulk-in').value.trim().split('\n').forEach(l => {
                const [n, e] = l.split(',').map(s=>s.trim());
                if(n && e) {
                    db.ref('userEmails/'+e.replace(/\./g,',')).set(n);
                    db.ref('users/'+n).update({name:n, email:e, points:0, exp:0, lv:1});
                }
            });
            alert("등록 완료!");
        }
    </script>
</body>
</html>
