<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-6 용사 본부</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --purple: #9b59b6; --bg: #ecf0f1; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 60px; font-size: 1.4rem; }
        input, button, textarea, select { width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; border: 2px solid #ccc; box-sizing: border-box; font-size: 1.4rem; }
        input[type="number"] { padding: 10px; text-align: center; font-weight: bold; }
        #loading-screen { display: flex; justify-content: center; align-items: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); color: white; z-index: 3000; font-size: 1.8rem; }
        #login-screen { display: none; justify-content: center; align-items: center; min-height: 100vh; background: var(--dark); padding: 20px; }
        .login-box { background: white; padding: 50px 40px; border-radius: 30px; text-align: center; width: 100%; max-width: 450px; }
        #main-app { display: none; }
        .tab-menu { display: flex; background: var(--dark); position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .tab-menu button { flex: 1; min-width: 95px; padding: 20px 10px; border: none; background: none; color: #95a5a6; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .tab-menu button.active { color: white; border-bottom: 5px solid var(--gold); }
        .tab-content { display: none; padding: 20px; max-width: 1200px; margin: auto; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; gap: 15px; font-size: 1.4rem; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 20px; margin-top: 20px; }
        .hero-card { background: white; border-radius: 20px; padding: 25px 15px; text-align: center; box-shadow: 0 6px 15px rgba(0,0,0,0.1); border: 3px solid transparent; cursor: pointer; }
        .hero-card.me { border-color: var(--gold); background: #fffdf2; transform: scale(1.03); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .popup-box { background: white; padding: 30px; border-radius: 25px; width: 95%; max-width: 700px; display: flex; flex-direction: column; max-height: 85vh; }
        #pop-content { flex: 1; overflow-y: auto; margin: 20px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .floating-btn { position: fixed; bottom: 25px; right: 25px; width: 85px; height: 85px; border-radius: 45px; background: var(--gold); color: var(--dark); box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 999; font-size: 2.2rem; display: none; align-items: center; justify-content: center; border: none; cursor: pointer; }
        .pixel-avatar { width: 64px; height: 64px; background: url('avatars.png') no-repeat; background-size: 384px 64px; display: inline-block; image-rendering: pixelated; vertical-align: middle; }
        .avatar-lv1 { background-position: 0px 0px; } .avatar-lv5 { background-position: -64px 0px; } .avatar-lv10 { background-position: -128px 0px; } .avatar-lv15 { background-position: -192px 0px; } .avatar-lv20 { background-position: -256px 0px; } .avatar-lv30 { background-position: -320px 0px; }
        #roulette-box { font-size: 2.2rem; font-weight: bold; color: var(--purple); padding: 30px; border: 5px dashed var(--gold); margin: 20px 0; border-radius: 20px; background: #fffceb; text-align: center; }
        
        .coupon-card { background: #fff; border: 2.5px solid var(--purple); padding: 18px; border-radius: 18px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .coupon-card span { flex: 1; font-weight: bold; font-size: 1.3rem; margin-right: 10px; word-break: keep-all; }
        .coupon-card button { width: auto !important; padding: 10px 20px !important; margin: 0 !important; background: var(--purple); color: white; border: none; border-radius: 10px; cursor: pointer; flex-shrink: 0; }
        
        .checkin-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; gap: 10px; font-size: 1.3rem; width: 100%; box-sizing: border-box; }
        .checkin-no { width: 45px; flex-shrink: 0; font-weight: bold; text-align: center; }
        .checkin-name { width: 95px; flex-shrink: 0; font-weight: bold; }
        .checkin-status { flex: 1; text-align: center; font-weight: bold; }
        .checkin-time { width: 120px; flex-shrink: 0; text-align: right; color: #666; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div id="loading-screen">🏰 용사 본부 접속 중...</div>
    <div id="common-overlay" class="overlay"><div class="popup-box"><h2 id="pop-title" style="margin:0; text-align:center;">알림</h2><div id="pop-content"></div><button onclick="closePopup()" id="pop-close-btn" style="background:var(--green); color:white; border:none; border-radius:15px; padding:15px; font-size:1.4rem;">확인</button></div></div>
    <div id="point-popup" class="overlay"><div class="popup-box"><h2 id="point-pop-title" style="margin-top:0; text-align:center;">⚖️ 포인트 전령</h2><div id="point-pop-body" style="overflow-y:auto; flex:1; padding-right:10px;"></div><div style="display:flex; gap:15px; margin-top:20px;"><button onclick="closePointPopup()" style="background:#95a5a6; color:white; border:none; border-radius:15px; flex:1; padding:15px;">닫기</button><button id="point-apply-btn" style="background:var(--gold); font-weight:bold; border:none; border-radius:15px; flex:1; padding:15px;">반영하기</button></div></div></div>
    <div id="login-screen"><div class="login-box"><h1>🏰 6-6 본부</h1><button onclick="handleLogin()" style="background:#4285F4; color:white; border:none; border-radius:15px; padding:20px;">Google 로그인</button></div></div>

    <div id="main-app">
        <nav class="tab-menu">
            <button id="btn-main" onclick="showTab('main')">🤺 용사들</button>
            <button id="btn-shop" onclick="showTab('shop')">🛍️ 상점</button>
            <button id="btn-guide" style="display:none;" onclick="showTab('guide')">📜 도감</button>
            <button id="btn-checkin" onclick="showTab('checkin')">⚔️ 등교</button>
            <button id="btn-logs" style="display:none;" onclick="showTab('logs')">📅 등교로그</button>
            <button id="btn-points" onclick="showTab('points')">💰 연대기</button>
            <button id="btn-admin" style="display:none;" onclick="showTab('admin')">🛡️ 관리</button>
        </nav>

        <section id="tab-main" class="tab-content active"><div id="hero-grid" class="hero-grid"></div></section>
        <section id="tab-shop" class="tab-content">
            <div id="admin-shop-mgr" class="card" style="display:none; border:3px solid var(--purple);">
                <h3>📦 물품 등록</h3>
                <select id="item-cat-in"><option value="🍕 먹거리">🍕 먹거리</option><option value="🎫 쿠폰">🎫 쿠폰</option><option value="🎲 뽑기">🎲 뽑기</option><option value="✏️ 학용품">✏️ 학용품</option><option value="✨ 기타">✨ 기타</option></select>
                <input type="text" id="item-name-in" placeholder="상품명"><input type="number" id="item-price-in" placeholder="가격(P)"><input type="number" id="item-limit-in" placeholder="인당 제한(0:무제한)">
                <button onclick="addItem()" style="background:var(--purple); color:white; border:none; border-radius:12px;">진열</button>
            </div>
            <div class="card"><h2>🛍️ 용사 보급소</h2><div id="shop-list"></div></div>
            <div id="admin-order-mgr" class="card" style="display:none; border:2px solid var(--red);"><h3>📜 사용 요청</h3><div id="order-list"></div></div>
        </section>
        <section id="tab-guide" class="tab-content">
            <div id="admin-guide-mgr" class="card" style="display:none;"><input type="text" id="guide-title" placeholder="항목"><input type="number" id="guide-p" placeholder="P"><input type="number" id="guide-e" placeholder="E"><button onclick="addGuide()" style="background:var(--primary); color:white; border:none; border-radius:12px;">등록</button></div>
            <div class="card"><h2>📜 포인트 도감</h2><div id="guide-list" class="hero-grid"></div></div>
        </section>
        <section id="tab-checkin" class="tab-content"><div class="card"><h2>⚔️ 등교 확인</h2><div id="checkin-guide" style="font-weight:bold; margin-bottom:15px; color:var(--dark);"></div><input type="text" id="checkin-pass" placeholder="오늘의 암호" style="text-align:center;"><button onclick="submitCheckIn()" style="background:var(--primary); color:white; border:none; border-radius:15px; padding:20px;">본부 소환!</button></div></section>
        <section id="tab-logs" class="tab-content"><div class="card"><h2>📅 등교 기록부</h2><div style="margin-bottom:15px; display:flex; align-items:center; gap:10px;"><span style="font-weight:bold;">날짜 선택:</span><input type="date" id="checkin-date-filter" style="flex:1; padding:10px;"></div><div id="checkin-history" style="width:100%;"></div></div></section>
        <section id="tab-points" class="tab-content"><div id="my-inventory" class="card"><h3>🎁 나의 인벤토리</h3><div id="my-coupon-list"></div></div><div class="card"><h3>📜 포인트 연대기</h3><div id="point-history-list"></div></div></section>
        <section id="tab-admin" class="tab-content">
            <div class="card"><h3>👥 명단 관리</h3><div id="student-admin-list"></div></div>
            <div class="card"><h3>⚙️ 시스템 설정</h3>암호:<input type="text" id="conf-pass"> 지각:<input type="time" id="conf-late"> 마감:<input type="time" id="conf-close"> 루틴:<textarea id="conf-routine" rows="4"></textarea><button onclick="saveSettings()">저장</button></div>
            <div class="card"><h3>🎁 레벨업 보상</h3><textarea id="conf-gifts" rows="4" placeholder="보상을 한 줄씩 입력"></textarea><button onclick="saveGifts()">저장</button></div>
            <div class="card"><h3>🆕 학생 일괄 등록</h3><textarea id="bulk-in" rows="3" placeholder="이름,이메일"></textarea><button onclick="bulkReg()">주입</button></div>
        </section>
        <button id="floating-point-btn" class="floating-btn" onclick="openPointBulkPopup()">⚖️</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDWdWrw8LJ6tSiyF1X5tENJEvBfY-DzSw0", authDomain: "cs6-6class.firebaseapp.com", databaseURL: "https://cs6-6class-default-rtdb.firebaseio.com/", projectId: "cs6-6class", storageBucket: "cs6-6class.firebasestorage.app", messagingSenderId: "644235499537", appId: "1:644235499537:web:2ede2611f4ec6a3e8179b0" };
        const adminEmail = "ksosuny@cberi.go.kr"; firebase.initializeApp(firebaseConfig); const db = firebase.database(); const auth = firebase.auth(); const provider = new firebase.auth.GoogleAuthProvider();
        let myName = "", isAdmin = false, isHelper = false, currentUsers = [], allLogs = [], routineItems = [], giftList = [], rIdx = 0;
        let currentTab = sessionStorage.getItem('activeTab') || 'main';

        function getAvatar(lv) { let c = lv >= 30 ? "avatar-lv30" : lv >= 20 ? "avatar-lv20" : lv >= 15 ? "avatar-lv15" : lv >= 10 ? "avatar-lv10" : lv >= 5 ? "avatar-lv5" : "avatar-lv1"; return `<div class="pixel-avatar ${c}"></div>`; }

        auth.onAuthStateChanged(user => {
            const lBox = document.getElementById('loading-screen'), lgn = document.getElementById('login-screen'), mApp = document.getElementById('main-app');
            if (user) {
                isAdmin = (user.email.toLowerCase() === adminEmail.toLowerCase());
                db.ref('userEmails/' + user.email.replace(/\./g, ',')).once('value', snap => {
                    if (snap.exists() || isAdmin) {
                        myName = snap.val() || "총사령관";
                        db.ref('users/' + myName).once('value', uSnap => {
                            isHelper = uSnap.val()?.isHelper || false;
                            lBox.style.display = 'none'; lgn.style.display = 'none'; mApp.style.display = 'block';
                            if(isAdmin) { ['floating-point-btn','btn-guide','btn-logs','btn-admin'].forEach(id=>document.getElementById(id).style.display = id.includes('btn')?'block':'flex'); document.querySelectorAll('#admin-shop-mgr, #admin-guide-mgr').forEach(el=>el.style.display='block'); }
                            if(isAdmin || isHelper) document.getElementById('admin-order-mgr').style.display='block';
                            startApp(); showTab(currentTab);
                        });
                    } else { alert("미등록!"); auth.signOut(); }
                });
            } else { lBox.style.display = 'none'; lgn.style.display = 'flex'; mApp.style.display = 'none'; }
        });

        function handleLogin() { auth.signInWithPopup(provider); }
        function showTab(t) { currentTab = t; sessionStorage.setItem('activeTab', t); document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active')); document.querySelectorAll('.tab-menu button').forEach(b => b.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active'); if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.add('active'); }

        function startApp() {
            db.ref('settings').on('value', snap => { const s = snap.val() || {}; giftList = s.giftList || []; routineItems = s.routineText?.split('\n').filter(t=>t.trim()) || []; document.getElementById('conf-pass').value = s.password || ""; document.getElementById('conf-late').value = s.lateTime || "08:40"; document.getElementById('conf-close').value = s.closeTime || "09:00"; document.getElementById('checkin-guide').innerText = `✅ 정상: ~${s.lateTime || '08:40'} | ⚠️ 지각: ${s.closeTime || '09:00'} 마감`; });
            db.ref('users').on('value', snap => {
                let users = []; snap.forEach(c => { let u = c.val(); u.name = c.key; users.push(u); });
                currentUsers = users.sort((a,b) => (a.no||99)-(b.no||99));
                let h = ""; currentUsers.forEach(u => { if(u.name!=="총사령관") h += `<div class="hero-card ${u.name===myName?'me':''}" onclick="openUserHistory('${u.name}')"><span class="card-avatar">${getAvatar(u.lv||1)}</span><b>LV.${u.lv||1} ${u.name}</b><br>${u.points||0}P</div>`; });
                document.getElementById('hero-grid').innerHTML = h;
                if(isAdmin) {
                    let aH = ""; currentUsers.forEach(u => { if(u.name!=="총사령관") aH += `<div class="list-item" style="padding:20px;"><input type="number" value="${u.no||''}" onchange="updateNo('${u.name}', this.value)" style="width:70px; height:50px; margin:0; text-align:center; border:2px solid var(--primary);"><span style="flex:1; margin-left:15px;"><strong>${u.name}</strong> ${u.isHelper?'[도우미]':''}</span><div><button onclick="toggleHelper('${u.name}',${u.isHelper||false})" style="width:auto; padding:5px 10px;">권한</button><button onclick="delUser('${u.name}')" style="width:auto; padding:5px 10px; background:var(--red); color:white; border:none; margin-left:5px;">제거</button></div></div>`; });
                    document.getElementById('student-admin-list').innerHTML = aH;
                }
                renderCheckinBoard();
            });
            db.ref('shop').on('value', snap => {
                let h = ""; snap.forEach(c => {
                    const i = c.val(); 
                    let btns = isAdmin 
                        ? `<button onclick="editItem('${c.key}', '${i.name}', ${i.price}, ${i.limit||0})" style="width:auto; padding:10px; background:var(--purple); color:white; border:none; border-radius:8px; margin-right:5px;">수정</button>
                           <button onclick="deleteItem('${c.key}', '${i.name}')" style="width:auto; padding:10px; background:var(--red); color:white; border:none; border-radius:8px;">삭제</button>`
                        : `<button onclick="buyItem('${c.key}','${i.name}',${i.price},${i.limit||0})" style="width:auto; padding:10px; background:var(--primary); color:white; border:none; border-radius:8px;">구매</button>`;
                    h += `<div class="list-item"><span>[${i.cat||'✨'}] ${i.name} (${i.price}P) ${i.limit>0?`<b style="color:var(--red); font-size:0.9rem;">(인당 ${i.limit}개)</b>`:''}</span><div>${btns}</div></div>`;
                });
                document.getElementById('shop-list').innerHTML = h;
            });
            db.ref('orders').on('value', snap => {
                let cH = "", oH = ""; snap.forEach(c => {
                    const o = c.val(); if(o.user === myName && o.status !== '완료') {
                        const isW = (o.status === '사용요청');
                        cH += `<div class="coupon-card"><span>${o.item} ${isW ? '<b style="color:var(--red);">(⏳요청중)</b>' : ''}</span><button onclick="requestUseCoupon('${c.key}','${o.item}')" ${isW ? 'disabled' : ''}>${isW ? '대기' : '사용'}</button></div>`;
                    }
                    if((isAdmin || isHelper) && o.status === '사용요청') oH += `<div class="list-item"><span>${o.user}: ${o.item}</span><button onclick="approveOrder('${c.key}')" style="width:auto; padding:10px; background:var(--green); color:white; border:none; border-radius:8px;">승인</button></div>`;
                });
                document.getElementById('my-coupon-list').innerHTML = cH || "보유 물품 없음"; document.getElementById('order-list').innerHTML = oH || "사용 요청 없음";
            });
            db.ref('pointGuide').on('value', snap => {
                let h = ""; snap.forEach(c => { const g = c.val(); h += `<div class="hero-card" onclick="openPointBulkPopup('${g.title}',${g.p},${g.e})"><b>${g.title}</b><br><span style="color:var(--primary); font-weight:bold;">${g.p}P / ${g.e}E</span></div>`; });
                document.getElementById('guide-list').innerHTML = h || "도감 비어있음";
            });
            db.ref('pointLogs').on('value', snap => { allLogs = []; snap.forEach(c => allLogs.push(c.val())); renderHistory(); });
        }

        const renderCheckinBoard = () => {
            const td = document.getElementById('checkin-date-filter').value || new Date().toISOString().split('T')[0];
            db.ref('checkinLogs').once('value', snap => {
                const logs = {}; snap.forEach(c => { const l = c.val(); if(l.date === td) logs[l.name] = l; });
                let h = `<div style="margin-bottom:15px; font-weight:bold; font-size:1.2rem;">📌 [${td}] 등교 상태</div>`;
                currentUsers.forEach(u => {
                    if(u.name === "총사령관") return;
                    const log = logs[u.name]; let color = "#bdc3c7", txt = "미등교", bg = "";
                    if(log) { color = log.result.includes('정상') ? "var(--green)" : "var(--red)"; txt = log.result; }
                    else { bg = "background-color: #ffff00; font-weight: bold;"; color = "#f1c40f"; }
                    h += `<div class="checkin-item" style="border-left:15px solid ${color}; ${bg}">
                            <span class="checkin-no">${u.no||''}</span>
                            <span class="checkin-name">${u.name}</span>
                            <span class="checkin-status" style="color:${color};">${txt}</span>
                            <span class="checkin-time">${log?.time || '-'}</span>
                          </div>`;
                });
                document.getElementById('checkin-history').innerHTML = h;
            });
        };

        async function buyItem(k, n, p, limit) {
            if(limit > 0) {
                const sn = await db.ref('orders').once('value'); let count = 0;
                sn.forEach(o => { if(o.val().user === myName && o.val().item === n && o.val().status !== '취소') count++; });
                if(count >= limit) return alert("🚫 인당 " + limit + "개까지만 구매 가능합니다!");
            }
            db.ref('users/'+myName).once('value', sn => {
                if((sn.val().points||0) < p) return alert("포인트 부족!");
                if(confirm(`[${n}] 구매하시겠습니까?`)) { updatePoint(myName, -p, n + " 구매"); db.ref('orders').push({user:myName, item:n, status:'대기', time:new Date().toLocaleString()}); }
            });
        }

        function editItem(key, name, price, limit) {
            const n = prompt("수정할 물품 이름", name); if(n === null) return;
            const p = prompt("수정할 가격 (숫자만)", price); if(p === null) return;
            const l = prompt("1인당 구매 제한 (0은 무제한)", limit); if(l === null) return;
            db.ref('shop/' + key).update({ name: n, price: parseInt(p) || 0, limit: parseInt(l) || 0 }).then(() => alert("물품 정보가 수정되었습니다!"));
        }

        function deleteItem(k, n) { if(confirm(`[${n}] 물품을 삭제하시겠습니까?`)) db.ref('shop/' + k).remove(); }

        function openPointBulkPopup(t='', p='', e='') {
            let h = `<div style="position:sticky; top:0; background:white; padding-bottom:15px; border-bottom:3px solid var(--gold); z-index:10;"><input type="text" id="pop-bulk-reason" value="${t}" placeholder="사유"><div style="background:#fffdf2; padding:10px; border-radius:15px; border:2px dashed var(--gold); display:flex; gap:10px; align-items:center; justify-content:center; margin-bottom:10px;">P <input type="number" id="all-p-input" value="${p}" oninput="applyToAll('p')" style="width:80px; height:50px;"> E <input type="number" id="all-e-input" value="${e}" oninput="applyToAll('e')" style="width:80px; height:50px;"></div><div style="display:flex; justify-content:flex-end; gap:5px;"><button onclick="toggleAllCheckboxes(true)" style="width:auto; padding:5px 10px; font-size:0.9rem; background:var(--primary); color:white; border:none; border-radius:5px;">전체 선택</button><button onclick="toggleAllCheckboxes(false)" style="width:auto; padding:5px 10px; font-size:0.9rem; background:var(--red); color:white; border:none; border-radius:5px;">해제</button></div></div>`;
            currentUsers.forEach(u => { if(u.name!=="총사령관") h += `<div class="list-item" style="padding:10px 0;"><span><input type="checkbox" class="student-select" data-name="${u.name}" checked style="width:25px; height:25px;"> <strong>${u.no||''}. ${u.name}</strong></span><span>P <input type="number" class="pop-bulk-p" value="${p}" style="width:65px; height:45px;"> E <input type="number" class="pop-bulk-e" value="${e}" style="width:65px; height:45px;"></span></div>`; });
            document.getElementById('point-pop-body').innerHTML = h;
            document.getElementById('point-apply-btn').onclick = () => {
                const r = document.getElementById('pop-bulk-reason').value; if(!r) return alert("사유 입력!");
                const cbs = document.querySelectorAll('.student-select'), ps = document.querySelectorAll('.pop-bulk-p'), es = document.querySelectorAll('.pop-bulk-e');
                cbs.forEach((cb, i) => { if(cb.checked) addScore(cb.dataset.name, parseInt(ps[i].value)||0, parseInt(es[i].value)||0, r); });
                closePointPopup();
            };
            document.getElementById('point-popup').style.display = 'flex';
        }

       function addScore(name, p, e, reason) {
    db.ref('users/'+name).once('value', sn => {
        const u = sn.val(); if(!u) return; 
        let nE = (u.exp||0)+e, nL = (u.lv||1), nP = (u.points||0)+p, up = false;
        
        while(nE >= 100) { nL++; nE -= 100; up = true; }
        
        db.ref('users/'+name).update({exp:nE, lv:nL, points:nP}).then(() => {
            db.ref('pointLogs').push({name, amount:p, reason, time:new Date().toLocaleString()});
            // 레벨업 했고, 그게 본인이거나 관리자가 보고 있을 때 룰렛 실행
            if(up) {
                // 관리자가 지급해서 애가 레벨업한 경우 혹은 본인이 레벨업한 경우
                triggerLevelUpRoulette(name, nL);
            }
        });
    });
}

        function triggerLevelUpRoulette(un, lv) {
            if(!giftList.length) return openPopup("🎊 레벨업!", `LV.${lv} 달성!`);
            openPopup(`🎊 LEVEL UP! 🎊`, `<div style="text-align:center;"><p>LV.<b>${lv}</b> 달성 보상 룰렛!</p><div id="roulette-box">탐색 중...</div></div>`);
            document.getElementById('pop-close-btn').style.display='none';
            let c = 0; const iv = setInterval(() => {
                document.getElementById('roulette-box').innerText = giftList[Math.floor(Math.random()*giftList.length)];
                if(++c > 20) { clearInterval(iv); const res = document.getElementById('roulette-box').innerText; document.getElementById('pop-close-btn').style.display='block'; db.ref('orders').push({user:un, item:`[LV.${lv} 보상] ${res}`, status:'대기', time:new Date().toLocaleString()}); }
            }, 100);
        }

        function submitCheckIn() {
            const pw = document.getElementById('checkin-pass').value, now = new Date(), ds = now.toISOString().split('T')[0], ct = now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');
            db.ref('settings').once('value', sn => {
                const s = sn.val(); if(pw !== s.password) return alert("암호 오류!");
                let res = "정상 등교", p = 0; if(ct > s.closeTime) return alert("마감되었습니다.");
                if(ct > s.lateTime) { const [lh, lm] = s.lateTime.split(':').map(Number); const diff = (now.getHours()*60+now.getMinutes())-(lh*60+lm); p = -diff; res = `지각(${diff}분)`; }
                updatePoint(myName, p, res); db.ref('checkinLogs').push({name:myName, result:res, time:now.toLocaleTimeString(), date:ds});
                rIdx = 0; if(routineItems.length) openPopup("✨ 성공", `[루틴 1단계]\n${routineItems[0]}`, true); else alert("등교 완료!");
                document.getElementById('checkin-pass').value = "";
            });
        }

        function openUserHistory(un) {
            db.ref('users/'+un).once('value', sn => {
                const u = sn.val(), exp = u.exp||0, lv = u.lv||1, pts = u.points||0;
                let h = `<div style="text-align:center; padding:20px; background:#f8f9fa; border-radius:20px; margin-bottom:15px;"><strong>LV.${lv} ${un} 용사</strong><div style="font-size:1.6rem; color:var(--primary); font-weight:bold; margin-top:5px;">현재: ${pts}P</div><div style="background:#ddd; height:20px; border-radius:10px; margin:15px 0; overflow:hidden;"><div style="background:var(--primary); width:${exp}%; height:100%;"></div></div>EXP ${exp}/100</div>`;
                allLogs.filter(l=>l.name===un).reverse().slice(0, 20).forEach(l => h += `<div class="list-item" style="border-left:10px solid var(--primary);"><span>${l.reason}</span><strong>${l.amount > 0 ? '+' : ''}${l.amount}P</strong></div>`);
                openPopup(`${un} 활동 기록`, h);
            });
        }

        function toggleAllCheckboxes(status) { document.querySelectorAll('.student-select').forEach(cb => cb.checked = status); }
        function applyToAll(type) { const val = document.getElementById('all-' + type + '-input').value; document.querySelectorAll('.pop-bulk-' + type).forEach(i => i.value = val); }
        function closePointPopup() { document.getElementById('point-popup').style.display='none'; }
        function openPopup(t,h,r=false) { document.getElementById('pop-title').innerHTML=t; document.getElementById('pop-content').innerHTML=h; document.getElementById('common-overlay').style.display='flex'; window.routineActive=r; }
        function closePopup() { if(window.routineActive && ++rIdx < routineItems.length) document.getElementById('pop-content').innerText = `[루틴 ${rIdx+1}단계]\n${routineItems[rIdx]}`; else document.getElementById('common-overlay').style.display='none'; }
        function updatePoint(n,a,r) { db.ref('users/'+n).once('value', sn => { db.ref('users/'+n).update({points:(sn.val().points||0)+a}); db.ref('pointLogs').push({name:n, amount:a, reason:r, time:new Date().toLocaleString()}); }); }
        function requestUseCoupon(k,n) { if(confirm(`[${n}] 사용 요청?`)) db.ref('orders/'+k).update({status:'사용요청'}); }
        function approveOrder(k) { if(confirm("승인?")) db.ref('orders/'+k).update({status:'완료'}); }
        function updateNo(n, v) { db.ref('users/' + n).update({ no: v }); }
        function toggleHelper(n,s) { if(confirm(`${n} 권한 변경?`)) db.ref('users/'+n).update({isHelper:!s}); }
        function delUser(n) { if(confirm(`${n} 제거?`)) db.ref('users/'+n).remove(); }
        
        function renderHistory() { 
    let h = ""; 
    [...allLogs].reverse().slice(0, 50).forEach(l => { 
        // 관리자면 다 보여주고, 학생이면 자기 이름인 것만 보여줌
        if(isAdmin || l.name === myName) {
            const color = l.amount > 0 ? "var(--green)" : (l.amount < 0 ? "var(--red)" : "#888");
            h += `<div class="list-item" style="border-left:10px solid ${color};">
                    <span><strong>${l.name}</strong>: ${l.reason} <small style="color:#888;">(${l.time})</small></span>
                    <strong>${l.amount > 0 ? '+' : ''}${l.amount}P</strong>
                  </div>`; 
        }
    }); 
    const target = document.getElementById('point-history-list');
    if(target) target.innerHTML = h || "기록이 아직 없습니다.";
}
        function saveSettings() { db.ref('settings').update({password: document.getElementById('conf-pass').value, lateTime: document.getElementById('conf-late').value, closeTime: document.getElementById('conf-close').value, routineText: document.getElementById('conf-routine').value}); alert("저장 완료!"); }
        function saveGifts() { db.ref('settings').update({giftList: document.getElementById('conf-gifts').value.split('\n').filter(t=>t.trim())}); alert("저장 완료!"); }
        function addItem() { const n=document.getElementById('item-name-in').value, p=parseInt(document.getElementById('item-price-in').value), l=parseInt(document.getElementById('item-limit-in').value)||0, c=document.getElementById('item-cat-in').value; if(n&&p) db.ref('shop').push({cat:c, name:n, price:p, limit:l}); }
        function addGuide() { const t=document.getElementById('guide-title').value, p=parseInt(document.getElementById('guide-p').value)||0, e=parseInt(document.getElementById('guide-e').value)||0; if(t) db.ref('pointGuide').push({title:t, p, e}); }
        function bulkReg() { document.getElementById('bulk-in').value.split('\n').forEach(l => { const [n,e]=l.split(',').map(s=>s.trim()); if(n&&e) { db.ref('userEmails/'+e.replace(/\./g,',')).set(n); db.ref('users/'+n).update({points:0, exp:0, lv:1}); }}); alert("주입 완료!"); }
    </script>
</body>
</html>
