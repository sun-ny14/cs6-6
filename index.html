<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-6 용사 본부</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --purple: #9b59b6; --bg: #ecf0f1; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 60px; font-size: 1.4rem; }
        input, button, textarea, select { width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; border: 2px solid #ccc; box-sizing: border-box; font-size: 1.4rem; }
        #loading-screen { display: flex; justify-content: center; align-items: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); color: white; z-index: 3000; font-size: 1.8rem; }
        #login-screen { display: none; justify-content: center; align-items: center; min-height: 100vh; background: var(--dark); padding: 20px; }
        .login-box { background: white; padding: 50px 40px; border-radius: 30px; text-align: center; width: 100%; max-width: 450px; }
        #main-app { display: none; }
        .tab-menu { display: flex; background: var(--dark); position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .tab-menu button { flex: 1; min-width: 95px; padding: 20px 10px; border: none; background: none; color: #95a5a6; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .tab-menu button.active { color: white; border-bottom: 5px solid var(--gold); }
        .tab-content { display: none; padding: 20px; max-width: 1200px; margin: auto; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #eee; gap: 10px; font-size: 1.3rem; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 20px; margin-top: 20px; }
        .hero-card { background: white; border-radius: 20px; padding: 25px 15px; text-align: center; box-shadow: 0 6px 15px rgba(0,0,0,0.1); border: 3px solid transparent; cursor: pointer; }
        .hero-card.me { border-color: var(--gold); background: #fffdf2; transform: scale(1.03); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .popup-box { background: white; padding: 20px; border-radius: 25px; width: 95%; max-width: 700px; display: flex; flex-direction: column; max-height: 95vh; }
        #pop-close-btn { order: -1; margin-bottom: 15px; background: var(--green); color: white; border: none; border-radius: 15px; padding: 15px; font-size: 1.4rem; font-weight: bold; }
        #pop-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-right: 5px; border-top: 1px solid #eee; }
        .floating-btn { position: fixed; bottom: 25px; width: 85px; height: 85px; border-radius: 45px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 999; font-size: 2.2rem; display: none; align-items: center; justify-content: center; border: none; cursor: pointer; }
        #floating-point-btn { right: 25px; background: var(--gold); color: var(--dark); }
        #floating-multi-btn { right: 120px; background: #2ecc71; color: white; }
        /* 비활성화 버튼 스타일 (추가) */
        button:disabled { background: #bdc3c7 !important; color: #7f8c8d !important; cursor: not-allowed; }
        
        /* =========================================
        도감(포인트 기준) 전용 레이아웃 추가
        ========================================= */
        #guide-list.hero-grid {
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 15px;
        }
        /* 새 도감 등록 버튼이 한 줄을 다 차지하도록 수정 */
        #guide-list > button {
            grid-column: 1 / -1; 
        }
        /* 도감 전용 카드 디자인 */
        #guide-list .hero-card {
            padding: 25px 15px; 
            border-radius: 12px;
            border: 1px solid #ccc; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            font-size: 1.2rem; 
        }
        #guide-list .hero-card b {
            font-size: 1.3rem; 
        }
        #guide-list .hero-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div id="loading-screen">🏰 용사 본부 접속 중...</div>
    <div id="common-overlay" class="overlay"><div class="popup-box"><h2 id="pop-title" style="margin:0; text-align:center;">알림</h2><div id="pop-content"></div><button onclick="closePopup()" id="pop-close-btn">확인(닫기)</button></div></div>
    
    <div id="point-popup" class="overlay"><div class="popup-box"><h2 id="point-pop-title" style="margin-top:0; text-align:center;">⚖️ 포인트 전령</h2><div id="point-pop-body" style="overflow-y:auto; flex:1;"></div><div style="display:flex; gap:15px; margin-top:20px;"><button onclick="closePointPopup()" style="background:#95a5a6; color:white; border:none; border-radius:15px; flex:1; padding:15px;">닫기</button><button id="point-apply-btn" style="background:var(--gold); font-weight:bold; border:none; border-radius:15px; flex:1; padding:15px;">반영하기</button></div></div></div>

    <div id="multi-popup" class="overlay">
        <div class="popup-box">
            <h2 style="text-align:center; margin-top:0;">📋 일괄 지급</h2>
            <div style="background:#f8f9fa; padding:15px; border-radius:15px; margin-bottom:15px;">
                <input type="text" id="multi-reason" placeholder="사유">
                <div style="display:flex; gap:10px;"><input type="number" id="multi-p" placeholder="P"><input type="number" id="multi-e" placeholder="E"></div>
                <div style="display:flex; justify-content:space-between; margin-top:10px;"><button onclick="checkAllMulti(true)" style="width:48%; background:var(--dark); color:white; padding:10px;">전체 선택</button><button onclick="checkAllMulti(false)" style="width:48%; background:#95a5a6; color:white; padding:10px;">해제</button></div>
            </div>
            <div id="multi-list" style="flex:1; overflow-y:auto; border:1px solid #ddd; border-radius:10px; padding:5px;"></div>
            <div style="display:flex; gap:10px; margin-top:20px;"><button onclick="closeMultiPopup()" style="background:#95a5a6; color:white; border:none; border-radius:15px; flex:1; padding:18px;">취소</button><button onclick="applyMultiScores()" style="background:var(--gold); font-weight:bold; border:none; border-radius:15px; flex:1; padding:18px;">지급 완료</button></div>
        </div>
    </div>

    <div id="login-screen"><div class="login-box"><h1>🏰 6-6 본부</h1><button onclick="handleLogin()" style="background:#4285F4; color:white; border:none; border-radius:15px; padding:20px;">Google 로그인</button></div></div>

    <div id="main-app">
        <nav class="tab-menu">
            <button id="btn-main" onclick="showTab('main')">🤺 용사들</button>
            <button id="btn-shop" onclick="showTab('shop')">🛍️ 상점</button>
            <button id="btn-checkin" onclick="showTab('checkin')">⚔️ 등교</button>
            <button id="btn-logs" style="display:none;" onclick="showTab('logs')">📅 등교로그</button>
            <button id="btn-points" onclick="showTab('points')">💰 포인트·도감</button>
            <button id="btn-budget" style="display:none;" onclick="showTab('budget')">💰 운영비</button>
            <button id="btn-admin" style="display:none;" onclick="showTab('admin')">🛡️ 관리</button>
        </nav>

        <section id="tab-main" class="tab-content active"><div id="hero-grid" class="hero-grid"></div></section>
        
        <section id="tab-shop" class="tab-content">
            <div class="card"><h2>🛍️ 용사 보급소</h2><div id="shop-list"></div></div>
            <div id="admin-order-mgr" class="card" style="display:none; border:2px solid var(--red);"><h3>📜 사용 요청 승인</h3><div id="order-list"></div></div>
        </section>

        <section id="tab-checkin" class="tab-content"><div class="card"><h2>⚔️ 등교 확인</h2><div id="checkin-guide" style="font-weight:bold; margin-bottom:15px; color:var(--dark);"></div><input type="number" id="checkin-pass" placeholder="오늘의 등교 암호 4자리 입력" style="text-align:center;">
        <button id="checkin-btn" onclick="submitCheckIn()" style="background:var(--primary); color:white; border:none; border-radius:15px; padding:20px;">본부 소환!</button></div></section>
        
        <section id="tab-logs" class="tab-content">
            <div class="card">
                <div style="background: #eef2f7; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; border: 2px solid var(--primary);">
                    <label for="checkin-date-filter" style="display: block; font-weight: bold; font-size: 1.4rem; margin-bottom: 10px; color: var(--dark);">📅 등교 조회 날짜</label>
                    <input type="date" id="checkin-date-filter" onchange="generateNewLayout()" 
                           style="width: 100%; max-width: 300px; font-size: 1.8rem; padding: 10px; border-radius: 10px; border: 1px solid #ccc; text-align: center;">
                </div>

                <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                    <button onclick="openExclusionPopup()" style="flex: 1; background: var(--purple); color: white; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 1.2rem; border: none; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">🚫 고정 등교제외 설정</button>
                    <button onclick="toggleSeatEditMode()" id="edit-mode-btn" style="flex: 1; background: var(--dark); color: white; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 1.2rem; border: none;">🪑 좌석 배치 수정</button>
                    <button onclick="downloadMonthlyExcel()" style="width: 70px; background: var(--green); color: white; border-radius: 12px; border: none; font-size: 1rem; font-weight: bold;">📊 엑셀</button>
                </div>

                <div id="seat-edit-panel" style="display:none; background:#fff3cd; padding:15px; border-radius:15px; margin-bottom:15px; border: 2px dashed #ffc107;">
                    <div style="display:flex; gap:10px; align-items:center; justify-content: center;">
                        가로 <input type="number" id="seat-cols" value="5" style="width:70px; font-size: 1.2rem;"> x 
                        세로 <input type="number" id="seat-rows" value="6" style="width:70px; font-size: 1.2rem;">
                        <button onclick="saveSeatLayout()" style="background:var(--primary); color:white; padding: 10px 20px; font-weight: bold; border-radius: 8px;">배치 저장</button>
                    </div>
                </div>

                <div id="seat-map-container" style="display:grid; gap:12px; width:100%; background:#f1f1f1; padding:15px; border-radius:15px; border: 1px solid #ddd;"></div>
            </div>
        </section> 

        <section id="tab-budget" class="tab-content">
            <div style="background:white; padding:20px; border-radius:20px; box-shadow:0 4px 15px rgba(0,0,0,0.1);">
                <h2 style="margin-top:0;">💵 학급운영비 현황</h2>
                <div id="budget-summary" style="font-size:1.2rem; margin-bottom:20px; padding:15px; background:var(--gold); border-radius:12px; font-weight:bold;">
                    잔액 계산 중...
                </div>
                
                <button onclick="openAddBudgetPopup()" style="width:100%; background:var(--primary); color:white; margin-bottom:15px; padding:15px; font-size:1.1rem; font-weight:bold; border-radius:10px; border:none;">+ 내역 추가하기</button>
                
                <div style="overflow-x:auto;">
                    <table style="width:100%; border-collapse:collapse; min-width:500px; text-align:center;">
                        <thead>
                            <tr style="border-bottom:2px solid #eee; background:#f8f9fa;">
                                <th style="padding:15px 10px;">날짜</th>
                                <th style="padding:15px 10px;">쇼핑몰/처</th>
                                <th style="padding:15px 10px;">용도</th>
                                <th style="padding:15px 10px;">금액</th>
                                <th style="padding:15px 10px;">관리</th>
                            </tr>
                        </thead>
                        <tbody id="budget-list">
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="tab-points" class="tab-content">
            <div class="card">
                <h2>📜 포인트 도감 <small style="font-size:1rem; color:#666;">(클릭 시 일괄 지급)</small></h2>
                <div id="guide-list" class="hero-grid"></div>
            </div>
            
            <div id="my-inventory" class="card">
                <h3>🎁 나의 인벤토리</h3>
                <div id="inv-unused" class="inv-section"><h4>📦 미사용 보관함</h4><div class="list"></div></div>
                <div id="inv-waiting" class="inv-section"><h4>⏳ 사용 대기중</h4><div class="list"></div></div>
            </div>
            
            <div class="card"><h3>📜 포인트 연대기</h3><div id="point-history-list"></div></div>
        </section>

        <section id="tab-admin" class="tab-content">
            <div class="card"><h3>👥 명단 관리 (번호/도우미)</h3><div id="student-admin-list"></div></div>
            <div class="card"><h3>⚙️ 시스템 설정</h3>
                <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
                    암호:<input type="text" id="conf-pass" style="flex:1;">
                    <button onclick="generateRandomPassword()" style="background:#ff9800; color:white; width:auto; padding:15px; font-weight:bold; border-radius:12px; border:none;">🎲 난수 비번 자동 생성</button>
                </div>
                지각:<input type="time" id="conf-late"> 마감:<input type="time" id="conf-close"> 
                루틴:<textarea id="conf-routine" rows="4"></textarea><button onclick="saveSettings()">시스템 저장</button></div>
            <div class="card"><h3>🎁 레벨업 보상</h3>보상목록:<textarea id="conf-gifts" rows="4"></textarea><button onclick="saveGifts()">보상 저장</button></div>
            <div class="card"><h3>🆕 학생 일괄 등록</h3><textarea id="bulk-in" rows="3" placeholder="이름,이메일"></textarea><button onclick="bulkReg()">주입</button></div>
        </section>
        
        <button id="floating-point-btn" class="floating-btn" onclick="openPointBulkPopup()">⚖️</button>
        <button id="floating-multi-btn" class="floating-btn" onclick="openMultiPopup()">📋</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDWdWrw8LJ6tSiyF1X5tENJEvBfY-DzSw0", authDomain: "cs6-6class.firebaseapp.com", databaseURL: "https://cs6-6class-default-rtdb.firebaseio.com/", projectId: "cs6-6class", storageBucket: "cs6-6class.firebasestorage.app", messagingSenderId: "644235499537", appId: "1:644235499537:web:2ede2611f4ec6a3e8179b0" };
        const adminEmail = "ksosuny@cberi.go.kr"; 
        firebase.initializeApp(firebaseConfig); 
        const db = firebase.database(); 
        const auth = firebase.auth(); 
        const provider = new firebase.auth.GoogleAuthProvider();

        let myName = "", isAdmin = false, isHelper = false, currentUsers = [], routineItems = [], giftList = [], rIdx = 0;
        let currentTab = sessionStorage.getItem('activeTab') || 'main';

        function getTodayKST() { const now = new Date(); const krTime = new Date(now.getTime() + (9 * 60 * 60 * 1000)); return krTime.getUTCFullYear() + "-" + String(krTime.getUTCMonth() + 1).padStart(2, '0') + "-" + String(krTime.getUTCDate()).padStart(2, '0'); }
        function forceScreenDisplay(status) {
            const load = document.getElementById('loading-screen'), login = document.getElementById('login-screen'), app = document.getElementById('main-app');
            if(load) load.style.display = 'none';
            if(status === 'app') { if(login) login.style.display = 'none'; if(app) app.style.display = 'block'; }
            else { if(login) login.style.display = 'flex'; if(app) app.style.display = 'none'; }
        }

        function getAvatar(lv, selectedAnimal) {
            const githubImageUrl = "https://github.com/sun-ny14/cs6-6/blob/main/%EC%9C%A1%EC%9C%A1%EC%9D%B4.png?raw=true"; 
            const animals = ["귀여운", "신사", "사랑스러운", "패셔니스타", "밥먹는", "날쌘돌이", "즐거운", "행복한", "정의로운", "천사", "닌자", "왕자", "공주", "근육맨", "마법사", "용사", "공부하는", "춤추는", "노래하는", "무지개"];
            
            const name = selectedAnimal || animals[Math.min(lv - 1, 19)];
            const index = animals.indexOf(name) === -1 ? 0 : animals.indexOf(name);
            
            const col = index % 5;
            const row = Math.floor(index / 5);
            
            const posX = col * 25; 
            const posY = row * 33.33; 

            return `
            <div style="width: 85px; height: 85px; overflow: hidden; border: 2px solid #eee; border-radius: 20px; background: white; margin: 0 auto; display: flex; align-items: center; justify-content: center; position: relative;">
                <div style="
                    width: 100%; 
                    height: 100%; 
                    background-image: url('${githubImageUrl}'); 
                    background-size: 500% 400%; 
                    background-position: ${posX}% ${posY}%; 
                    background-repeat: no-repeat;
                    image-rendering: pixelated;
                    transform: scale(1.15);
                    transform-origin: center;
                "></div>
            </div>`;
        }

        function openAvatarPicker() {
            const animals = ["귀여운", "신사", "사랑스러운", "패셔니스타", "밥먹는", "날쌘돌이", "즐거운", "행복한", "정의로운", "천사", "닌자", "왕자", "공주", "근육맨", "마법사", "용사", "공부하는", "춤추는", "노래하는", "무지개"];
            db.ref('users/' + myName).once('value', snap => {
                const lv = snap.val().lv || 1;
                const availableCount = Math.min(lv, 20);
                let h = `<p style="text-align:center; font-weight:bold; color:var(--primary); margin-bottom:15px;">✨ 레벨이 오를수록 새로운 칭호가 해금됩니다!</p>`;
                h += `<div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; padding:10px;">`;
                for(let i=0; i < 20; i++) {
                    if(i < availableCount) {
                        h += `<div onclick="selectAnimal('${animals[i]}')" style="cursor:pointer; text-align:center; border:2px solid var(--gold); border-radius:15px; padding:10px; background:#fffdf2; box-shadow:0 3px 6px rgba(0,0,0,0.1);">
                                ${getAvatar(i + 1, animals[i])}
                                <div style="font-size:0.8rem; font-weight:bold; margin-top:8px; color:var(--dark);">${animals[i]}</div>
                              </div>`;
                    } else {
                        h += `<div style="text-align:center; border:1px solid #eee; border-radius:15px; padding:10px; background:#f5f5f5; opacity: 0.6;">
                                <div style="width: 85px; height: 85px; display:flex; align-items:center; justify-content:center; margin: 0 auto; font-size:1.8rem; background:#ddd; border-radius:15px;">🔒</div>
                                <div style="font-size:0.7rem; color:#888; margin-top:8px;">LV.${i+1} 해금<br>(${animals[i]})</div>
                              </div>`;
                    }
                }
                openPopup("🎭 육육이 전직 본부", h + `</div>`);
            });
        } 

        function selectAnimal(animalName) { if(confirm(`${animalName}(으)로 변신하시겠습니까?`)) { db.ref('users/' + myName).update({ selectedAnimal: animalName }).then(() => { alert("변신 완료! ✨"); closePopup(); }); } }

        function handleLogin() { auth.signInWithPopup(provider); }
        
        function showTab(t) { 
            currentTab = t; 
            sessionStorage.setItem('activeTab', t); 
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active')); 
            document.querySelectorAll('.tab-menu button').forEach(b => b.classList.remove('active')); 
            document.getElementById('tab-'+t).classList.add('active'); 
            if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.add('active'); 
            if(t==='points') loadMyLogs(); 
            if(t==='logs') renderCheckinBoard(); 
        }

        function openPopup(t,h,r=false) { document.getElementById('pop-title').innerHTML=t; document.getElementById('pop-content').innerHTML=h; document.getElementById('common-overlay').style.display='flex'; window.routineActive=r; }
        function closePopup() { if(window.routineActive && ++rIdx < routineItems.length) document.getElementById('pop-content').innerText = `[루틴 ${rIdx+1}단계]\n${routineItems[rIdx]}`; else { document.getElementById('common-overlay').style.display='none'; rIdx = 0; } }
        function closePointPopup() { document.getElementById('point-popup').style.display='none'; }
        function closeMultiPopup() { document.getElementById('multi-popup').style.display='none'; }
        
        function generateNewLayout() {
            db.ref('seatLayoutData').once('value', snap => {
                const savedData = snap.val();
                
                if (savedData && savedData.layout) {
                    currentLayout = savedData.layout;
                    const rows = savedData.config.rows;
                    const cols = savedData.config.cols;
                    
                    document.getElementById('seat-rows').value = rows;
                    document.getElementById('seat-cols').value = cols;
                    
                    renderSeatMap(rows, cols);
                } else {

window.buyItem = async function(k, n, p, l) {
    // 1. 내 정보 및 포인트 불러오기
    const sn = await db.ref('users/' + myName).once('value');
    const myPoints = sn.val().points || 0;

    // 🛑 2. 마이너스 포인트 차단 (가장 먼저!)
    if (myPoints < 0) {
        return alert("현재 포인트가 마이너스 상태이므로 구매할 수 없습니다! 점수를 먼저 회복해 주세요. 😭");
    }

    // 🛑 3. 포인트 부족 차단
    if (myPoints < p) {
        return alert("포인트 부족!");
    }

    // 🛑 4. 상품 재고(stock) 확인 차단 (품절 기능)
    const itemSnap = await db.ref('shop/' + k).once('value');
    const itemData = itemSnap.val();
    
    // DB에 재고(stock) 값이 있고, 그게 0 이하라면 튕겨냄
    if (itemData && itemData.stock !== undefined && itemData.stock <= 0) {
        return alert("앗! 방금 품절된 상품입니다. 😭");
    }

    // 🛑 5. 구매 횟수(limit) 제한 확인 (선생님이 쓰시던 기존 로직)
    if (l > 0) {
        const ordersSnap = await db.ref('orders').once('value');
        let count = 0;
        ordersSnap.forEach(child => {
            const o = child.val();
            if (o.user === myName && o.item === n) {
                count++; 
            }
        });
        if (count >= l) {
            return alert(`이 상품은 최대 ${l}번까지만 구매할 수 있습니다!`);
        }
    }

    // --- 🟢 여기까지 모든 검사를 통과했다면 실제 구매 진행! ---

    // 6. 내 포인트 차감

                let nP = (u.points || 0) + p;
                let nE = (u.exp || 0) + e;
                let nL = (u.lv || 1);
                let up = false;

                while (nE >= 100) {
                    nL++;
                    nE -= 100;
                    up = true;
                }

                db.ref('users/' + studentName).update({
                    points: nP,
                    exp: nE,
                    lv: nL
                }).then(() => {

            });

        let isCheckingIn = false; 

        // ⏱️ [기존 코드 보존] 선생님께서 짜두신 완벽한 등교 함수를 그대로 유지합니다!
        async function submitCheckIn() {
            if (isCheckingIn) return; 
            
            const passInput = document.getElementById('checkin-pass');
            const checkinBtn = document.getElementById('checkin-btn');
            const pass = passInput.value.trim();
            
            if (!pass) return alert("암호 입력!");
            
            isCheckingIn = true;
            if (checkinBtn) {
                checkinBtn.disabled = true;
                checkinBtn.innerText = "등교 처리 중...";
            }
            
            try {
                const sSnap = await db.ref('settings').once('value');
                const settings = sSnap.val() || {};
                
                if (pass !== settings.password) {
                    alert("암호 오류!");
                    isCheckingIn = false;
                    if (checkinBtn) { checkinBtn.disabled = false; checkinBtn.innerText = "본부 소환!"; }
                    return;
                }
                
                const today = getTodayKST();
                const logSnap = await db.ref('checkinLogs').once('value');
                
                let isAlreadyCheckedIn = false;
                logSnap.forEach(l => { 
                    if (l.val().name === myName.trim() && l.val().date === today) {
                        if(l.val().result && l.val().result.includes("등교")) {
                            isAlreadyCheckedIn = true;
                        }
                    }
                });
                
                if (isAlreadyCheckedIn) {
                    alert("오늘 이미 등교가 완료된 용사입니다!");
                    if(checkinBtn) {
                        checkinBtn.innerText = "등교 완료됨";
                        checkinBtn.style.background = "#95a5a6";
                    }
                    return;
                }

                const now = new Date();
                const nowStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                
                let result = "정상 등교", p = 0, e = 10;
                const lateTime = settings.lateTime || "08:40";
                const closeTime = settings.closeTime || "09:00";

                if (nowStr > closeTime) {
                    alert("마감되었습니다!");
                    isCheckingIn = false;
                    if (checkinBtn) { checkinBtn.disabled = false; checkinBtn.innerText = "본부 소환!"; }
                    return;
                } 
                else if (nowStr > lateTime) {
                    result = "지각 등교";
                    const [lateH, lateM] = lateTime.split(':').map(Number);
                    const [nowH, nowM] = nowStr.split(':').map(Number);
                    const diffMin = (nowH * 60 + nowM) - (lateH * 60 + lateM);
                    
                    p = -Math.abs(diffMin); 
                    e = 0; 
                } 
                else {
                    result = "정상 등교";
                    p = 0; 
                    e = 3; 
                }

                const finalData = { 
                    name: myName.trim(), 
                    date: today, 
                    time: nowStr, 
                    result: result, 
                    category: result === "지각 등교" ? "지각" : "정상", 
                    subCategory: "해당없음", 
                    reason: "" 
                };
                
                await db.ref('checkinLogs').push(finalData);
                
                addScore(myName.trim(), p, e, result); 
                
                passInput.value = "";
                alert(p < 0 ? `⚠️ 지각 등교! ${Math.abs(p)}분 늦어 ${p}P 차감 완료!` : "✅ 정상 등교 완료!");
                
                if (checkinBtn) {
                    checkinBtn.innerText = "등교 완료됨";
                    checkinBtn.style.background = "#95a5a6";
                }
                
            } catch (error) {
                console.error(error);
                alert("서버 연결에 문제가 생겼습니다. 다시 눌러주세요.");
                isCheckingIn = false;
                if (checkinBtn) { checkinBtn.disabled = false; checkinBtn.innerText = "본부 소환!"; }
            }
        }

                    <span style="font-weight: bold; font-size: 1.5rem;">${logData.name}</span>
                    <span style="color: #666;">${logData.time || "미등교"}</span>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                    <select id="cat-${studentId}" style="padding: 10px; font-size: 1.1rem;">
                        <option value="정상" ${category === '정상' ? 'selected' : ''}>정상 등교</option>
                        <option value="결석" ${category === '결석' ? 'selected' : ''}>결석</option>
                        <option value="지각" ${category === '지각' ? 'selected' : ''}>지각</option>
                        <option value="조퇴" ${category === '조퇴' ? 'selected' : ''}>조퇴</option>
                        <option value="제외" ${category === '제외' ? 'selected' : ''}>기록 제외</option>
                    </select>
                    <select id="sub-${studentId}" style="padding: 10px; font-size: 1.1rem;">
                        <option value="해당없음" ${subCategory === '해당없음' ? 'selected' : ''}>-</option>
                        <option value="질병" ${subCategory === '질병' ? 'selected' : ''}>질병</option>
                        <option value="인정" ${subCategory === '인정' ? 'selected' : ''}>인정</option>
                        <option value="미인정" ${subCategory === '미인정' ? 'selected' : ''}>미인정</option>
                        <option value="방과후" ${subCategory === '방과후' ? 'selected' : ''}>방과후</option>
                    </select>
                </div>
                
                <input type="text" id="desc-${studentId}" placeholder="구체적인 사유 입력 (예: 아침 방과후, 감기 등)" 
                       value="${reason}" style="padding: 10px; font-size: 1.1rem; margin-bottom: 10px;">
                
                <button onclick="saveLogReason('${studentId}', '${date}')" 
                        style="background: var(--dark); color: white; padding: 10px; border: none; border-radius: 8px; width: 100%;">
                    사유 저장하기
                </button>
            </div>
            `;
        }
    
        let currentLayout = {}; 
        let isEditMode = false;
        let selectedStudentForMove = null;

        function toggleSeatEditMode() {
            isEditMode = !isEditMode;
            const panel = document.getElementById('seat-edit-panel');
            const btn = document.getElementById('edit-mode-btn');
            
            if(isEditMode) {
                panel.style.display = 'block';
                btn.innerText = '수정 완료(닫기)';
                btn.style.backgroundColor = "#e74c3c"; 
            } else {
                panel.style.display = 'none';
                btn.innerText = '좌석 배치 수정';
                btn.style.backgroundColor = "#2c3e50";
            }
            generateNewLayout(); 
        }

        function renderSeatMap(rows, cols) {
            const container = document.getElementById('seat-map-container');
            if(!container) return;
            container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            container.innerHTML = "";
            
            const targetDate = document.getElementById('checkin-date-filter').value || getTodayKST();
            const weekDays = ['일', '월', '화', '수', '목', '금', '토'];
            const selectedDay = weekDays[new Date(targetDate).getDay()];

            Promise.all([
                db.ref('checkinLogs').once('value'),
                db.ref('settings/fixedExclusions').once('value')
            ]).then(snaps => {
                const logs = {};
                snaps[0].forEach(l => { if(l.val().date === targetDate) logs[l.val().name] = l.val(); });
                
                const exclusionData = snaps[1].val() || {};
                const todayExclusions = exclusionData[selectedDay] || [];

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const posId = `${r}-${c}`;
                        const name = currentLayout[posId] || "";
                        const cell = document.createElement('div');
                        
                        let bgColor = "#eee"; 
                        let statusText = "미등교";
                        let textColor = "black";

                        if (name) {
                            const log = logs[name]; 
                            const isFixedExcluded = todayExclusions.includes(name); 

                            if (log) {
                                statusText = log.result;
                                if (log.result.includes('정상')) bgColor = "#ccffcc"; 
                                else if (log.result.includes('지각')) bgColor = "#ffcccc"; 
                                else {
                                    bgColor = "#f39c12"; 
                                    statusText = log.result;
                                }
                            } 
                            else if (isFixedExcluded) {
                                bgColor = "#3498db"; 
                                statusText = "고정 제외";
                                textColor = "white";
                            } 
                            else {
                                bgColor = "#ffff00"; 
                                statusText = "미등교";
                            }
                        }

                        cell.style = `background:${bgColor}; border:1px solid #bbb; min-height:120px; border-radius:12px; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:5px; cursor:pointer; color: ${textColor};`;

                        if (name) {
                            cell.innerHTML = `
                                <div style="font-weight:900; font-size:1.6rem; margin-bottom:5px;">${name}</div>
                                <div style="font-weight:bold; font-size:1.2rem;">${statusText}</div>
                                <div style="font-size:1.1rem; margin-top:3px;">${logs[name]?.time && logs[name].time !== '-' ? '[' + logs[name].time + ']' : ''}</div>
                            `;
                        }
                        
                        cell.onclick = () => {
                            if (isEditMode) openStudentPicker(posId, rows, cols);
                            else if (name) openLogEditPopup(name, targetDate); 
                        };
                        container.appendChild(cell);
                    }
                }
            });
        }

        function openStudentPicker(posId, rows, cols) {
            const assignedNames = Object.values(currentLayout);
            let h = `<div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; padding:10px;">`;
            
            h += `<button onclick="assignStudentToSeat('${posId}', '', ${rows}, ${cols})" style="background:#eee; color:#333;">❌ 비우기</button>`;
            
            currentUsers.forEach(u => {
                if(u.name === "총사령관") return;
                const isAssigned = assignedNames.includes(u.name);
                h += `<button onclick="assignStudentToSeat('${posId}', '${u.name}', ${rows}, ${cols})" 
                        style="background:${isAssigned ? '#ddd' : 'var(--primary)'}; color:white; font-size:1.1rem; padding:15px 5px;">
                        ${u.name}${isAssigned ? ' (배치됨)' : ''}
                      </button>`;
            });
            h += `</div>`;
            openPopup("🧑‍🎓 학생 배치", h);
        }

        function assignStudentToSeat(posId, name, rows, cols) {
            if(name === "") {
                delete currentLayout[posId];
            } else {
                for (let key in currentLayout) {
                    if (currentLayout[key] === name) delete currentLayout[key];
                }
                currentLayout[posId] = name;
            }
            closePopup();
            renderSeatMap(rows, cols);
        }

        function downloadMonthlyExcel() {
            const targetMonth = document.getElementById('checkin-date-filter').value.substring(0, 7); 
            if(!targetMonth) return alert("날짜를 먼저 선택해주세요!");

            db.ref('checkinLogs').once('value', snap => {
                let rows = [["날짜", "이름", "결과", "등교시간", "대항목", "소항목", "구체사유"]];
                snap.forEach(c => {
                    const l = c.val();
                    if(l.date && l.date.startsWith(targetMonth)) {
                        rows.push([l.date, l.name, l.result, l.time || "-", l.category || "-", l.subCategory || "-", l.reason || "-"]);
                    }
                });

                if(rows.length === 1) return alert("해당 월의 데이터가 없습니다.");

                const worksheet = XLSX.utils.aoa_to_sheet(rows);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "등교기록");
                XLSX.writeFile(workbook, `6-6_등교기록_${targetMonth}.xlsx`);
            });
        }

        function saveSeatLayout() {
            const rows = document.getElementById('seat-rows').value;
            const cols = document.getElementById('seat-cols').value;
            
            const dataToSave = {
                layout: currentLayout,
                config: { rows: rows, cols: cols }
            };

            db.ref('seatLayoutData').set(dataToSave)
            .then(() => alert("좌석 배치가 저장되었습니다! ✨"))
            .catch(err => alert("저장 실패: " + err));
        }

        function openLogEditPopup(name, date) {
            db.ref('checkinLogs').once('value', snap => {
                let logKey = null;
                let logData = {};
                snap.forEach(c => {
                    if(c.val().name === name && c.val().date === date) {
                        logKey = c.key;
                        logData = c.val();
                    }
                });

                const h = `
                    <div style="text-align:left; padding:10px;">
                        <h3 style="text-align:center;">${name} 등교 상세 기록</h3>
                        <label>🚩 등교 상태 (대항목)</label>
                        <select id="edit-cat">
                            <option value="정상" ${logData.result === '정상 등교' ? 'selected' : ''}>정상 등교</option>
                            <option value="지각" ${logData.result === '지각 등교' ? 'selected' : ''}>지각</option>
                            <option value="결석" ${logData.category === '결석' ? 'selected' : ''}>결석</option>
                            <option value="조퇴" ${logData.category === '조퇴' ? 'selected' : ''}>조퇴</option>
                            <option value="제외" ${logData.category === '제외' ? 'selected' : ''}>기록 제외(방과후 등)</option>
                        </select>

                        <label>🔍 사유 구분 (소항목)</label>
                        <select id="edit-sub">
                            <option value="해당없음" ${logData.subCategory === '해당없음' ? 'selected' : ''}>-</option>
                            <option value="질병" ${logData.subCategory === '질병' ? 'selected' : ''}>질병</option>
                            <option value="인정" ${logData.subCategory === '인정' ? 'selected' : ''}>인정</option>
                            <option value="미인정" ${logData.subCategory === '미인정' ? 'selected' : ''}>미인정</option>
                            <option value="기타" ${logData.subCategory === '기타' ? 'selected' : ''}>기타</option>
                        </select>

                        <label>📝 구체적 사유 기록</label>
                        <textarea id="edit-desc" rows="3" placeholder="예: 아침 방과후 농구팀, 독감으로 인한 결석 등">${logData.reason || ''}</textarea>
                        
                        <button onclick="saveDetailLog('${name}', '${date}', '${logKey}')" style="background:var(--primary); color:white; font-weight:bold; margin-top:15px;">상태 및 사유 저장</button>
                    </div>
                `;
                openPopup("📊 등교 기록 수정", h);
            });
        }

        function saveDetailLog(name, date, key) {
            const category = document.getElementById('edit-cat').value;
            const subCategory = document.getElementById('edit-sub').value;
            const reason = document.getElementById('edit-desc').value;
            
            let resultText = category;
            if (category === '정상' || category === '지각') resultText = category + ' 등교';

            const updateData = {
                name: name,
                date: date,
                category: category,
                subCategory: subCategory,
                reason: reason,
                result: resultText,
                time: "-" 
            };

            if(key && key !== 'null') {
                db.ref('checkinLogs/' + key).update(updateData).then(afterSave);
            } else {
                db.ref('checkinLogs').push(updateData).then(afterSave);
            }

            function afterSave() {
                alert("변동 사유가 반영되었습니다.");
                closePopup();
                generateNewLayout(); 
            }
        }

        function saveCurrentLayout() {
            const rows = document.getElementById('seat-rows').value;
            const cols = document.getElementById('seat-cols').value;
            
            db.ref('seatLayoutData').set({
                layout: currentLayout,
                config: {
                    rows: parseInt(rows),
                    cols: parseInt(cols)
                },
                updatedAt: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                alert("좌석 배치가 안전하게 저장되었습니다! 이제 새로고침해도 유지됩니다.");
                isEditMode = false; 
                toggleSeatEditMode(); 
            }).catch(err => {
                alert("저장 실패: " + err.message);
            });
        }

        function openExclusionPopup() {
            db.ref('settings/fixedExclusions').once('value', snap => {
                const data = snap.val() || {}; 
                const days = ['월', '화', '수', '목', '금'];
                
                let h = `<div style="text-align:left;">
                            <p style="font-size:1rem; color:var(--red); font-weight:bold; mb:10px;">* 요일별로 등교 체크에서 제외할 학생을 선택하세요.</p>
                            <div style="display:flex; gap:5px; margin-bottom:15px;">`;
                
                days.forEach(d => {
                    h += `<button onclick="showExclusionDay('${d}')" class="day-tab" id="tab-${d}" style="flex:1; padding:10px; border:1px solid #ccc; border-radius:8px;">${d}</button>`;
                });
                h += `</div>`;

                days.forEach(d => {
                    const excludedList = data[d] || [];
                    h += `<div id="day-cont-${d}" class="day-content" style="display:none; grid-template-columns:repeat(3, 1fr); gap:10px;">`;
                    currentUsers.forEach(u => {
                        if(u.name === "총사령관") return;
                        const isChecked = excludedList.includes(u.name);
                        h += `
                            <label style="background:#f8f9fa; padding:10px; border-radius:10px; text-align:center; border:2px solid ${isChecked ? 'var(--purple)' : '#eee'}">
                                <input type="checkbox" class="ex-check-${d}" value="${u.name}" ${isChecked ? 'checked' : ''}>
                                <div style="font-weight:bold; font-size:1.1rem;">${u.name}</div>
                            </label>`;
                    });
                    h += `</div>`;
                });
                
                h += `<button onclick="saveExclusionsByDay()" style="width:100%; margin-top:20px; background:var(--purple); color:white; padding:15px; border-radius:12px; font-weight:bold;">설정 저장하기</button></div>`;
                
                openPopup("🚫 요일별 등교제외 설정", h);
                showExclusionDay('월'); 
            });
        }

        function showExclusionDay(day) {
            document.querySelectorAll('.day-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.day-tab').forEach(el => el.style.background = 'white');
            document.getElementById('day-cont-' + day).style.display = 'grid';
            document.getElementById('tab-' + day).style.background = '#e9ecef';
        }

        function saveExclusionsByDay() {
            const data = {};
            ['월', '화', '수', '목', '금'].forEach(d => {
                const selected = [];
                document.querySelectorAll('.ex-check-' + d + ':checked').forEach(el => selected.push(el.value));
                data[d] = selected;
            });
            
            db.ref('settings/fixedExclusions').set(data).then(() => {
                alert("요일별 제외 명단이 파란색으로 표시되도록 저장되었습니다. ✨");
                closePopup();
                generateNewLayout(); 
            });
        }

        window.refundItem = async function(orderKey, itemName, price) {
            if(!confirm(`[품절 안내] ${itemName} 물품은 현재 품절되었습니다.\n${price}P를 환불받으시겠습니까?`)) return;
            
            addScore(myName, price, 0, `[품절] ${itemName} 환불`);
            await db.ref('orders/' + orderKey).remove();
            alert(`✅ ${price}P 환불이 완료되었습니다! (연대기 확인 가능)`);
        };

        window.approveSingleItem = function(key, user, item) {
            if(confirm(`${user} 용사의 [${item}] 1개를 승인하시겠습니까?`)) {
                db.ref('orders/' + key).update({status: '완료'})
                  .then(() => alert("✅ 개별 승인 완료!"));
            }
        };

        window.rejectSingleItem = function(key, user, item) {
            if(confirm(`${user} 용사의 [${item}] 요청을 거절하고 포인트를 환불하시겠습니까?`)) {
                let refundP = 0;
                if(window.shopData) {
                    window.shopData.forEach(c => {
                        if(c.val().name === item) {
                            refundP = c.val().price || 0;
                        }
                    });
                }
                
                db.ref('orders/' + key).remove().then(() => {
                    if(refundP > 0) {
                        addScore(user, refundP, 0, `[환불] ${item} 승인 거절`);
                    }
                    alert(`✅ 환불 완료! ${user} 용사에게 ${refundP}P가 복구되었습니다.`);
                });
            }
        };
    </script>
</body>
</html>
