<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-6 용사 본부</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --purple: #9b59b6; --bg: #ecf0f1; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 50px; }
        #login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--dark); padding: 20px; box-sizing: border-box; }
        .login-box { background: white; padding: 40px 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 350px; }
        #main-app { display: none; }
        .tab-menu { display: flex; background: var(--dark); position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .tab-menu button { flex: 1; min-width: 70px; padding: 15px 5px; border: none; background: none; color: #95a5a6; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .tab-menu button.active { color: white; border-bottom: 4px solid var(--gold); }
        .tab-content { display: none; padding: 15px; max-width: 1000px; margin: auto; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 15px; }
        .hero-card { background: white; border-radius: 12px; padding: 15px 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 2px solid transparent; position: relative; }
        .hero-card.me { border-color: var(--gold); background: #fffdf2; transform: scale(1.02); }
        .card-no { position: absolute; top: 5px; left: 8px; font-size: 0.7rem; color: #999; font-weight: bold; }
        .card-avatar { font-size: 3rem; margin-bottom: 8px; display: block; }
        .card-lv { font-size: 0.75rem; background: var(--dark); color: white; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input, button, textarea, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; gap: 8px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .popup-box { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; text-align: center; max-height: 85vh; overflow-y: auto; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .pixel-avatar { width: 48px; height: 48px; background-image: url('avatars.png'); background-repeat: no-repeat; background-size: 288px 48px; display: inline-block; image-rendering: pixelated; vertical-align: middle; }
        .avatar-lv1 { background-position: 0px 0px; }
        .avatar-lv5 { background-position: -48px 0px; }
        .avatar-lv10 { background-position: -96px 0px; }
        .avatar-lv15 { background-position: -144px 0px; }
        .avatar-lv20 { background-position: -192px 0px; }
        .avatar-lv30 { background-position: -240px 0px; }
        /* 번호 수정 입력창 크기 시원하게 키우기 */
        .edit-no {
            width: 70px !important;    /* 너비 확장 */
            height: 50px !important;   /* 높이 확장 */
            font-size: 1.2rem !important; /* 글자 크기 확대 */
            font-weight: bold !important;
            text-align: center !important;
            border: 2px solid var(--primary) !important; /* 테두리 강조 */
            border-radius: 8px !important;
            margin-right: 10px !important;
        }

        /* 이름 수정창도 높이 맞추기 */
        .edit-name {
            height: 50px !important;
            font-size: 1.2rem !important;
            padding-left: 10px !important;
            border-radius: 8px !important;
        }
        
        /* 저장 버튼도 누르기 편하게 높이 조절 */
        #student-admin-list button {
            height: 50px !important;
            padding: 0 15px !important;
            font-size: 1rem !important;
        }
        .floating-btn { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 30px; background: var(--gold); color: var(--dark); box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 999; font-size: 1.5rem; display: none; align-items: center; justify-content: center; border: none; }
    </style>
</head>
<body>

    <div id="common-overlay" class="overlay">
        <div class="popup-box">
            <h2 id="pop-title">알림</h2>
            <div id="pop-content" style="margin-bottom: 20px; white-space: pre-wrap; font-size: 1.1rem;">내용</div>
            <button onclick="closePopup()" style="background:var(--green); font-size: 1.1rem; padding: 12px;">확인</button>
        </div>
    </div>

    <!-- 포인트 지급 통합 팝업 -->
    <div id="point-popup" class="overlay">
        <div class="popup-box">
            <h2 id="point-pop-title">포인트 전령</h2>
            <div id="point-pop-body"></div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="closePointPopup()" style="background:#95a5a6;">닫기</button>
                <button id="point-apply-btn" style="background:var(--gold); color:var(--dark);">반영하기</button>
            </div>
        </div>
    </div>

    <div id="login-screen">
        <div class="login-box">
            <h1>🏰<br>6-6 용사 본부</h1>
            <p style="color:#666; margin-bottom:20px;">6-6용사여, 구글 아이디로 로그인하라!</p>
            <button onclick="handleLogin()" style="background:#4285F4;">Google 로그인</button>
        </div>
    </div>

    <div id="main-app">
        <nav class="tab-menu">
            <button id="btn-main" class="active" onclick="showTab('main')">🤺 용사들</button>
            <button id="btn-shop" onclick="showTab('shop')">🛍️ 상점</button>
            <button id="btn-guide" onclick="showTab('guide')">📜 도감</button>
            <button id="btn-checkin" onclick="showTab('checkin')">⚔️ 등교</button>
            <button id="btn-logs" onclick="showTab('logs')">📅 등교로그</button>
            <button id="btn-points" onclick="showTab('points')">💰 연대기</button>
            <button id="btn-admin" onclick="showTab('admin')" style="display:none;">🛡️ 관리</button>
        </nav>
        
        <section id="tab-main" class="tab-content active"><div id="hero-grid" class="hero-grid"></div></section>
        
        <section id="tab-shop" class="tab-content">
            <div id="admin-shop-mgr" class="card" style="display:none; border:2px solid var(--purple);">
                <h3>📦 물품 등록</h3>
                <input type="text" id="item-name-in" placeholder="상품명"><input type="number" id="item-price-in" placeholder="가격 (P)"><button onclick="addItem()" style="background:var(--purple);">진열</button>
            </div>
            <div class="card"><h2>🛍️ 용사 보급소</h2><div id="shop-list"></div></div>
            <div id="admin-order-mgr" class="card" style="display:none; border:2px solid var(--red);"><h3>📜 요청 목록</h3><div id="order-list"></div></div>
        </section>

        <section id="tab-guide" class="tab-content">
            <div id="admin-guide-mgr" class="card" style="display:none; border:2px solid var(--primary);">
                <h3>📋 자주 쓰는 항목 등록</h3>
                <input type="text" id="guide-title" placeholder="항목 이름 (예: 독서왕)"><input type="number" id="guide-p" placeholder="포인트"><input type="number" id="guide-e" placeholder="경험치"><button onclick="addGuide()">도감 등록</button>
            </div>
            <div class="card"><h2>📜 포인트 도감</h2><div id="guide-list" class="hero-grid"></div></div>
        </section>

        <section id="tab-checkin" class="tab-content">
            <div class="card">
                <h2>⚔️ 등교 확인</h2>
                <div id="checkin-guide" style="margin-bottom:10px; font-weight:bold;"></div>
                <input type="text" id="checkin-pass" placeholder="오늘의 암호">
                <button onclick="submitCheckIn()" style="padding:15px; font-size:1.1rem;">본부 소환!</button>
            </div>
        </section>

        <section id="tab-logs" class="tab-content">
            <div class="card"><h2>📅 등교 기록부</h2><div id="checkin-history"></div></div>
        </section>

        <section id="tab-points" class="tab-content">
            <div class="card"><h3>📜 포인트 연대기</h3><div id="point-history-list" style="font-size: 0.9rem;"></div></div>
        </section>

        <section id="tab-admin" class="tab-content">
            <div class="card"><h3>👥 명단 관리</h3><div id="student-admin-list"></div></div>
            <div class="card"><h3>⚙️ 시스템 설정</h3>암호:<input type="text" id="conf-pass"> 지각:<input type="time" id="conf-late"> 마감:<input type="time" id="conf-close"> 루틴:<textarea id="conf-routine"></textarea><button onclick="saveSettings()">저장</button></div>
            <div class="card"><h3>🎁 레벨업 보상</h3><textarea id="conf-gifts"></textarea><button onclick="saveGifts()">저장</button></div>
            <div class="card"><h3>🆕 학생 등록</h3><textarea id="bulk-in" placeholder="이름,이메일"></textarea><button onclick="bulkReg()">주입</button></div>
        </section>

        <!-- 관리자 전용 플로팅 버튼 (포인트 팝업 호출용) -->
        <button id="floating-point-btn" class="floating-btn" onclick="openPointBulkPopup()">⚖️</button>
        <button id="floating-score-btn" class="floating-btn" style="right: 90px;" onclick="openScorePopup()">🎯</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDWdWrw8LJ6tSiyF1X5tENJEvBfY-DzSw0",
            authDomain: "cs6-6class.firebaseapp.com",
            databaseURL: "https://cs6-6class-default-rtdb.firebaseio.com/", 
            projectId: "cs6-6class",
            storageBucket: "cs6-6class.firebasestorage.app",
            messagingSenderId: "644235499537",
            appId: "1:644235499537:web:2ede2611f4ec6a3e8179b0"
        };
        const adminEmail = "ksosuny@cberi.go.kr";
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        let myName = "", isAdmin = false, routineItems = [], giftList = [], rIdx = 0, currentUsers = [];

        function getAvatar(lv) {
            let lvClass = "avatar-lv1";
            if(lv >= 30) lvClass = "avatar-lv30";
            else if(lv >= 20) lvClass = "avatar-lv20";
            else if(lv >= 15) lvClass = "avatar-lv15";
            else if(lv >= 10) lvClass = "avatar-lv10";
            else if(lv >= 5) lvClass = "avatar-lv5";
            return `<div class="pixel-avatar ${lvClass}"></div>`;
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                isAdmin = (user.email.toLowerCase() === adminEmail.toLowerCase());
                const eKey = user.email.replace(/\./g, ',');
                db.ref('userEmails/' + eKey).once('value', snap => {
                    if (snap.exists() || isAdmin) {
                        myName = snap.val() || "총사령관";
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('main-app').style.display = 'block';
                        if(isAdmin) document.querySelectorAll('.floating-btn').forEach(b => b.style.display = 'flex');
                        startApp();
                    } else { alert("미등록 계정입니다."); auth.signOut(); }
                });
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            }
        });

        function handleLogin() { auth.signInWithPopup(provider); }

        function startApp() {
            if (isAdmin) { ['btn-admin', 'admin-shop-mgr', 'admin-order-mgr', 'admin-guide-mgr'].forEach(id => document.getElementById(id).style.display = 'block'); }

            db.ref('settings').on('value', snap => {
                const s = snap.val() || {};
                document.getElementById('conf-pass').value = s.password || "";
                document.getElementById('conf-late').value = s.lateTime || "08:40";
                document.getElementById('conf-close').value = s.closeTime || "09:00";
                document.getElementById('conf-routine').value = s.routineText || "";
                document.getElementById('conf-gifts').value = (s.giftList || []).join('\n');
                giftList = s.giftList || [];
                routineItems = (s.routineText || "").split('\n').filter(t => t.trim() !== "");
                document.getElementById('checkin-guide').innerText = `✅ 정상: ~${s.lateTime} | ⚠️ 지각: ~${s.closeTime}`;
            });

            db.ref('users').on('value', snap => {
                let users = [];
                snap.forEach(c => { 
                    const data = c.val();
                    if(data && data.name) users.push(data); // undefined 방지: 이름이 있는 데이터만 로드
                });
                users.sort((a, b) => (parseInt(a.no) || 999) - (parseInt(b.no) || 999));
                currentUsers = users;

                let gH = "", aH = "";
                users.forEach(u => {
                    gH += `<div class="hero-card ${u.name===myName?'me':''}">
                        <span class="card-no">${u.no || ''}</span><span class="card-lv">LV.${u.lv || 1}</span>
                        <span class="card-avatar">${getAvatar(u.lv || 1)}</span><div class="card-name">${u.name}</div>
                        <div class="card-pt">${u.points || 0} P</div>
                    </div>`;
                    
                    aH += `<div class="list-item">
                        <input type="number" class="edit-no" data-name="${u.name}" value="${u.no}" style="width:40px;">
                        <span style="flex:1;">${u.name}</span>
                        <button onclick="updateNo('${u.name}')" style="width:auto; background:var(--primary); padding:5px;">수정</button>
                        <button onclick="deleteHero('${u.name}', '${u.email}')" style="width:auto; background:var(--red); padding:5px;">삭제</button>
                    </div>`;
                });
                document.getElementById('hero-grid').innerHTML = gH;
                document.getElementById('student-admin-list').innerHTML = aH;
            });

            // 등교 로그 전용 표시
            db.ref('checkinLogs').orderByChild('time').limitToLast(30).on('value', snap => {
                let hH = "";
                let logs = []; snap.forEach(c => logs.push(c.val()));
                logs.reverse().forEach(l => {
                    const color = l.result.includes('정상') ? 'var(--green)' : 'var(--red)';
                    hH += `<div class="list-item"><span><strong>${l.name}</strong></span> <span style="color:${color}">${l.result}</span> <small>${l.time}</small></div>`;
                });
                document.getElementById('checkin-history').innerHTML = hH || "오늘의 등교자가 없습니다.";
            });

            db.ref('guides').on('value', snap => {
                let gH = "";
                snap.forEach(c => {
                    const g = c.val();
                    gH += `<div class="hero-card" style="cursor:pointer;" onclick="applyGuide('${g.title}', ${g.p}, ${g.e})">
                        <strong>${g.title}</strong><br><small>${g.p}P / ${g.e}E</small>
                        ${isAdmin ? `<button onclick="db.ref('guides/${c.key}').remove(); event.stopPropagation();" style="background:var(--red); margin-top:5px; padding:2px;">삭제</button>` : ''}
                    </div>`;
                });
                document.getElementById('guide-list').innerHTML = gH || "등록된 도감이 없습니다.";
            });

            db.ref('shop').on('value', snap => {
                let sH = ""; snap.forEach(c => { const i = c.val(); sH += `<div class="list-item"><span>${i.name} (<strong>${i.price}P</strong>)</span><div style="display:flex; gap:5px;"><button onclick="buyItem('${c.key}', '${i.name}', ${i.price})" style="width:auto;">구매</button>${isAdmin ? `<button onclick="db.ref('shop/${c.key}').remove()" style="background:red; width:auto;">삭제</button>` : ''}</div></div>`; });
                document.getElementById('shop-list').innerHTML = sH || "상점이 텅 비었습니다.";
            });
        }

        // 팝업 관련 함수
        function openPointBulkPopup() {
            let html = `<input type="text" id="pop-bulk-reason" placeholder="지급 사유">
                        <div style="max-height:300px; overflow-y:auto; margin-top:10px; border:1px solid #eee;">`;
            currentUsers.forEach(u => {
                html += `<div class="list-item"><span>${u.no}. ${u.name}</span>
                        <div style="display:flex; gap:5px;">
                        P<input type="number" class="pop-bulk-p" data-name="${u.name}" style="width:50px;">
                        E<input type="number" class="pop-bulk-e" data-name="${u.name}" style="width:50px;">
                        </div></div>`;
            });
            html += `</div>`;
            document.getElementById('point-pop-title').innerText = "⚖️ 일괄 포인트/경험치 전령";
            document.getElementById('point-pop-body').innerHTML = html;
            document.getElementById('point-apply-btn').onclick = applyBulkPopup;
            document.getElementById('point-popup').style.display = 'flex';
        }

        function applyBulkPopup() {
            const reason = document.getElementById('pop-bulk-reason').value;
            if(!reason) return alert("사유를 입력하세요.");
            const pIns = document.querySelectorAll('.pop-bulk-p');
            const eIns = document.querySelectorAll('.pop-bulk-e');
            pIns.forEach((pI, i) => {
                const name = pI.dataset.name, p = parseInt(pI.value) || 0, e = parseInt(eIns[i].value) || 0;
                if(p || e) addScore(name, p, e, reason);
            });
            alert("일괄 반영되었습니다!"); closePointPopup();
        }

        function openScorePopup() {
            let html = `<div style="max-height:400px; overflow-y:auto;">`;
            currentUsers.forEach(u => {
                html += `<div class="list-item"><span>${u.no}. ${u.name}</span>
                        <div style="display:flex; gap:5px;">
                        P<input type="number" class="pop-one-p" data-name="${u.name}" style="width:45px;">
                        E<input type="number" class="pop-one-e" data-name="${u.name}" style="width:45px;">
                        <button onclick="applyOneScore('${u.name}', ${currentUsers.indexOf(u)})" style="width:auto; padding:5px;">OK</button>
                        </div></div>`;
            });
            html += `</div>`;
            document.getElementById('point-pop-title').innerText = "🎯 개별 점수/경험치 부여";
            document.getElementById('point-pop-body').innerHTML = html;
            document.getElementById('point-apply-btn').style.display = 'none'; // 개별은 OK버튼 사용
            document.getElementById('point-popup').style.display = 'flex';
        }

        function applyOneScore(name, idx) {
            const p = parseInt(document.querySelectorAll('.pop-one-p')[idx].value) || 0;
            const e = parseInt(document.querySelectorAll('.pop-one-e')[idx].value) || 0;
            if(!p && !e) return;
            addScore(name, p, e, "관리자 수동 부여");
            document.querySelectorAll('.pop-one-p')[idx].value = "";
            document.querySelectorAll('.pop-one-e')[idx].value = "";
            alert(`${name} 반영 완료!`);
        }

        function closePointPopup() { 
            document.getElementById('point-popup').style.display = 'none'; 
            document.getElementById('point-apply-btn').style.display = 'block';
        }

        // 로직 함수들
        function addScore(name, p, e, reason) {
            db.ref('users/' + name).once('value', snap => {
                const u = snap.val(); if(!u) return;
                let nE = (u.exp || 0) + e, nL = (u.lv || 1), nP = (u.points || 0) + p;
                while(nE >= 100) { nL++; nE -= 100; }
                db.ref('users/' + name).update({ exp: nE, lv: nL, points: nP });
                const ts = new Date().toLocaleString();
                db.ref('pointLogs').push({ name, amount: p, reason, time: ts });
            });
        }

        function applyGuide(title, p, e) {
            if(!isAdmin) return;
            if(confirm(`[${title}] 항목을 모든 학생에게 일괄 적용할까요?`)) {
                currentUsers.forEach(u => addScore(u.name, p, e, title));
                alert("일괄 적용 완료!");
            }
        }

        function submitCheckIn() {
            const pw = document.getElementById('checkin-pass').value;
            db.ref('settings').once('value', snap => {
                const s = snap.val(); if(pw !== s.password) return alert("암호 오류!");
                const now = new Date(); const curT = now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');
                if(curT > s.closeTime) return openPopup("🚫 실패", "마감 시간 경과!");
                
                let msg = "✨ 정상 등교!", penalty = 0, res = "정상 등교";
                if(curT > s.lateTime) { 
                    const [lh, lm] = s.lateTime.split(':').map(Number);
                    const diff = (now.getHours()*60+now.getMinutes()) - (lh*60+lm);
                    penalty = -diff; msg = `⚠️ 지각! (${curT}) 벌금 ${penalty}P`; res = `지각 (${diff}분)`;
                }
                updatePoint(myName, penalty, res);
                db.ref('checkinLogs').push({ name: myName, result: res, time: now.toLocaleString() });
                rIdx = 0; if(routineItems.length > 0) openPopup(msg, `[루틴]\n1단계: ${routineItems[0]}`, true); else openPopup("🎊 완료", msg);
                document.getElementById('checkin-pass').value = "";
            });
        }

        function updatePoint(n, a, r) {
            db.ref('users/' + n).once('value', snap => {
                const u = snap.val(); if(!u) return;
                db.ref('users/' + n).update({ points: (u.points || 0) + a });
                db.ref('pointLogs').push({ name: n, amount: a, reason: r, time: new Date().toLocaleString() });
            });
        }

        function deleteHero(n, e) {
            if(confirm(`'${n}' 용사를 본부에서 영구 삭제하시겠습니까?`)) {
                db.ref('users/' + n).remove();
                if(e) db.ref('userEmails/' + e.replace(/\./g, ',')).remove();
                alert("삭제되었습니다.");
            }
        }

        function updateNo(n) {
            const val = document.querySelector(`.edit-no[data-name="${n}"]`).value;
            db.ref('users/' + n).update({ no: val }).then(() => alert("번호 수정 완료!"));
        }

        function addGuide() {
            const title = document.getElementById('guide-title').value;
            const p = parseInt(document.getElementById('guide-p').value) || 0;
            const e = parseInt(document.getElementById('guide-e').value) || 0;
            if(title) db.ref('guides').push({ title, p, e }).then(() => {
                document.getElementById('guide-title').value = "";
                document.getElementById('guide-p').value = "";
                document.getElementById('guide-e').value = "";
            });
        }

        function addJob() { /* 직업 삭제됨 */ }
        function addItem() { const n = document.getElementById('item-name-in').value, p = parseInt(document.getElementById('item-price-in').value); if(n && p) db.ref('shop').push({name:n, price:p}); }
        function buyItem(id, name, price) { db.ref('users/'+myName).once('value', sn => { const u = sn.val(); if(!u || u.points < price) return alert("P 부족!"); if(confirm(`${name} 구매?`)) { updatePoint(myName, -price, `${name} 구매`); db.ref('orders').push({ user: myName, item: name, status: '대기', time: new Date().toLocaleString() }); } }); }
        function approveOrder(id) { db.ref('orders/' + id).update({ status: '완료' }); }
        function saveSettings() { db.ref('settings').update({password:document.getElementById('conf-pass').value, lateTime:document.getElementById('conf-late').value, closeTime:document.getElementById('conf-close').value, routineText:document.getElementById('conf-routine').value}); }
        function saveGifts() { const list = document.getElementById('conf-gifts').value.split('\n'); db.ref('settings').update({giftList: list}); }
        function openPopup(t, c, isR = false) { document.getElementById('pop-title').innerText=t; document.getElementById('pop-content').innerText=c; document.getElementById('common-overlay').style.display='flex'; window.routineActive = isR; }
        function closePopup() { if(window.routineActive) { rIdx++; if(rIdx < routineItems.length) { document.getElementById('pop-content').innerText = `다음: ${routineItems[rIdx]}`; } else { document.getElementById('common-overlay').style.display = 'none'; window.routineActive = false; } } else { document.getElementById('common-overlay').style.display = 'none'; } }
        function showTab(t) { document.querySelectorAll('.tab-content').forEach(s=>s.classList.remove('active')); document.querySelectorAll('.tab-menu button').forEach(b=>b.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active'); document.getElementById('btn-'+t).classList.add('active'); }
        function bulkReg() { document.getElementById('bulk-in').value.split('\n').forEach(l => { const [n, e] = l.split(',').map(s=>s.trim()); if(n&&e) { db.ref('userEmails/'+e.replace(/\./g,',')).set(n); db.ref('users/'+n).update({name:n, email:e, points:0, exp:0, lv:1, no:""}); } }); alert("완료!"); }

      // 기존 limitToLast(40)을 100 정도로 늘리고, 데이터가 비어있어도 최대한 출력하게 수정
db.ref('pointLogs').orderByChild('time').limitToLast(100).on('value', snap => {
    let html = ""; 
    let logs = []; 
    snap.forEach(c => {
        const log = c.val();
        if(log) logs.push(log); // 아주 최소한의 조건만 검사
    });
    logs.reverse().forEach(log => {
        // 관리자거나 내 이름일 때 표시
        if (isAdmin || (log.name && log.name === myName)) {
            const color = log.amount > 0 ? "var(--green)" : (log.amount < 0 ? "var(--red)" : "#888");
            const logName = log.name || "알 수 없는 용사";
            const logReason = log.reason || "사유 없음";
            
            html += `<div class="list-item" style="border-left:5px solid ${color}">
                <strong>${logName}</strong> <span style="color:${color}">${log.amount > 0 ? '+' : ''}${log.amount}P</span><br>
                <small>${logReason} (${log.time || ''})</small></div>`;
        }
    });
    document.getElementById('point-history-list').innerHTML = html || "아직 기록된 역사가 없습니다.";
});
       
    </script>
</body>
</html>
