<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-6 용사 본부</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --purple: #9b59b6; --bg: #ecf0f1; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 50px; }
        #login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--dark); padding: 20px; box-sizing: border-box; }
        .login-box { background: white; padding: 40px 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 350px; }
        #main-app { display: none; }
        .tab-menu { display: flex; background: var(--dark); position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .tab-menu button { flex: 1; min-width: 70px; padding: 15px 5px; border: none; background: none; color: #95a5a6; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .tab-menu button.active { color: white; border-bottom: 4px solid var(--gold); }
        .tab-content { display: none; padding: 15px; max-width: 1000px; margin: auto; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 15px; }
        .hero-card { background: white; border-radius: 12px; padding: 15px 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 2px solid transparent; position: relative; }
        .hero-card.me { border-color: var(--gold); background: #fffdf2; transform: scale(1.02); }
        .card-no { position: absolute; top: 5px; left: 8px; font-size: 0.7rem; color: #999; font-weight: bold; }
        .card-lv { font-size: 0.75rem; background: var(--dark); color: white; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        .card-avatar { font-size: 3rem; margin-bottom: 8px; display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input, button, textarea, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; gap: 8px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .popup-box { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; text-align: center; max-height: 85vh; overflow-y: auto; }
        .pixel-avatar { width: 48px; height: 48px; background-image: url('avatars.png'); background-repeat: no-repeat; background-size: 288px 48px; display: inline-block; image-rendering: pixelated; vertical-align: middle; }
        .avatar-lv1 { background-position: 0px 0px; }
        .avatar-lv5 { background-position: -48px 0px; }
        .avatar-lv10 { background-position: -96px 0px; }
        .avatar-lv15 { background-position: -144px 0px; }
        .avatar-lv20 { background-position: -192px 0px; }
        .avatar-lv30 { background-position: -240px 0px; }
        
        /* 점수 선택 스타일 */
        .student-chip { display: inline-block; padding: 8px 12px; margin: 4px; border-radius: 20px; border: 1px solid #ddd; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .student-chip.selected { background: var(--gold); border-color: var(--dark); font-weight: bold; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="common-overlay" class="overlay">
        <div class="popup-box">
            <h2 id="pop-title">알림</h2>
            <div id="pop-content" style="margin-bottom: 20px; white-space: pre-wrap; font-size: 1.1rem;">내용</div>
            <button onclick="closePopup()" style="background:var(--green); font-size: 1.1rem; padding: 12px;">확인</button>
        </div>
    </div>

    <!-- 포인트 지급 팝업 (일괄/개별 통합 모달) -->
    <div id="point-modal" class="overlay">
        <div class="popup-box" style="text-align: left;">
            <h2 id="modal-title" style="text-align: center;">⚡ 포인트 전령</h2>
            
            <div id="bulk-input-area" style="background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: none;">
                <p style="margin: 0 0 5px 0; font-size: 0.8rem; color: #666;">선택한 학생들에게 일괄 지급될 점수입니다.</p>
                <div style="display: flex; gap: 5px;">
                    <input type="number" id="bulk-p-val" placeholder="P" style="flex:1;">
                    <input type="number" id="bulk-e-val" placeholder="EXP" style="flex:1;">
                </div>
            </div>

            <div style="margin-bottom: 10px;">
                <strong>사유:</strong> <input type="text" id="modal-reason" placeholder="사유를 입력하세요 (필수)">
            </div>

            <div id="modal-student-list" style="max-height: 350px; overflow-y: auto; border: 1px solid #eee; padding: 5px; border-radius: 8px; margin-bottom: 10px;"></div>
            
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button id="modal-apply-btn" onclick="applyModalPoints()" style="background:var(--gold); color:var(--dark);">하사하기</button>
                <button onclick="document.getElementById('point-modal').style.display='none'" style="background:#95a5a6;">닫기</button>
            </div>
        </div>
    </div>

    <div id="login-screen">
        <div class="login-box">
            <h1>🏰<br>6-6 용사 본부</h1>
            <button onclick="handleLogin()" style="background:#4285F4; margin-top:20px;">Google 로그인</button>
        </div>
    </div>

    <div id="main-app">
        <nav class="tab-menu">
            <button id="btn-main" class="active" onclick="showTab('main')">🤺 용사들</button>
            <button id="btn-jobs" onclick="showTab('jobs')">💼 직업</button>
            <button id="btn-shop" onclick="showTab('shop')">🛍️ 상점</button>
            <button id="btn-checkin" onclick="showTab('checkin')">⚔️ 등교</button>
            <button id="btn-points" onclick="showTab('points')">💰 포인트</button>
            <button id="btn-admin" onclick="showTab('admin')" style="display:none;">🛡️ 관리</button>
        </nav>
        
        <section id="tab-main" class="tab-content active"><div id="hero-grid" class="hero-grid"></div></section>
        
        <section id="tab-jobs" class="tab-content">
            <div id="admin-job-mgr" class="card" style="display:none; border:2px solid var(--purple);"><h3>🆕 직업 등록</h3><input type="text" id="job-name-in" placeholder="직업명"><textarea id="job-desc-in" placeholder="설명"></textarea><button onclick="addJob()">도감 등록</button></div>
            <div class="card"><h2>💼 직업 도감</h2><div id="job-list-display"></div></div>
        </section>

        <section id="tab-shop" class="tab-content">
            <div id="admin-shop-mgr" class="card" style="display:none; border:2px solid var(--purple);"><h3>📦 물품 등록</h3><input type="text" id="item-name-in" placeholder="상품명"><input type="number" id="item-price-in" placeholder="가격 (P)"><button onclick="addItem()" style="background:var(--purple);">진열하기</button></div>
            <div class="card"><h2>🛍️ 용사 보급소</h2><div id="shop-list"></div></div>
            <div id="admin-order-mgr" class="card" style="display:none; border:2px solid var(--red);"><h3>📜 요청 목록</h3><div id="order-list"></div></div>
        </section>

        <section id="tab-checkin" class="tab-content">
            <div class="card"><h2>⚔️ 등교 확인</h2><div id="checkin-guide" style="margin-bottom:10px; font-weight:bold;"></div><input type="text" id="checkin-pass" placeholder="오늘의 암호"><button onclick="submitCheckIn()" style="padding:15px; font-size:1.1rem;">본부 소환!</button></div>
        </section>

        <section id="tab-points" class="tab-content">
            <div id="admin-p-area" style="display:none; display: flex; gap: 10px;">
                <button onclick="openPointModal('bulk')" style="flex:1; background:var(--gold); color:var(--dark); padding: 15px; font-size: 1rem; margin-bottom: 15px; border: 2px solid var(--dark);">⚡ 일괄 점수 부여</button>
                <button onclick="openPointModal('each')" style="flex:1; background:var(--primary); color:white; padding: 15px; font-size: 1rem; margin-bottom: 15px; border: 2px solid var(--dark);">📝 개별 점수 부여</button>
            </div>
            <div class="card"><h3>📜 포인트 연대기</h3><div id="point-history-list" style="font-size: 0.9rem; max-height: 500px; overflow-y: auto;"></div></div>
        </section>

        <section id="tab-admin" class="tab-content">
            <div class="card" style="background: #fff9e6; border: 2px solid var(--gold);"><h3>📅 등교 기록부</h3><input type="date" id="checkin-date-pick" onchange="loadCheckinLogs()"><div id="checkin-date-list" style="margin-top:10px;"></div></div>
            <div class="card"><h3>⚙️ 시스템 설정</h3>암호:<input type="text" id="conf-pass"> 지각:<input type="time" id="conf-late"> 마감:<input type="time" id="conf-close"> 루틴:<textarea id="conf-routine"></textarea><button onclick="saveSettings()">저장</button></div>
            <div class="card"><h3>🎁 보상 목록</h3><textarea id="conf-gifts"></textarea><button onclick="saveGifts()">저장</button></div>
            <div class="card"><h3>👥 명단 관리 (수정/삭제)</h3><div id="student-admin-list"></div></div>
            <div class="card"><h3>🆕 학생 일괄 등록</h3><textarea id="bulk-in" placeholder="이름,이메일 (한 줄에 한 명씩)"></textarea><button onclick="bulkReg()">주입</button></div>
        </section>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDWdWrw8LJ6tSiyF1X5tENJEvBfY-DzSw0",
            authDomain: "cs6-6class.firebaseapp.com",
            databaseURL: "https://cs6-6class-default-rtdb.firebaseio.com/", 
            projectId: "cs6-6class",
            storageBucket: "cs6-6class.firebasestorage.app",
            messagingSenderId: "644235499537",
            appId: "1:644235499537:web:2ede2611f4ec6a3e8179b0"
        };
        const adminEmail = "ksosuny@cberi.go.kr";
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        let myName = "", isAdmin = false, giftList = [], routineItems = [], rIdx = 0, currentMode = 'bulk';

        function getAvatar(lv) {
            let lvClass = "avatar-lv1";
            if(lv >= 30) lvClass = "avatar-lv30"; else if(lv >= 20) lvClass = "avatar-lv20"; else if(lv >= 15) lvClass = "avatar-lv15"; else if(lv >= 10) lvClass = "avatar-lv10"; else if(lv >= 5) lvClass = "avatar-lv5";
            return `<div class="pixel-avatar ${lvClass}"></div>`;
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                isAdmin = (user.email.toLowerCase() === adminEmail.toLowerCase());
                const eKey = user.email.replace(/\./g, ',');
                db.ref('userEmails/' + eKey).once('value', (snap) => {
                    if (snap.exists() || isAdmin) {
                        myName = snap.val() || "총사령관";
                        startApp();
                    } else { alert("미등록 계정: " + user.email); auth.signOut(); }
                });
            } else { document.getElementById('login-screen').style.display = 'flex'; document.getElementById('main-app').style.display = 'none'; }
        });

        function handleLogin() { auth.signInWithPopup(provider).catch(e => alert(e.message)); }

        function startApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            if (isAdmin) { 
                ['btn-admin', 'admin-job-mgr', 'admin-shop-mgr', 'admin-order-mgr', 'admin-p-area'].forEach(id => {
                    if(document.getElementById(id)) document.getElementById(id).style.display = 'block';
                });
                document.getElementById('checkin-date-pick').valueAsDate = new Date();
                loadCheckinLogs();
            }

            db.ref('users').on('value', snap => {
                let users = []; 
                snap.forEach(c => { if(c.val() && c.val().name) users.push(c.val()); });
                users.sort((a, b) => (parseInt(a.no) || 999) - (parseInt(b.no) || 999));
                
                let gH = "", aH = "";
                users.forEach(u => {
                    gH += `<div class="hero-card ${u.name===myName?'me':''}">
                        <span class="card-no">${u.no || ''}</span><span class="card-lv">LV.${u.lv}</span>
                        <span class="card-avatar">${getAvatar(u.lv)}</span><div class="card-name">${u.name}</div>
                        <div style="font-size:0.8rem; color:#888;">${u.job || '평민'}</div><div style="font-weight:bold; color:var(--primary);">${u.points || 0} P</div>
                    </div>`;
                    aH += `<div class="list-item"><span>${u.no||'?'}. ${u.name}</span>
                        <div style="display:flex; gap:5px;">
                            <button onclick="editHero('${u.name}', '${u.email}', '${u.no}')" style="width:auto; padding:5px 10px;">수정</button>
                            <button onclick="deleteHero('${u.name}', '${u.email}')" style="background:var(--red); width:auto; padding:5px 10px;">삭제</button>
                        </div></div>`;
                });
                document.getElementById('hero-grid').innerHTML = gH;
                document.getElementById('student-admin-list').innerHTML = aH;
            });

            db.ref('settings').on('value', snap => {
                const s = snap.val() || {};
                document.getElementById('conf-pass').value = s.password || "";
                document.getElementById('conf-late').value = s.lateTime || "08:40";
                document.getElementById('conf-close').value = s.closeTime || "09:00";
                document.getElementById('conf-routine').value = s.routineText || "";
                giftList = s.giftList || [];
                routineItems = (s.routineText || "").split('\n').filter(t => t.trim() !== "");
                document.getElementById('checkin-guide').innerText = `✅ 정상: ~${s.lateTime} | ⚠️ 지각: ~${s.closeTime}`;
            });

            db.ref('pointLogs').orderByChild('time').limitToLast(50).on('value', snap => {
                let html = ""; let logs = []; snap.forEach(c => { let v = c.val(); v.key = c.key; logs.push(v); });
                logs.reverse().forEach(log => {
                    if (isAdmin || log.name === myName) {
                        const isPlus = (log.pAmt || 0) >= 0;
                        html += `<div class="list-item" style="border-left: 5px solid ${isPlus?'var(--green)':'var(--red)'};">
                            <div style="flex:1;"><strong>${log.name}</strong>: <span style="font-weight:bold; color:${isPlus?'green':'red'}">${log.pAmt||0}P</span> / <span style="color:blue;">${log.eAmt||0}E</span><br><small>${log.reason} (${log.time})</small></div>
                            ${isAdmin ? `<button onclick="cancelPoint('${log.key}', '${log.name}', ${log.pAmt||0}, ${log.eAmt||0})" style="background:var(--red); width:auto; font-size:0.75rem;">취소</button>` : ''}
                        </div>`;
                    }
                });
                document.getElementById('point-history-list').innerHTML = html || "기록이 없습니다.";
            });
            
            // 기존 직업/상점 유지
            db.ref('jobs').on('value', snap => {
                let jH = ""; snap.forEach(c => { let v = c.val(); jH += `<div class="card"><strong>◈ ${v.name} ◈</strong><p>${v.desc}</p>${isAdmin ? `<button onclick="db.ref('jobs/${c.key}').remove()" style="background:red; width:auto;">삭제</button>` : ''}</div>`; });
                document.getElementById('job-list-display').innerHTML = jH || "도감이 비어있습니다.";
            });
            db.ref('shop').on('value', snap => {
                let sH = ""; snap.forEach(c => { let v = c.val(); sH += `<div class="list-item"><span>${v.name} (<strong>${v.price}P</strong>)</span><button onclick="buyItem('${c.key}', '${v.name}', ${v.price})" style="width:auto;">구매</button></div>`; });
                document.getElementById('shop-list').innerHTML = sH || "보급소가 비었습니다.";
            });
        }

        // --- 탭 이동 ---
        function showTab(t) { document.querySelectorAll('.tab-content').forEach(s=>s.classList.remove('active')); document.querySelectorAll('.tab-menu button').forEach(b=>b.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active'); document.getElementById('btn-'+t).classList.add('active'); }

        // --- 포인트 하사 팝업 (개선형) ---
        function openPointModal(mode) {
            currentMode = mode;
            const title = document.getElementById('modal-title');
            const bulkArea = document.getElementById('bulk-input-area');
            const listDiv = document.getElementById('modal-student-list');
            
            listDiv.innerHTML = "로딩 중...";
            document.getElementById('point-modal').style.display = 'flex';
            
            if(mode === 'bulk') {
                title.innerText = "⚡ 일괄 점수 부여";
                bulkArea.style.display = 'block';
            } else {
                title.innerText = "📝 개별 점수 부여";
                bulkArea.style.display = 'none';
            }

            db.ref('users').once('value', snap => {
                let users = [];
                snap.forEach(c => { if(c.val() && c.val().name) users.push(c.val()); });
                users.sort((a, b) => (parseInt(a.no) || 999) - (parseInt(b.no) || 999));
                
                let html = "";
                users.forEach(u => {
                    if(mode === 'bulk') {
                        html += `<div class="student-chip" onclick="this.classList.toggle('selected')" data-name="${u.name}">${u.no||'?'}.${u.name}</div>`;
                    } else {
                        html += `<div style="display:flex; align-items:center; gap:8px; margin-bottom:10px; border-bottom:1px solid #f9f9f9; padding-bottom:5px;">
                            <span style="width:80px; font-size:0.9rem;">${u.no||'?'}.${u.name}</span>
                            <input type="number" class="m-p-amt" data-name="${u.name}" placeholder="P" style="width:65px; margin:0; padding:5px;">
                            <input type="number" class="m-e-amt" data-name="${u.name}" placeholder="EXP" style="width:65px; margin:0; padding:5px;">
                        </div>`;
                    }
                });
                listDiv.innerHTML = html;
            });
        }

        async function applyModalPoints() {
            const reason = document.getElementById('modal-reason').value;
            if(!reason) return alert("사유를 입력하세요!");
            const time = new Date().toLocaleString();

            if(currentMode === 'bulk') {
                const pVal = parseInt(document.getElementById('bulk-p-val').value) || 0;
                const eVal = parseInt(document.getElementById('bulk-e-val').value) || 0;
                const selected = document.querySelectorAll('.student-chip.selected');
                
                if(selected.length === 0) return alert("학생을 선택하세요!");
                if(pVal === 0 && eVal === 0) return alert("점수를 입력하세요!");

                for(let chip of selected) {
                    await updateUserData(chip.dataset.name, pVal, eVal, reason, time);
                }
            } else {
                const pInputs = document.querySelectorAll('.m-p-amt');
                const eInputs = document.querySelectorAll('.m-e-amt');
                for(let i=0; i<pInputs.length; i++) {
                    const name = pInputs[i].dataset.name;
                    const pVal = parseInt(pInputs[i].value) || 0;
                    const eVal = parseInt(eInputs[i].value) || 0;
                    if(pVal !== 0 || eVal !== 0) {
                        await updateUserData(name, pVal, eVal, reason, time);
                    }
                }
            }
            alert("지급 완료!");
            document.getElementById('modal-reason').value = "";
            document.getElementById('bulk-p-val').value = "";
            document.getElementById('bulk-e-val').value = "";
            document.getElementById('point-modal').style.display = 'none';
        }

        async function updateUserData(name, pAmt, eAmt, reason, time) {
            const snap = await db.ref('users/'+name).once('value');
            const u = snap.val();
            let nP = (u.points||0) + pAmt, nE = (u.exp||0) + eAmt, nL = (u.lv||1);
            while(nE >= 100) { nL++; nE -= 100; }
            await db.ref('users/'+name).update({ points:nP, exp:nE, lv:nL });
            await db.ref('pointLogs').push({ name:name, pAmt:pAmt, eAmt:eAmt, reason:reason, time:time });
        }

        // --- 기타 기능 (수정/삭제/취소 등) ---
        function cancelPoint(key, name, pAmt, eAmt) {
            if(!confirm("기록 취소?")) return;
            db.ref('users/'+name).once('value', sn => {
                const u = sn.val();
                if(u) { db.ref('users/'+name).update({points:(u.points||0)-pAmt, exp:(u.exp||0)-eAmt}); db.ref('pointLogs/'+key).remove(); }
            });
        }
        function editHero(oName, email, oNo) {
            const newName = prompt("새 이름?", oName); const newNo = prompt("새 번호?", oNo); if(!newName) return;
            db.ref('users/'+oName).once('value', sn => {
                let d = sn.val(); d.name = newName; d.no = newNo;
                db.ref('users/'+newName).set(d).then(() => { if(oName!==newName) db.ref('users/'+oName).remove(); db.ref('userEmails/'+email.replace(/\./g,',')).set(newName); });
            });
        }
        function deleteHero(name, email) { if(confirm(name+" 삭제?")) { db.ref('users/'+name).remove(); if(email) db.ref('userEmails/'+email.replace(/\./g,',')).remove(); } }
        function submitCheckIn() {
            const pw = document.getElementById('checkin-pass').value;
            db.ref('settings').once('value', sn => {
                const s = sn.val(); if(pw !== s.password) return alert("암호 오류!");
                const now = new Date(); const dKey = now.toISOString().split('T')[0];
                const curT = now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');
                let p = 0; if(curT > s.lateTime) p = 10;
                db.ref('users/'+myName).once('value', uSn => {
                    const u = uSn.val(); db.ref('users/'+myName).update({points:(u?u.points:0)-p});
                    db.ref('checkinLogs/'+dKey+'/'+myName).set({time:curT, status:p>0?'지각':'정상'});
                    if(p>0) db.ref('pointLogs').push({name:myName, pAmt:-p, eAmt:0, reason:"지각", time:now.toLocaleString()});
                    openPopup(p>0?'⚠️ 지각':'✨ 정상', p>0?`-${p}P 적용`:'등교 완료');
                });
            });
        }
        function loadCheckinLogs() {
            const d = document.getElementById('checkin-date-pick').value;
            db.ref('checkinLogs/'+d).once('value', sn => {
                let h = `<table style="width:100%; font-size:0.9rem; border-collapse:collapse; background:white;"><tr style="background:#eee;"><th>이름</th><th>시간</th><th>상태</th></tr>`;
                if(!sn.exists()) h += `<tr><td colspan="3" style="text-align:center; padding:10px;">기록 없음</td></tr>`;
                else sn.forEach(c => { const v = c.val(); h += `<tr><td style="border:1px solid #ddd; text-align:center;">${c.key}</td><td style="border:1px solid #ddd; text-align:center;">${v.time}</td><td style="border:1px solid #ddd; text-align:center; color:${v.status==='지각'?'red':'green'}">${v.status}</td></tr>`; });
                document.getElementById('checkin-date-list').innerHTML = h + `</table>`;
            });
        }
        function openPopup(t, c) { document.getElementById('pop-title').innerText=t; document.getElementById('pop-content').innerText=c; document.getElementById('common-overlay').style.display='flex'; }
        function closePopup() { document.getElementById('common-overlay').style.display = 'none'; }
        function saveSettings() { db.ref('settings').update({password:document.getElementById('conf-pass').value, lateTime:document.getElementById('conf-late').value, closeTime:document.getElementById('conf-close').value, routineText:document.getElementById('conf-routine').value}).then(()=>alert("저장됨")); }
        function saveGifts() { db.ref('settings').update({giftList: document.getElementById('conf-gifts').value.split('\n')}).then(()=>alert("저장됨")); }
        function bulkReg() { document.getElementById('bulk-in').value.trim().split('\n').forEach(l => { const [n, e] = l.split(','); if(n&&e) { db.ref('userEmails/'+e.trim().replace(/\./g,',')).set(n.trim()); db.ref('users/'+n.trim()).update({name:n.trim(), email:e.trim(), points:0, exp:0, lv:1}); } }); alert("완료"); }
        function addItem() { db.ref('shop').push({name:document.getElementById('item-name-in').value, price:parseInt(document.getElementById('item-price-in').value)}).then(()=>alert("등록됨")); }
        function buyItem(id, n, p) { db.ref('users/'+myName).once('value', sn => { const u = sn.val(); if(u.points < p) return alert("P 부족"); if(confirm(n+" 구매?")) { db.ref('users/'+myName).update({points: u.points - p}); db.ref('orders').push({user:myName, item:n, status:'대기', time:new Date().toLocaleString()}); } }); }
    </script>
</body>
</html>
