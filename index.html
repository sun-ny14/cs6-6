<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-6 용사 본부</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --purple: #9b59b6; --bg: #ecf0f1; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 60px; font-size: 1.4rem; }
        input, button, textarea, select { width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; border: 2px solid #ccc; box-sizing: border-box; font-size: 1.4rem; }
        #loading-screen { display: flex; justify-content: center; align-items: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); color: white; z-index: 3000; font-size: 1.8rem; }
        #login-screen { display: none; justify-content: center; align-items: center; min-height: 100vh; background: var(--dark); padding: 20px; }
        .login-box { background: white; padding: 50px 40px; border-radius: 30px; text-align: center; width: 100%; max-width: 450px; }
        #main-app { display: none; }
        .tab-menu { display: flex; background: var(--dark); position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .tab-menu button { flex: 1; min-width: 95px; padding: 20px 10px; border: none; background: none; color: #95a5a6; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .tab-menu button.active { color: white; border-bottom: 5px solid var(--gold); }
        .tab-content { display: none; padding: 20px; max-width: 1200px; margin: auto; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #eee; gap: 10px; font-size: 1.3rem; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 20px; margin-top: 20px; }
        .hero-card { background: white; border-radius: 20px; padding: 25px 15px; text-align: center; box-shadow: 0 6px 15px rgba(0,0,0,0.1); border: 3px solid transparent; cursor: pointer; }
        .hero-card.me { border-color: var(--gold); background: #fffdf2; transform: scale(1.03); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .popup-box { background: white; padding: 20px; border-radius: 25px; width: 95%; max-width: 700px; display: flex; flex-direction: column; max-height: 95vh; }
        #pop-close-btn { order: -1; margin-bottom: 15px; background: var(--green); color: white; border: none; border-radius: 15px; padding: 15px; font-size: 1.4rem; font-weight: bold; }
        #pop-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-right: 5px; border-top: 1px solid #eee; }
        .floating-btn { position: fixed; bottom: 25px; width: 85px; height: 85px; border-radius: 45px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 999; font-size: 2.2rem; display: none; align-items: center; justify-content: center; border: none; cursor: pointer; }
        #floating-point-btn { right: 25px; background: var(--gold); color: var(--dark); }
        #floating-multi-btn { right: 120px; background: #2ecc71; color: white; }
    </style>
</head>
<body>
    <div id="loading-screen">🏰 용사 본부 접속 중...</div>
    <div id="common-overlay" class="overlay"><div class="popup-box"><h2 id="pop-title" style="margin:0; text-align:center;">알림</h2><div id="pop-content"></div><button onclick="closePopup()" id="pop-close-btn">확인(닫기)</button></div></div>
    
    <div id="point-popup" class="overlay"><div class="popup-box"><h2 id="point-pop-title" style="margin-top:0; text-align:center;">⚖️ 포인트 전령</h2><div id="point-pop-body" style="overflow-y:auto; flex:1;"></div><div style="display:flex; gap:15px; margin-top:20px;"><button onclick="closePointPopup()" style="background:#95a5a6; color:white; border:none; border-radius:15px; flex:1; padding:15px;">닫기</button><button id="point-apply-btn" style="background:var(--gold); font-weight:bold; border:none; border-radius:15px; flex:1; padding:15px;">반영하기</button></div></div></div>

    <div id="multi-popup" class="overlay">
        <div class="popup-box">
            <h2 style="text-align:center; margin-top:0;">📋 일괄 지급</h2>
            <div style="background:#f8f9fa; padding:15px; border-radius:15px; margin-bottom:15px;">
                <input type="text" id="multi-reason" placeholder="사유">
                <div style="display:flex; gap:10px;"><input type="number" id="multi-p" placeholder="P"><input type="number" id="multi-e" placeholder="E"></div>
                <div style="display:flex; justify-content:space-between; margin-top:10px;"><button onclick="checkAllMulti(true)" style="width:48%; background:var(--dark); color:white; padding:10px;">전체 선택</button><button onclick="checkAllMulti(false)" style="width:48%; background:#95a5a6; color:white; padding:10px;">해제</button></div>
            </div>
            <div id="multi-list" style="flex:1; overflow-y:auto; border:1px solid #ddd; border-radius:10px; padding:5px;"></div>
            <div style="display:flex; gap:10px; margin-top:20px;"><button onclick="closeMultiPopup()" style="background:#95a5a6; color:white; border:none; border-radius:15px; flex:1; padding:18px;">취소</button><button onclick="applyMultiScores()" style="background:var(--gold); font-weight:bold; border:none; border-radius:15px; flex:1; padding:18px;">지급 완료</button></div>
        </div>
    </div>

    <div id="login-screen"><div class="login-box"><h1>🏰 6-6 본부</h1><button onclick="handleLogin()" style="background:#4285F4; color:white; border:none; border-radius:15px; padding:20px;">Google 로그인</button></div></div>

    <div id="main-app">
        <nav class="tab-menu">
            <button id="btn-main" onclick="showTab('main')">🤺 용사들</button>
            <button id="btn-shop" onclick="showTab('shop')">🛍️ 상점</button>
            <button id="btn-guide" style="display:none;" onclick="showTab('guide')">📜 도감</button>
            <button id="btn-checkin" onclick="showTab('checkin')">⚔️ 등교</button>
            <button id="btn-logs" style="display:none;" onclick="showTab('logs')">📅 등교로그</button>
            <button id="btn-points" onclick="showTab('points')">💰 연대기</button>
            <button id="btn-admin" style="display:none;" onclick="showTab('admin')">🛡️ 관리</button>
        </nav>

        <section id="tab-main" class="tab-content active"><div id="hero-grid" class="hero-grid"></div></section>
        
        <section id="tab-shop" class="tab-content">
            <div class="card"><h2>🛍️ 용사 보급소</h2><div id="shop-list"></div></div>
            <div id="admin-order-mgr" class="card" style="display:none; border:2px solid var(--red);"><h3>📜 사용 요청 승인</h3><div id="order-list"></div></div>
        </section>

        <section id="tab-guide" class="tab-content">
            <div class="card"><h2>📜 포인트 도감</h2><div id="guide-list" class="hero-grid"></div></div>
        </section>

        <section id="tab-checkin" class="tab-content"><div class="card"><h2>⚔️ 등교 확인</h2><div id="checkin-guide" style="font-weight:bold; margin-bottom:15px; color:var(--dark);"></div><input type="text" id="checkin-pass" placeholder="오늘의 암호" style="text-align:center;"><button onclick="submitCheckIn()" style="background:var(--primary); color:white; border:none; border-radius:15px; padding:20px;">본부 소환!</button></div></section>
        
        <section id="tab-logs" class="tab-content"><div class="card"><h2>📅 등교 기록부</h2><div style="margin-bottom:15px; display:flex; align-items:center; gap:10px;"><span style="font-weight:bold;">날짜 선택:</span><input type="date" id="checkin-date-filter" style="flex:1; padding:10px;"></div><div id="checkin-history" style="width:100%;"></div></div></section>

        <section id="tab-points" class="tab-content">
            <div id="my-inventory" class="card">
                <h3>🎁 나의 인벤토리</h3>
                <div id="inv-unused" class="inv-section"><h4>📦 미사용 보관함</h4><div class="list"></div></div>
                <div id="inv-waiting" class="inv-section"><h4>⏳ 사용 대기중</h4><div class="list"></div></div>
            </div>
            <div class="card"><h3>📜 포인트 연대기</h3><div id="point-history-list"></div></div>
        </section>

        <section id="tab-admin" class="tab-content">
            <div class="card"><h3>👥 명단 관리 (번호/도우미)</h3><div id="student-admin-list"></div></div>
            <div class="card"><h3>⚙️ 시스템 설정</h3>암호:<input type="text" id="conf-pass"> 지각:<input type="time" id="conf-late"> 마감:<input type="time" id="conf-close"> 
                루틴:<textarea id="conf-routine" rows="4"></textarea><button onclick="saveSettings()">시스템 저장</button></div>
            <div class="card"><h3>🎁 레벨업 보상</h3>보상목록:<textarea id="conf-gifts" rows="4"></textarea><button onclick="saveGifts()">보상 저장</button></div>
            <div class="card"><h3>🆕 학생 일괄 등록</h3><textarea id="bulk-in" rows="3" placeholder="이름,이메일"></textarea><button onclick="bulkReg()">주입</button></div>
        </section>
        <button id="floating-point-btn" class="floating-btn" onclick="openPointBulkPopup()">⚖️</button>
        <button id="floating-multi-btn" class="floating-btn" onclick="openMultiPopup()">📋</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDWdWrw8LJ6tSiyF1X5tENJEvBfY-DzSw0", authDomain: "cs6-6class.firebaseapp.com", databaseURL: "https://cs6-6class-default-rtdb.firebaseio.com/", projectId: "cs6-6class", storageBucket: "cs6-6class.firebasestorage.app", messagingSenderId: "644235499537", appId: "1:644235499537:web:2ede2611f4ec6a3e8179b0" };
        const adminEmail = "ksosuny@cberi.go.kr"; 
        firebase.initializeApp(firebaseConfig); 
        const db = firebase.database(); 
        const auth = firebase.auth(); 
        const provider = new firebase.auth.GoogleAuthProvider();

        let myName = "", isAdmin = false, isHelper = false, currentUsers = [], routineItems = [], giftList = [], rIdx = 0;
        let currentTab = sessionStorage.getItem('activeTab') || 'main';

        function getTodayKST() { const now = new Date(); const krTime = new Date(now.getTime() + (9 * 60 * 60 * 1000)); return krTime.getUTCFullYear() + "-" + String(krTime.getUTCMonth() + 1).padStart(2, '0') + "-" + String(krTime.getUTCDate()).padStart(2, '0'); }
        function forceScreenDisplay(status) {
            const load = document.getElementById('loading-screen'), login = document.getElementById('login-screen'), app = document.getElementById('main-app');
            if(load) load.style.display = 'none';
            if(status === 'app') { if(login) login.style.display = 'none'; if(app) app.style.display = 'block'; }
            else { if(login) login.style.display = 'flex'; if(app) app.style.display = 'none'; }
        }

        function getAvatar(lv, selectedAnimal) {
            let id = "1WJN2X4Me_fPu5MtuFxS4PO1s3zPl4vSt";
            const animals = ["귀여운", "신사", "사랑스러운", "패셔니스타", "밥먹는", "날쌘돌이", "즐거운", "행복한", "정의로운", "천사", "닌자", "왕자", "공주", "근육맨", "마법사", "용사", "공부하는", "춤추는", "노래하는", "무지개"];
            const name = selectedAnimal || animals[Math.min(lv - 1, 19)];
            const index = animals.indexOf(name);
            const row = Math.floor(index / 5), col = index % 5, size = 120;
            const x = col * size, y = row * size;
            const url = `https://drive.google.com/uc?export=view&id=${id}`;

            return `<div style="width: 85px; height: 85px; overflow: hidden; border: 2px solid #ddd; border-radius: 12px; background: white; display: flex; align-items: center; justify-content: center; margin: 0 auto;">
                        <img src="${url}" style="position: relative; left: -${x}px; top: -${y}px; width: ${size * 5}px; height: ${size * 4}px; image-rendering: pixelated; transform: scale(0.7);">
                    </div>`;
        }

        function openAvatarPicker() {
            const animals = ["귀여운", "신사", "사랑스러운", "패셔니스타", "밥먹는", "날쌘돌이", "즐거운", "행복한", "정의로운", "천사", "닌자", "왕자", "공주", "근육맨", "마법사", "용사", "공부하는", "춤추는", "노래하는", "무지개"];
            db.ref('users/' + myName).once('value', snap => {
                const lv = snap.val().lv || 1, availableCount = Math.min(lv, 20);
                let h = `<p style="text-align:center; font-weight:bold; color:var(--primary); margin-bottom:15px;">✨ 현재 레벨: ${lv} (해금: ${availableCount}종)</p><div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; padding:10px;">`;
                for(let i=0; i < 20; i++) {
                    if(i < availableCount) h += `<div onclick="selectAnimal('${animals[i]}')" style="cursor:pointer; text-align:center; border:2px solid var(--gold); border-radius:10px; padding:8px; background:#fffdf2;">${getAvatar(i + 1, animals[i])}<div style="font-size:0.8rem; font-weight:bold; margin-top:5px;">${animals[i]}</div></div>`;
                    else h += `<div style="text-align:center; border:1px solid #eee; border-radius:10px; padding:8px; background:#f5f5f5; opacity: 0.5;"><div style="width: 85px; height: 85px; display:flex; align-items:center; justify-content:center; margin: 0 auto; font-size:1.5rem; background:#eee; border-radius:12px;">🔒</div><div style="font-size:0.7rem; color:#999; margin-top:5px;">LV.${i+1}</div></div>`;
                }
                openPopup("🎭 육육이 전직 본부", h + `</div>`);
            });
        }

        function selectAnimal(animalName) { if(confirm(`${animalName}(으)로 변신하시겠습니까?`)) { db.ref('users/' + myName).update({ selectedAnimal: animalName }).then(() => { alert("변신 완료! ✨"); closePopup(); }); } }

        function handleLogin() { auth.signInWithPopup(provider); }
        function showTab(t) { currentTab = t; sessionStorage.setItem('activeTab', t); document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active')); document.querySelectorAll('.tab-menu button').forEach(b => b.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active'); if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.add('active'); if(t==='points') loadMyLogs(); if(t==='logs') renderCheckinBoard(); }
        function openPopup(t,h,r=false) { document.getElementById('pop-title').innerHTML=t; document.getElementById('pop-content').innerHTML=h; document.getElementById('common-overlay').style.display='flex'; window.routineActive=r; }
        function closePopup() { if(window.routineActive && ++rIdx < routineItems.length) document.getElementById('pop-content').innerText = `[루틴 ${rIdx+1}단계]\n${routineItems[rIdx]}`; else { document.getElementById('common-overlay').style.display='none'; rIdx = 0; } }
        function closePointPopup() { document.getElementById('point-popup').style.display='none'; }
        function closeMultiPopup() { document.getElementById('multi-popup').style.display='none'; }

        function startApp() {
            if (isHelper) { const orderMgr = document.getElementById('admin-order-mgr'); if (orderMgr) orderMgr.style.display = 'block'; }
            
            db.ref('settings').on('value', snap => {
                const s = snap.val() || {}; giftList = s.giftList || []; routineItems = s.routineText?.split('\n').filter(t=>t.trim()) || [];
                if(isAdmin) { document.getElementById('conf-pass').value = s.password || ""; document.getElementById('conf-late').value = s.lateTime || "08:40"; document.getElementById('conf-close').value = s.closeTime || "09:00"; document.getElementById('conf-routine').value = s.routineText || ""; document.getElementById('conf-gifts').value = s.giftList?.join('\n') || ""; }
                document.getElementById('checkin-guide').innerText = `✅ 정상: ~${s.lateTime || '08:40'} | ⚠️ 지각: ${s.closeTime || '09:00'} 마감`;
            });

            db.ref('users').on('value', snap => {
                let users = []; snap.forEach(c => { let u = c.val(); u.name = c.key; users.push(u); });
                currentUsers = users.sort((a, b) => (a.name === myName ? -1 : b.name === myName ? 1 : (a.no || 99) - (b.no || 99)));
                let h = ""; currentUsers.forEach(u => { if(u.name === "총사령관") return; const isMe = (u.name === myName); h += `<div class="hero-card" onclick="openUserHistory('${u.name}')" style="${isMe ? 'border: 4px solid var(--gold); background: #fffdf2;' : ''}"><span>${getAvatar(u.lv || 1, u.selectedAnimal)}</span><br><b style="font-size:1.3rem;">${isMe ? '⭐ ' : ''}LV.${u.lv || 1} ${u.name}</b><br>${(isMe || isAdmin) ? `<span style="color:var(--primary); font-weight:bold;">${u.points || 0}P</span>` : ''}</div>`; });
                document.getElementById('hero-grid').innerHTML = h; if (isAdmin) renderAdminList(); renderCheckinBoard();
            });

            // [상점 기능 100% 복구] 등록/수정/삭제 버튼 포함
            let currentShopCat = "전체";
            db.ref('shop').on('value', snap => { 
                window.shopData = snap; 
                window.renderShop = function() {
                    const cats = ["전체", "🍕 먹거리", "🎫 쿠폰", "🎲 뽑기", "✏️ 학용품", "✨ 기타"];
                    let tabH = `<div style="display:flex; overflow-x:auto; gap:10px; margin-bottom:15px; padding-bottom:10px;">`;
                    cats.forEach(c => { const activeStyle = (currentShopCat === c) ? 'background:var(--primary); color:white;' : 'background:#eee;'; tabH += `<button onclick="filterShop('${c}')" style="width:auto; padding:10px 20px; border-radius:12px; font-weight:bold; border:none; ${activeStyle} white-space:nowrap;">${c}</button>`; });
                    tabH += `</div>`;
                    
                    // [복구] 물품 등록 버튼 (관리자 전용)
                    let addH = isAdmin ? `<button onclick="openAddShopPopup()" style="background:var(--gold); color:var(--dark); font-weight:bold; margin-bottom:15px;">+ 새 보급품 등록</button>` : "";
                    
                    let itemH = ""; 
                    window.shopData.forEach(c => { 
                        const i = c.val(); if (currentShopCat !== "전체" && i.cat !== currentShopCat) return; 
                        const limitText = (i.limit && i.limit > 0) ? `<br><small style="color:var(--red); font-weight:bold;">(1인당 ${i.limit}개 제한)</small>` : ""; 
                        
                        // [복구] 관리용 버튼 세트
                        itemH += `<div class="list-item">
                                    <span>[${i.cat||'✨'}] <b>${i.name}</b> (${i.price}P)${limitText}</span>
                                    <div style="display:flex; gap:8px;">
                                        <button onclick="buyItem('${c.key}','${i.name}',${i.price},${i.limit||0})" style="width:auto; padding:10px 18px;">구매</button>
                                        ${isAdmin ? `<button onclick="openEditShopPopup('${c.key}')" style="width:auto; padding:10px 18px; background:var(--dark); color:white;">관리</button>` : ''}
                                    </div>
                                  </div>`; 
                    }); 
                    document.getElementById('shop-list').innerHTML = tabH + addH + (itemH || "물품 없음"); 
                };
                window.filterShop = function(cat) { currentShopCat = cat; renderShop(); }; renderShop();
            });

            db.ref('pointGuide').on('value', snap => { 
                let h = "", addH = isAdmin ? `<button onclick="openAddGuidePopup()" style="background:var(--gold); color:var(--dark); font-weight:bold; margin-bottom:15px;">+ 새 도감 기준 등록</button>` : "";
                snap.forEach(c => { const g = c.val(); h += `<div class="hero-card" onclick="openMultiPopup('${g.title}', ${g.p}, ${g.e})"><b>${g.title}</b><br><span style="color:var(--primary); font-weight:bold;">${g.p}P / ${g.e}E</span></div>`; }); 
                document.getElementById('guide-list').innerHTML = addH + h;
            });

            // [사용 요청함 승인 로직 100% 복구]
            // 6. [수정] 주문 감시 및 도우미/관리자 유저별 일괄 승인 로직
    db.ref('orders').on('value', snap => {
        let uH = "", wH = "", adminH = ""; 
        let myUnused = {}, myWaiting = {}, adminWaiting = {}; 

        snap.forEach(c => {
            const o = c.val(); const key = c.key;
            
            // 학생 본인 인벤토리용 로직
            if (o.user === myName) {
                if (o.status === '대기') {
                    if (!myUnused[o.item]) myUnused[o.item] = [];
                    myUnused[o.item].push(key);
                } else if (o.status === '사용요청') {
                    myWaiting[o.item] = (myWaiting[o.item] || 0) + 1;
                }
            }

            // 도우미/관리자용: 유저별로 모든 품목 묶기
            if ((isAdmin || isHelper) && o.status === '사용요청') {
                if (!adminWaiting[o.user]) adminWaiting[o.user] = {};
                if (!adminWaiting[o.user][o.item]) adminWaiting[o.user][o.item] = [];
                adminWaiting[o.user][o.item].push(key);
            }
        });

        // 학생용 화면 출력 (기존 폰트 및 스타일 유지)
        for (let item in myUnused) {
            uH += `<div class="list-item"><span>${item} <b style="color:var(--primary);">x${myUnused[item].length}</b></span>
                   <button onclick="if(confirm('${item} 1개를 사용하시겠습니까?')) db.ref('orders/${myUnused[item][0]}').update({status:'사용요청'})" style="width:auto; padding:8px 15px;">사용</button></div>`;
        }
        for (let item in myWaiting) {
            wH += `<div class="list-item"><span>${item} <b style="color:#e74c3c;">x${myWaiting[item]}</b></span><b style="color:#888;">승인 대기중</b></div>`;
        }

        // 도우미/관리자용 화면 출력: 유저별 그룹화 및 전체 승인 버튼
        for (let user in adminWaiting) {
            let itemsText = []; let allKeys = [];
            for (let item in adminWaiting[user]) {
                const ks = adminWaiting[user][item];
                itemsText.push(`${item} x${ks.length}`);
                allKeys = allKeys.concat(ks);
            }
            adminH += `
                <div class="list-item" style="border-left:5px solid var(--red); background:#fff5f5; padding:15px; margin-bottom:10px; display:block;">
                    <div style="margin-bottom:10px;">
                        <strong style="font-size:1.5rem;">${user}</strong>
                        <div style="color:var(--red); font-weight:bold; margin-top:5px;">${itemsText.join(', ')}</div>
                    </div>
                    <button onclick="approveUserAll('${allKeys.join(',')}', '${user}')" 
                            style="width:100%; padding:12px; background:var(--red); color:white; border:none; border-radius:10px; font-weight:bold; font-size:1.2rem;">
                        위 항목 전체 승인
                    </button>
                </div>`;
        }

        document.getElementById('inv-unused').querySelector('.list').innerHTML = uH || "비었음";
        document.getElementById('inv-waiting').querySelector('.list').innerHTML = wH || "없음";
        const adminOrderEl = document.getElementById('order-list');
        if (adminOrderEl) adminOrderEl.innerHTML = adminH || "요청 없음";
    });
        }

        // [상점 팝업 함수들 복구]
        window.openAddShopPopup = function() { 
            let h = `<h3>📦 새 물품</h3>상품명: <input type="text" id="add-item-name">가격: <input type="number" id="add-item-price">제한: <input type="number" id="add-item-limit" value="0">
                    카테고리: <select id="add-item-cat"><option value="🍕 먹거리">🍕 먹거리</option><option value="🎫 쿠폰">🎫 쿠폰</option><option value="🎲 뽑기">🎲 뽑기</option><option value="✏️ 학용품">✏️ 학용품</option><option value="✨ 기타">✨ 기타</option></select>
                    <button onclick="saveNewItem()" style="background:var(--primary); color:white;">등록</button>`; 
            openPopup("물품 추가", h); 
        };
        window.saveNewItem = function() { 
            const n=document.getElementById('add-item-name').value, p=parseInt(document.getElementById('add-item-price').value), l=parseInt(document.getElementById('add-item-limit').value), c=document.getElementById('add-item-cat').value; 
            if(n&&p) db.ref('shop').push({cat:c, name:n, price:p, limit:l}).then(()=>{alert("등록됨");closePopup();}); 
        };
        window.openEditShopPopup = function(key) {
            db.ref('shop/' + key).once('value', snap => {
                const i = snap.val(); if(!i) return;
                let h = `<h3>🛍️ 물품 수정</h3>상품명: <input type="text" id="edit-shop-name" value="${i.name}">가격: <input type="number" id="edit-shop-price" value="${i.price}">제한: <input type="number" id="edit-shop-limit" value="${i.limit || 0}">
                        카테고리: <select id="edit-shop-cat"><option value="🍕 먹거리" ${i.cat==='🍕 먹거리'?'selected':''}>🍕 먹거리</option><option value="🎫 쿠폰" ${i.cat==='🎫 쿠폰'?'selected':''}>🎫 쿠폰</option><option value="🎲 뽑기" ${i.cat==='🎲 뽑기'?'selected':''}>🎲 뽑기</option><option value="✏️ 학용품" ${i.cat==='✏️ 학용품'?'selected':''}>✏️ 학용품</option><option value="✨ 기타" ${i.cat==='✨ 기타'?'selected':''}>✨ 기타</option></select>
                        <button onclick="saveEditShop('${key}')" style="background:var(--primary); color:white;">저장</button><button onclick="deleteShopItem('${key}')" style="background:var(--red); color:white;">삭제</button>`;
                openPopup("보급품 관리", h);
            });
        };
        window.saveEditShop = function(k) { const n=document.getElementById('edit-shop-name').value, p=parseInt(document.getElementById('edit-shop-price').value), l=parseInt(document.getElementById('edit-shop-limit').value), c=document.getElementById('edit-shop-cat').value; db.ref('shop/'+k).update({name:n, price:p, limit:l, cat:c}).then(()=>{alert("수정됨");closePopup();}); };
        window.deleteShopItem = function(k) { if(confirm("삭제?")) db.ref('shop/'+k).remove().then(()=>{alert("삭제됨");closePopup();}); };
        function openUserHistory(un) {
            db.ref('users/' + un).once('value', sn => {
                const u = sn.val() || {}, lv = u.lv || 1, pts = u.points || 0, isMeOrAdmin = (isAdmin || un === myName);
                let h = `<div style="display:flex; gap:20px; align-items:center; background:#f8f9fa; padding:20px; border-radius:20px; border:2px solid #eee;"><div style="flex:0 0 100px; text-align:center;">${getAvatar(lv, u.selectedAnimal)}<div style="margin-top:8px; font-weight:bold;">LV.${lv}</div>${un === myName ? `<button onclick="openAvatarPicker()" style="padding:5px; font-size:0.8rem; background:var(--gold); border:none; border-radius:5px;">모습 변경</button>` : ''}</div><div style="flex:1;"><h3 style="margin:0;">${un} 용사</h3>${isMeOrAdmin ? `<div>💰 <b>${pts}P</b></div><div>✨ EXP: <b>${u.exp||0} / 100</b></div>` : `<p style="color:red;">🛡️ 정보는 비밀입니다!</p>`}</div></div>`;
                if (isMeOrAdmin) { db.ref('pointLogs').once('value', lsn => { let uL = []; lsn.forEach(l => { if (l.val().name === un) uL.push(l.val()); }); let logHtml = `<div style="max-height:200px; overflow-y:auto; margin-top:10px;">`; uL.reverse().slice(0, 20).forEach(l => { logHtml += `<div class="list-item"><span>${l.reason}<br><small>${l.time}</small></span><strong>${l.amount}P</strong></div>`; }); openPopup(`${un} 정보`, h + logHtml + `</div>`); }); } else { openPopup(`${un} 정보`, h); }
            });
        }

        async function buyItem(k, n, p, l) {
            const sn = await db.ref('users/'+myName).once('value');
            if((sn.val().points||0) < p) return alert("포인트 부족!");
            if(confirm(`[${n}]을 구매하시겠습니까?`)) { db.ref('orders').push({ user: myName, item: n, status: '대기', time: new Date().toLocaleString() }).then(() => { addScore(myName, -p, 0, `${n} 구매`); alert("✅ 구매 완료!"); }); }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                isAdmin = (user.email === adminEmail);
                db.ref('userEmails/' + user.email.replace(/\./g, ',')).once('value', snap => {
                    if (snap.exists() || isAdmin) {
                        myName = snap.val() || "총사령관";
                        db.ref('users/' + myName).once('value', uSnap => {
                            isHelper = uSnap.val()?.isHelper || false; forceScreenDisplay('app');
                            if (isAdmin) { ['btn-logs', 'btn-admin', 'btn-guide', 'floating-point-btn', 'floating-multi-btn'].forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'block'; }); } 
                            else if (isHelper) { ['btn-shop', 'admin-order-mgr'].forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'block'; }); }
                            startApp(); showTab(currentTab);
                        });
                    } else { alert("미등록!"); auth.signOut(); }
                });
            } else { forceScreenDisplay('login'); }
        });

        function updateNo(n, v) { db.ref('users/' + n).update({ no: parseInt(v) || 0 }); }
        function toggleHelperRole(n, s) { if(confirm(`${n} 권한 변경?`)) db.ref('users/'+n).update({isHelper:!s}); }
        function approveBulk(keyStr, user, item) { if(confirm(`${user}의 ${item}을 모두 승인?`)) { const keys = keyStr.split(','), updates = {}; keys.forEach(k => { updates['orders/' + k + '/status'] = '완료'; }); db.ref().update(updates).then(() => alert("완료!")); } }
        function addScore(n, p, e, r) { db.ref('users/'+n).once('value', sn => { const u=sn.val(); if(!u) return; let nP=(u.points||0)+p, nE=(u.exp||0)+e, nL=(u.lv||1), up=false; while(nE>=100){ nL++; nE-=100; up=true; } db.ref('users/'+n).update({points:nP, exp:nE, lv:nL}).then(()=>{ if(r!=="정상 등교") db.ref('pointLogs').push({name:n, amount:p, reason:r, time:new Date().toLocaleString(), date:getTodayKST()}); if(up) triggerLevelUpRoulette(n, nL); }); }); }
        function triggerLevelUpRoulette(n, l) { if(!giftList.length) return; const pick=giftList[Math.floor(Math.random()*giftList.length)]; db.ref('orders').push({user:n, item:`[레벨업] ${pick}`, status:'대기', time:new Date().toLocaleString()}); if(n===myName) openPopup("LEVEL UP!", `LV.${l} 달성! 보상: ${pick}`); }

        function renderAdminList() {
            let h = ""; currentUsers.forEach(u => { if(u.name === "총사령관") return; const helperColor = u.isHelper ? 'var(--primary)' : '#95a5a6'; h += `<div class="list-item" style="padding:15px; border-bottom:1px solid #eee; display:flex; align-items:center; gap:15px;"><input type="number" value="${u.no || ''}" onchange="updateNo('${u.name}', this.value)" style="width:100px; height:60px; text-align:center; font-size:1.8rem; border:3px solid var(--primary); border-radius:10px; font-weight:bold;"><strong style="font-size:1.6rem; flex:1;">${u.name}</strong><button onclick="toggleHelperRole('${u.name}', ${u.isHelper || false})" style="width:auto; padding:12px 20px; background:${helperColor}; color:white; border-radius:12px; font-weight:bold;">${u.isHelper ? '🛡️ 도우미' : '👤 일반'}</button><button onclick="if(confirm('제명?')) db.ref('users/${u.name}').remove()" style="width:auto; padding:12px 20px; background:var(--red); color:white; border-radius:12px;">제거</button></div>`; }); 
            document.getElementById('student-admin-list').innerHTML = h || "용사가 없습니다."; 
        }

        function renderCheckinBoard() {
            const historyEl = document.getElementById('checkin-history'); if(!historyEl) return;
            const targetDate = document.getElementById('checkin-date-filter').value || getTodayKST();
            db.ref('checkinLogs').once('value', snap => {
                const logs = {}; snap.forEach(c => { const val = c.val(); if(val.date === targetDate) logs[val.name] = val; });
                let html = `<div style="padding:15px; background:#e3f2fd; border-radius:12px; margin-bottom:15px; font-weight:bold;">📅 ${targetDate} 명부</div>`;
                currentUsers.forEach(u => {
                    if(u.name === "총사령관") return; const log = logs[u.name]; let bgColor = log ? (log.result.includes('정상') ? "#ccffcc" : "#ffcccc") : "#ffff00";
                    html += `<div style="display:flex; align-items:center; padding:15px; margin-bottom:8px; border-radius:15px; background:${bgColor};">
                                <span style="width:40px; font-weight:bold;">${u.no || '-'}</span>
                                <span style="width:100px; font-weight:900;">${u.name}</span>
                                <span style="flex:1;">${log ? log.result + ' [' + log.time + ']' : '미등교'}</span>
                            </div>`;
                });
                historyEl.innerHTML = html;
            });
        }

        function loadMyLogs() {
            const listEl = document.getElementById('point-history-list'); if(!listEl) return;
            let query = isAdmin ? db.ref('pointLogs') : db.ref('pointLogs').orderByChild('name').equalTo(myName);
            query.once('value', snap => {
                let logs = []; snap.forEach(l => logs.push(l.val())); logs.reverse();
                let html = isAdmin ? `<div style="background:#444; color:white; padding:8px; text-align:center; border-radius:5px; margin-bottom:10px;">🛡️ 관리자 모드</div>` : "";
                logs.slice(0, 50).forEach(l => { const color = l.amount >= 0 ? "var(--green)" : "var(--red)"; html += `<div class="list-item" style="border-left:8px solid ${color};"><span><b>${isAdmin ? '['+l.name+'] ' : ''}${l.reason}</b><br><small>${l.time}</small></span><strong style="color:${color};">${l.amount}P</strong></div>`; });
                listEl.innerHTML = html || "기록 없음";
            });
        }

        function openPointBulkPopup(t='', p='', e='') {
            let h = `<div style="position:sticky; top:0; background:white; padding-bottom:15px; border-bottom:3px solid var(--gold); z-index:10;"><input type="text" id="pop-bulk-reason" value="${t}" placeholder="사유"><div style="display:flex; gap:10px; justify-content:center; margin-bottom:10px;"><div><small>P</small><input type="number" id="all-p-input" value="${p}" oninput="applyToAll('p')" style="width:80px;"></div><div><small>E</small><input type="number" id="all-e-input" value="${e}" oninput="applyToAll('e')" style="width:80px;"></div></div><button onclick="toggleAllCheckboxes(true)" style="width:48%;">전체</button><button onclick="toggleAllCheckboxes(false)" style="width:48%;">해제</button></div><div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(110px,1fr)); gap:10px; margin-top:15px;">`;
            currentUsers.forEach(u => { if(u.name !== "총사령관") h += `<label style="background:#f8f9fa; border:2px solid #eee; border-radius:15px; padding:10px; text-align:center;"><input type="checkbox" class="student-select" data-name="${u.name}" checked><strong>${u.no||''} ${u.name}</strong><input type="number" class="pop-bulk-p" value="${p}" style="width:60px;"><input type="number" class="pop-bulk-e" value="${e}" style="width:60px;"></label>`; });
            document.getElementById('point-pop-body').innerHTML = h + `</div>`; document.getElementById('point-popup').style.display = 'flex';
            document.getElementById('point-apply-btn').onclick = () => { const r = document.getElementById('pop-bulk-reason').value; if(!r) return alert("사유!"); const cbs = document.querySelectorAll('.student-select'), ps = document.querySelectorAll('.pop-bulk-p'), es = document.querySelectorAll('.pop-bulk-e'); cbs.forEach((cb, i) => { if(cb.checked) addScore(cb.dataset.name, parseInt(ps[i].value)||0, parseInt(es[i].value)||0, r); }); alert("완료"); closePointPopup(); };
        }

        function openMultiPopup(t='', p='', e='') {
            document.getElementById('multi-reason').value = t; document.getElementById('multi-p').value = p; document.getElementById('multi-e').value = e;
            let h = ""; currentUsers.forEach(u => { if(u.name !== "총사령관") h += `<label style="background:#f1f8e9; padding:10px; border-radius:10px; text-align:center;"><input type="checkbox" class="multi-select-check" data-name="${u.name}" checked><br><strong>${u.no||''}<br>${u.name}</strong></label>`; });
            const list = document.getElementById('multi-list'); list.style.display="grid"; list.style.gridTemplateColumns="repeat(5,1fr)"; list.style.gap="5px"; list.innerHTML = h; document.getElementById('multi-popup').style.display = 'flex';
        }

        function applyMultiScores() {
            const r = document.getElementById('multi-reason').value, p = parseInt(document.getElementById('multi-p').value)||0, e = parseInt(document.getElementById('multi-e').value)||0;
            if(!r) return alert("사유!"); document.querySelectorAll('.multi-select-check').forEach(cb => { if(cb.checked) addScore(cb.dataset.name, p, e, r); }); alert("완료"); closeMultiPopup();
        }

        function toggleAllCheckboxes(s) { document.querySelectorAll('.student-select').forEach(cb => cb.checked = s); }
        function checkAllMulti(s) { document.querySelectorAll('.multi-select-check').forEach(cb => cb.checked = s); }
        function applyToAll(type) { const val = document.getElementById('all-'+type+'-input').value; document.querySelectorAll('.pop-bulk-'+type).forEach(input => input.value = val); }
        
        function saveSettings() { db.ref('settings').update({ password: document.getElementById('conf-pass').value, lateTime: document.getElementById('conf-late').value, closeTime: document.getElementById('conf-close').value, routineText: document.getElementById('conf-routine').value }).then(()=>alert("저장됨")); }
        function saveGifts() { db.ref('settings').update({ giftList: document.getElementById('conf-gifts').value.split('\n').filter(t=>t.trim()) }).then(() => alert("보상 저장!")); }
        function bulkReg() { document.getElementById('bulk-in').value.split('\n').forEach(l => { const [n,e]=l.split(',').map(s=>s.trim()); if(n&&e) { db.ref('userEmails/'+e.replace(/\./g,',')).set(n); db.ref('users/'+n).update({points:0, exp:0, lv:1}); }}); alert("완료"); }
        
        async function submitCheckIn() {
            const passInput = document.getElementById('checkin-pass'), pass = passInput.value.trim(); if (!pass) return alert("암호 입력!");
            const sSnap = await db.ref('settings').once('value'), settings = sSnap.val() || {};
            if (pass !== settings.password) return alert("암호 오류!");
            const today = getTodayKST(), logSnap = await db.ref('checkinLogs').once('value');
            let already = false; logSnap.forEach(l => { if (l.val().name === myName && l.val().date === today) already = true; });
            if (already) return alert("이미 등교 완료!");
            const now = new Date(), nowStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            let result = "정상 등교", p = 5, e = 10;
            if (nowStr > (settings.closeTime || "09:00")) return alert("마감됨!");
            else if (nowStr > (settings.lateTime || "08:40")) { result = "지각 등교"; p = 2; e = 5; }
            db.ref('checkinLogs').push({ name: myName, date: today, time: nowStr, result: result }).then(() => {
                addScore(myName, p, e, result); passInput.value = "";
                if (routineItems.length > 0) { rIdx = 0; openPopup("🌅 루틴 시작!", `[1단계] ${routineItems[0]}`, true); } else alert("등교 완료!");
            });
        }
        // 유저별 요청 항목 전체 승인 함수
function approveUserAll(keyStr, user) {
    if(confirm(user + " 용사가 요청한 모든 항목을 승인하시겠습니까?")) {
        const keys = keyStr.split(',');
        const updates = {};
        keys.forEach(k => {
            updates['orders/' + k + '/status'] = '완료';
        });
        db.ref().update(updates).then(() => alert("모든 항목 승인 완료! ✨"));
    }
}
    </script>
