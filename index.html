<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-6 용사 본부 RPG</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --gold: #f1c40f; --green: #2ecc71; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: #ecf0f1; color: #333; }
        #login-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--dark); }
        .login-card { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 80%; max-width: 320px; }
        #main-app { display: none; }
        .tab-menu { display: flex; background: var(--dark); position: sticky; top: 0; z-index: 1000; }
        .tab-menu button { flex: 1; padding: 15px; border: none; background: none; color: white; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .tab-menu button.active { background: #34495e; border-bottom: 4px solid var(--primary); }
        .tab-content { display: none; padding: 20px; max-width: 600px; margin: auto; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        input, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        #admin-only { display: none; border: 2px solid #e74c3c; padding: 10px; border-radius: 10px; margin-top: 10px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>🏰 6-6 용사 본부</h1>
            <button onclick="handleLogin()" style="background: white; color: #444; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <img src="https://www.google.com/favicon.ico" width="18"> Google 로그인
            </button>
        </div>
    </div>

    <div id="main-app">
        <nav class="tab-menu">
            <button id="btn-main" class="active" onclick="showTab('main')">🏰 정보</button>
            <button id="btn-checkin" onclick="showTab('checkin')">⚔️ 등교</button>
            <button id="btn-admin" onclick="showTab('admin')" style="display:none;">🛡️ 관리</button>
        </nav>
        
        <section id="tab-main" class="tab-content active">
            <div class="card"><h2 id="display-name">용사 로딩 중...</h2><div id="display-stats">LV.1 | 0P</div></div>
            <div class="card"><h3>📜 용사 랭킹</h3><div id="all-user-list"></div></div>
        </section>

        <section id="tab-checkin" class="tab-content">
            <div class="card"><h2>⚔️ 오늘의 암호</h2><p style="font-size:0.8rem; color:gray;">선생님이 정해주신 암호를 입력하세요.</p><input type="text" id="checkin-pass" placeholder="암호 입력"><button onclick="submitCheckIn()">소환!</button></div>
        </section>

        <section id="tab-admin" class="tab-content">
