<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-6 용사 본부</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --purple: #9b59b6; --bg: #ecf0f1; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 60px; font-size: 1.4rem; }
        input, button, textarea, select { width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; border: 2px solid #ccc; box-sizing: border-box; font-size: 1.4rem; }
        #loading-screen { display: flex; justify-content: center; align-items: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); color: white; z-index: 3000; font-size: 1.8rem; }
        #login-screen { display: none; justify-content: center; align-items: center; min-height: 100vh; background: var(--dark); padding: 20px; }
        .login-box { background: white; padding: 50px 40px; border-radius: 30px; text-align: center; width: 100%; max-width: 450px; }
        #main-app { display: none; }
        .tab-menu { display: flex; background: var(--dark); position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .tab-menu button { flex: 1; min-width: 95px; padding: 20px 10px; border: none; background: none; color: #95a5a6; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .tab-menu button.active { color: white; border-bottom: 5px solid var(--gold); }
        .tab-content { display: none; padding: 20px; max-width: 1200px; margin: auto; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #eee; gap: 10px; font-size: 1.3rem; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 20px; margin-top: 20px; }
        .hero-card { background: white; border-radius: 20px; padding: 25px 15px; text-align: center; box-shadow: 0 6px 15px rgba(0,0,0,0.1); border: 3px solid transparent; cursor: pointer; }
        .hero-card.me { border-color: var(--gold); background: #fffdf2; transform: scale(1.03); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .popup-box { background: white; padding: 20px; border-radius: 25px; width: 95%; max-width: 700px; display: flex; flex-direction: column; max-height: 95vh; }
        #pop-close-btn { order: -1; margin-bottom: 15px; background: var(--green); color: white; border: none; border-radius: 15px; padding: 15px; font-size: 1.4rem; font-weight: bold; }
        #pop-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-right: 5px; border-top: 1px solid #eee; }
        .floating-btn { position: fixed; bottom: 25px; width: 85px; height: 85px; border-radius: 45px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 999; font-size: 2.2rem; display: none; align-items: center; justify-content: center; border: none; cursor: pointer; }
        #floating-point-btn { right: 25px; background: var(--gold); color: var(--dark); }
        #floating-multi-btn { right: 120px; background: #2ecc71; color: white; }
    </style>
</head>
<body>
    <div id="loading-screen">🏰 용사 본부 접속 중...</div>

    <div id="reason-popup" class="overlay">
        <div class="popup-box" style="max-width:400px;">
            <h3 id="reason-name" style="text-align:center; margin-bottom:20px;"></h3>
            <label>구분</label><select id="sel-type"><option value="결석">결석</option><option value="조퇴">조퇴</option><option value="지각">지각</option><option value="결과">결과</option></select>
            <label>인정</label><select id="sel-sub"><option value="질병">질병</option><option value="출석인정">출석인정</option><option value="미인정">미인정</option><option value="기타">기타</option></select>
            <label>상세 사유</label><input type="text" id="sel-note" placeholder="사유 입력">
            <div style="display:flex; gap:10px;"><button onclick="saveReasonClick()" style="background:var(--primary); color:white;">저장</button><button onclick="closeReasonPopup()">취소</button></div>
            <button onclick="deleteReasonClick()" style="background:var(--red); color:white; margin-top:10px;">삭제</button>
        </div>
    </div>

    <div id="common-overlay" class="overlay"><div class="popup-box"><h2 id="pop-title" style="margin:0; text-align:center;">알림</h2><div id="pop-content"></div><button onclick="closePopup()" id="pop-close-btn">확인(닫기)</button></div></div>
    <div id="point-popup" class="overlay"><div class="popup-box"><h2 id="point-pop-title" style="margin-top:0; text-align:center;">⚖️ 포인트 전령</h2><div id="point-pop-body" style="overflow-y:auto; flex:1;"></div><div style="display:flex; gap:15px; margin-top:20px;"><button onclick="closePointPopup()" style="background:#95a5a6; color:white; border:none; border-radius:15px; flex:1; padding:15px;">닫기</button><button id="point-apply-btn" style="background:var(--gold); font-weight:bold; border:none; border-radius:15px; flex:1; padding:15px;">반영하기</button></div></div></div>

    <div id="login-screen"><div class="login-box"><h1>🏰 6-6 용사 본부</h1><button onclick="handleLogin()" style="background:#4285F4; color:white; border:none; border-radius:15px; padding:20px;">Google 로그인</button></div></div>

    <div id="main-app">
        <nav class="tab-menu">
            <button onclick="showTab('main')">🤺 용사들</button>
            <button onclick="showTab('shop')">🛍️ 상점</button>
            <button id="btn-logs" style="display:none;" onclick="showTab('logs')">📅 등교(책상)</button>
            <button onclick="showTab('points')">💰 연대기</button>
            <button id="btn-admin" style="display:none;" onclick="showTab('admin')">🛡️ 설정</button>
        </nav>

        <section id="tab-main" class="tab-content active"><div id="hero-grid" class="hero-grid"></div></section>
        
        <section id="tab-shop" class="tab-content">
            <div id="admin-shop-mgr" class="card" style="display:none; border:3px solid var(--purple);">
                <h3>📦 물품 등록</h3>
                <select id="item-cat-in"><option value="🍕 먹거리">🍕 먹거리</option><option value="🎫 쿠폰">🎫 쿠폰</option><option value="🎲 뽑기">🎲 뽑기</option><option value="✨ 기타">✨ 기타</option></select>
                <input type="text" id="item-name-in" placeholder="상품명"><input type="number" id="item-price-in" placeholder="가격">
                <button onclick="addItem()" style="background:var(--purple); color:white;">등록</button>
            </div>
            <div class="card"><h2>🛍️ 용사 보급소</h2><div id="shop-list"></div></div>
            <div id="admin-order-mgr" class="card" style="display:none; border:2px solid var(--red);"><h3>📜 사용 승인</h3><div id="order-list"></div></div>
        </section>

        <section id="tab-logs" class="tab-content"><div class="card"><input type="date" id="checkin-date-filter" onchange="renderCheckinBoard()"><div id="desk-layout" style="display:grid; gap:10px; background:#eee; padding:15px; border-radius:15px; margin-top:15px;"></div></div></section>

        <section id="tab-points" class="tab-content"><div class="card"><h3>🎁 인벤토리</h3><div id="inv-unused"></div><h3>📜 연대기</h3><div id="point-history-list"></div></div></section>

        <section id="tab-admin" class="tab-content">
            <div class="card">가로칸수:<input type="number" id="conf-cols" value="6">배치도:<textarea id="conf-desks" rows="3"></textarea><button onclick="saveDeskSettings()">저장</button></div>
            <div class="card"><h3>👥 명단</h3><div id="student-admin-list"></div></div>
            <div class="card"><h3>⚙️ 설정</h3>암호:<input type="text" id="conf-pass"> 루틴:<textarea id="conf-routine" rows="3"></textarea><button onclick="saveSettings()">시스템 저장</button></div>
        </section>

        <button id="floating-point-btn" class="floating-btn" onclick="openPointBulkPopup()">⚖️</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDWdWrw8LJ6tSiyF1X5tENJEvBfY-DzSw0", authDomain: "cs6-6class.firebaseapp.com", databaseURL: "https://cs6-6class-default-rtdb.firebaseio.com/", projectId: "cs6-6class", storageBucket: "cs6-6class.firebasestorage.app", messagingSenderId: "644235499537", appId: "1:644235499537:web:2ede2611f4ec6a3e8179b0" };
        const adminEmail = "ksosuny@cberi.go.kr"; 
        firebase.initializeApp(firebaseConfig); const db = firebase.database(); const auth = firebase.auth(); const provider = new firebase.auth.GoogleAuthProvider();

        let myName = "", isAdmin = false, isHelper = false, currentUsers = [], routineItems = [], rIdx = 0, selectedTarget = { name: '', date: '' };
        let currentTab = sessionStorage.getItem('activeTab') || 'main';

        function getTodayKST() { const now = new Date(); return new Date(now.getTime() + (9 * 60 * 60 * 1000)).toISOString().split('T')[0]; }

        function getAvatar(lv, selectedAnimal) {
            const githubImageUrl = "https://github.com/sun-ny14/cs6-6/blob/main/%EC%9C%A1%EC%9C%A1%EC%9D%B4.jpg?raw=true";
            const animals = ["귀여운", "신사", "사랑스러운", "패셔니스타", "밥먹는", "날쌘돌이", "즐거운", "행복한", "정의로운", "천사", "닌자", "왕자", "공주", "근육맨", "마법사", "용사", "공부하는", "춤추는", "노래하는", "무지개"];
            const name = selectedAnimal || animals[Math.min(lv - 1, 19)];
            const index = animals.indexOf(name);
            const posX = (index % 5) * 25, posY = [0, 33.3, 66.6, 100][Math.floor(index / 5)];
            return `<div style="width:85px; height:85px; overflow:hidden; border:2px solid #eee; border-radius:20px; background:white; margin:0 auto;"><div style="width:100%; height:100%; background-image:url('${githubImageUrl}'); background-size:505% 405%; background-position:${posX}% ${posY}%; transform:scale(1.4); transform-origin:center; image-rendering:pixelated;"></div></div>`;
        }

        function startApp() {
            db.ref('settings').on('value', snap => {
                const s = snap.val() || {}; routineItems = s.routineText?.split('\n').filter(t=>t.trim()) || [];
                if(isAdmin){ document.getElementById('conf-pass').value = s.password || ""; document.getElementById('conf-routine').value = s.routineText || ""; }
            });

            let currentShopCat = "전체";
            db.ref('shop').on('value', snap => {
                const cats = ["전체", "🍕 먹거리", "🎫 쿠폰", "🎲 뽑기", "✨ 기타"];
                let html = "<div style='display:flex; overflow-x:auto; gap:10px; margin-bottom:10px;'>";
                cats.forEach(c => { html += `<button onclick="filterShop('${c}')" style="width:auto; padding:8px 15px; background:${currentShopCat===c?'var(--primary)':'#eee'}; color:${currentShopCat===c?'white':'#333'}">${c}</button>`; });
                html += "</div>";
                snap.forEach(c => { const i = c.val(); if(currentShopCat!=="전체" && i.cat!==currentShopCat) return; html += `<div class="list-item"><span>${i.name} (${i.price}P)</span><button onclick="buyItem('${c.key}','${i.name}',${i.price})">구매</button></div>`; });
                document.getElementById('shop-list').innerHTML = html;
            });
            window.filterShop = (c) => { currentShopCat = c; db.ref('shop').once('value', renderShop); }; // 간략화

            db.ref('orders').on('value', snap => {
                let uH = "", adminH = "";
                snap.forEach(c => {
                    const o = c.val(); if(o.user === myName && o.status === '대기') uH += `<div class="list-item"><span>${o.item}</span><button onclick="db.ref('orders/${c.key}').update({status:'사용요청'})">사용</button></div>`;
                    if((isAdmin || isHelper) && o.status === '사용요청') adminH += `<div class="list-item"><b>${o.user}</b>: ${o.item}<button onclick="db.ref('orders/${c.key}').update({status:'완료'})">승인</button></div>`;
                });
                document.getElementById('inv-unused').innerHTML = uH || "비었음";
                if(document.getElementById('order-list')) document.getElementById('order-list').innerHTML = adminH || "요청 없음";
            });
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                isAdmin = (user.email === adminEmail);
                db.ref('userEmails/' + user.email.replace(/\./g, ',')).once('value', snap => {
                    if (snap.exists() || isAdmin) {
                        myName = snap.val() || "총사령관";
                        db.ref('users/' + myName).once('value', uSnap => {
                            isHelper = uSnap.val()?.isHelper || false;
                            document.getElementById('loading-screen').style.display='none'; document.getElementById('main-app').style.display='block';
                            if (isAdmin) { ['btn-logs', 'btn-admin', 'admin-shop-mgr', 'floating-point-btn'].forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'block'; }); }
                            if (isAdmin || isHelper) document.getElementById('admin-order-mgr').style.display = 'block';
                            startApp(); showTab(currentTab);
                        });
                        db.ref('users').on('value', uSnap => {
                            let us = []; uSnap.forEach(c => { let v=c.val(); v.name=c.key; us.push(v); });
                            currentUsers = us.sort((a,b)=>(a.no||99)-(b.no||99));
                            let h = ""; us.forEach(u => { if(u.name==="총사령관") return; h+=`<div class="hero-card ${u.name===myName?'me':''}" onclick="openAvatarPicker()"><span>${getAvatar(u.lv||1, u.selectedAnimal)}</span><br><b>${u.name}</b><br><span>${u.points||0}P</span></div>`; });
                            document.getElementById('hero-grid').innerHTML = h;
                            if(isAdmin) renderAdminList();
                            renderCheckinBoard();
                        });
                    }
                });
            } else { document.getElementById('loading-screen').style.display='none'; document.getElementById('login-screen').style.display='flex'; }
        });

        // 명단 관리, 배치 저장 등 나머지 필수 함수
        function showTab(t) { currentTab=t; sessionStorage.setItem('activeTab', t); document.querySelectorAll('.tab-content').forEach(s=>s.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active'); if(t==='logs')renderCheckinBoard(); if(t==='points')loadMyLogs(); }
        function saveDeskSettings() { db.ref('settings').update({deskCols:document.getElementById('conf-cols').value, deskOrder:document.getElementById('conf-desks').value}).then(()=>alert("저장됨")); }
        function renderCheckinBoard() {
            const deskEl = document.getElementById('desk-layout'); const targetDate = document.getElementById('checkin-date-filter').value || getTodayKST();
            db.ref('settings').once('value', sSnap => {
                const s = sSnap.val(); const order = s.deskOrder ? s.deskOrder.split(',').map(n=>n.trim()) : []; deskEl.style.gridTemplateColumns = `repeat(${s.deskCols || 6}, 1fr)`;
                db.ref('checkinLogs').once('value', lSnap => {
                    const logs = {}; lSnap.forEach(c => { if(c.val().date === targetDate) logs[c.val().name] = c.val(); });
                    let html = ""; order.forEach(name => {
                        if(name==="비움") { html+="<div style='height:80px;'></div>"; return; }
                        const user = currentUsers.find(u => u.name === name); const log = logs[name];
                        let bg = log ? (log.result.includes('정상') ? '#2ecc71' : '#ff4757') : (user?.fixedExclude ? '#57606f' : '#ffa502');
                        html += `<div onclick="openReasonPopup('${name}','${targetDate}')" style="background:${bg}; color:white; padding:10px; border-radius:12px; height:80px; text-align:left; cursor:pointer;"><b>${name}</b><br><small>${log ? log.result : (user?.fixedExclude ? '고정:'+user.fixedExclude : '미등교')}</small></div>`;
                    });
                    deskEl.innerHTML = html;
                });
            });
        }
        // ... (나머지 openPopup, addItem, loadMyLogs 등은 기존과 동일)
        function openPopup(t,h) { document.getElementById('pop-title').innerText=t; document.getElementById('pop-content').innerHTML=h; document.getElementById('common-overlay').style.display='flex'; }
        function closePopup() { document.getElementById('common-overlay').style.display='none'; }
        function handleLogin() { auth.signInWithPopup(provider); }
        function renderAdminList() { let h = ""; currentUsers.forEach(u => { if(u.name==="총사령관")return; h += `<div class="list-item"><input type="number" value="${u.no||''}" onchange="db.ref('users/${u.name}').update({no:parseInt(this.value)})" style="width:60px;"><strong>${u.name}</strong><button onclick="db.ref('users/${u.name}').update({isHelper:!u.isHelper})">${u.isHelper?'도우미':'일반'}</button></div>`; }); document.getElementById('student-admin-list').innerHTML = h; }
        function bulkReg() { document.getElementById('bulk-in').value.split('\n').forEach(l => { const [n,e]=l.split(',').map(s=>s.trim()); if(n&&e) { db.ref('userEmails/'+e.replace(/\./g,',')).set(n); db.ref('users/'+n).update({points:0, exp:0, lv:1}); }}); alert("완료"); }
        function loadMyLogs() { db.ref('pointLogs').once('value', snap => { let logs = []; snap.forEach(l => { if(isAdmin || l.val().name === myName) logs.push(l.val()); }); logs.reverse(); let h = ""; logs.slice(0, 50).forEach(l => { h += `<div class="list-item"><span>${l.reason}</span><strong>${l.amount}P</strong></div>`; }); document.getElementById('point-history-list').innerHTML = h || "기록 없음"; }); }
        async function buyItem(k, n, p) { const sn = await db.ref('users/'+myName).once('value'); if((sn.val().points||0) < p) return alert("부족!"); if(confirm(n+" 구매?")) { db.ref('orders').push({user:myName, item:n, status:'대기', time:new Date().toLocaleString()}); addScore(myName, -p, 0, n+" 구매"); } }
        function addScore(n,p,e,r) { db.ref('users/'+n).once('value', sn => { const u=sn.val(); if(!u)return; let nP=(u.points||0)+p, nE=(u.exp||0)+e, nL=u.lv||1; while(nE>=100){ nL++; nE-=100; } db.ref('users/'+n).update({points:nP, exp:nE, lv:nL}); db.ref('pointLogs').push({name:n, amount:p, reason:r, time:new Date().toLocaleString(), date:getTodayKST()}); }); }
    </script>
</body>
</html>
