<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-6 용사 본부</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --purple: #9b59b6; --bg: #ecf0f1; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 60px; font-size: 1.2rem; }
        #loading-screen { display: flex; justify-content: center; align-items: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); color: white; z-index: 3000; font-size: 1.8rem; }
        #login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--dark); padding: 20px; }
        .login-box { background: white; padding: 50px 40px; border-radius: 30px; text-align: center; width: 100%; max-width: 450px; }
        #main-app { display: none; }
        .tab-menu { display: flex; background: var(--dark); position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .tab-menu button { flex: 1; min-width: 95px; padding: 20px 10px; border: none; background: none; color: #95a5a6; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .tab-menu button.active { color: white; border-bottom: 5px solid var(--gold); }
        .tab-content { display: none; padding: 20px; max-width: 1200px; margin: auto; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; gap: 15px; font-size: 1.2rem; }
        input, button, textarea, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; font-size: 1.2rem; }
        .pop-score-input { width: 95px !important; height: 70px !important; font-size: 1.7rem !important; text-align: center; border: 3px solid var(--primary) !important; font-weight: bold; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 20px; margin-top: 20px; }
        .hero-card { background: white; border-radius: 20px; padding: 25px 15px; text-align: center; box-shadow: 0 6px 15px rgba(0,0,0,0.1); border: 3px solid transparent; position: relative; cursor: pointer; }
        .hero-card.me { border-color: var(--gold); background: #fffdf2; transform: scale(1.03); }
        .card-avatar { font-size: 4rem; margin-bottom: 10px; display: block; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .popup-box { background: white; padding: 30px; border-radius: 25px; width: 95%; max-width: 700px; display: flex; flex-direction: column; max-height: 85vh; }
        #pop-content { flex: 1; overflow-y: auto; margin: 20px 0; padding-right: 5px; }
        #pop-close-btn { background: var(--green); font-size: 1.4rem; padding: 18px; width: 100%; border:none; border-radius:15px; color:white; cursor:pointer; }
        .floating-btn { position: fixed; bottom: 25px; right: 25px; width: 85px; height: 85px; border-radius: 45px; background: var(--gold); color: var(--dark); box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 999; font-size: 2.2rem; display: none; align-items: center; justify-content: center; border: none; cursor: pointer; }
        .coupon-card { background: #fff; border: 2.5px solid var(--purple); padding: 18px; border-radius: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        #roulette-box { font-size: 2.2rem; font-weight: bold; color: var(--purple); padding: 30px; border: 5px dashed var(--gold); margin: 20px 0; border-radius: 20px; background: #fffceb; text-align: center; }
        .lv-up-title { color: var(--gold); font-size: 2.5rem; text-shadow: 2px 2px var(--dark); text-align: center; font-weight:bold; }
        /* 아바타 스타일 복구 */
        .pixel-avatar { width: 64px; height: 64px; background-image: url('avatars.png'); background-repeat: no-repeat; background-size: 384px 64px; display: inline-block; image-rendering: pixelated; vertical-align: middle; }
        .avatar-lv1 { background-position: 0px 0px; } .avatar-lv5 { background-position: -64px 0px; } .avatar-lv10 { background-position: -128px 0px; } .avatar-lv15 { background-position: -192px 0px; } .avatar-lv20 { background-position: -256px 0px; } .avatar-lv30 { background-position: -320px 0px; }
    </style>
</head>
<body>
    <div id="loading-screen">🏰 용사 본부 접속 중...</div>
    <div id="common-overlay" class="overlay"><div class="popup-box"><h2 id="pop-title" style="margin:0; text-align:center;">알림</h2><div id="pop-content"></div><button onclick="closePopup()" id="pop-close-btn">확인</button></div></div>
    <div id="point-popup" class="overlay"><div class="popup-box"><h2 id="point-pop-title" style="margin-top:0;">포인트 전령</h2><div id="point-pop-body" style="overflow-y:auto; flex:1;"></div><div style="display:flex; gap:15px; margin-top:20px;"><button onclick="closePointPopup()" style="background:#95a5a6; font-size: 1.3rem; border-radius:10px; border:none; padding:15px; flex:1; color:white;">닫기</button><button id="point-apply-btn" style="background:var(--gold); color:var(--dark); font-size: 1.3rem; border-radius:10px; border:none; padding:15px; flex:1; font-weight:bold;">반영하기</button></div></div></div>
    
    <div id="login-screen"><div class="login-box"><h1>🏰<br>6-6 용사 본부</h1><button onclick="handleLogin()" style="background:#4285F4; font-size: 1.5rem; padding: 22px; color:white; border:none; border-radius:15px; cursor:pointer;">Google 로그인</button></div></div>

    <div id="main-app">
        <nav class="tab-menu">
            <button id="btn-main" onclick="showTab('main')">🤺 용사들</button>
            <button id="btn-shop" onclick="showTab('shop')">🛍️ 상점</button>
            <button id="btn-guide" style="display:none;" onclick="showTab('guide')">📜 도감</button>
            <button id="btn-checkin" onclick="showTab('checkin')">⚔️ 등교</button>
            <button id="btn-logs" style="display:none;" onclick="showTab('logs')">📅 등교로그</button>
            <button id="btn-points" onclick="showTab('points')">💰 연대기</button>
            <button id="btn-admin" style="display:none;" onclick="showTab('admin')">🛡️ 관리</button>
        </nav>
        
        <section id="tab-main" class="tab-content active"><div id="hero-grid" class="hero-grid"></div></section>
        
        <section id="tab-shop" class="tab-content">
            <!-- 상점 등록 로직 복구 -->
            <div id="admin-shop-mgr" class="card" style="display:none; border:3px solid var(--purple);">
                <h3>📦 물품 등록</h3>
                <select id="item-cat-in">
                    <option value="🍕 먹거리">🍕 먹거리</option>
                    <option value="🎫 쿠폰">🎫 쿠폰</option>
                    <option value="🎲 뽑기">🎲 뽑기</option>
                    <option value="✏️ 학용품">✏️ 학용품</option>
                    <option value="✨ 기타">✨ 기타</option>
                </select>
                <input type="text" id="item-name-in" placeholder="상품명">
                <input type="number" id="item-price-in" placeholder="가격 (P)">
                <button onclick="addItem()" style="background:var(--purple); color:white; border:none;">진열</button>
            </div>
            <div class="card"><h2>🛍️ 용사 보급소</h2><div id="shop-list"></div></div>
            <div id="admin-order-mgr" class="card" style="display:none; border:2px solid var(--red);"><h3>📜 사용 요청 목록</h3><div id="order-list"></div></div>
        </section>

        <section id="tab-guide" class="tab-content">
            <!-- 도감 등록 로직 복구 -->
            <div id="admin-guide-mgr" class="card" style="display:none; border:3px solid var(--primary);">
                <h3>📋 사유 등록</h3>
                <input type="text" id="guide-title" placeholder="항목">
                <input type="number" id="guide-p" placeholder="P">
                <input type="number" id="guide-e" placeholder="E">
                <button onclick="addGuide()" style="background:var(--primary); color:white; border:none;">등록</button>
            </div>
            <div class="card"><h2>📜 포인트 도감</h2><div id="guide-list" class="hero-grid"></div></div>
        </section>

        <section id="tab-checkin" class="tab-content"><div class="card"><h2>⚔️ 등교 확인</h2><div id="checkin-guide" style="font-weight:bold; font-size:1.4rem; margin-bottom:15px;"></div><input type="text" id="checkin-pass" placeholder="오늘의 암호" style="text-align:center;"><button id="btn-checkin-submit" onclick="submitCheckIn()" style="padding:25px; font-size:1.6rem; background:var(--primary); color:white; border:none; border-radius:15px;">본부 소환!</button></div></section>
        <section id="tab-logs" class="tab-content"><div class="card"><h2>📅 등교 기록부</h2><div style="margin-bottom:15px; display:flex; gap:10px; align-items:center;"><span style="font-weight:bold;">날짜:</span><input type="date" id="checkin-date-filter" style="flex:1; font-size:1.3rem; padding:10px;"></div><div id="checkin-history"></div></div></section>
        <section id="tab-points" class="tab-content"><div id="my-inventory" class="card"><h3>🎁 나의 인벤토리</h3><div id="my-coupon-list"></div></div><div class="card"><h3>📜 포인트 연대기</h3><div id="point-history-list"></div></div></section>
        
        <section id="tab-admin" class="tab-content">
            <div class="card"><h3>👥 명단 관리</h3><div id="student-admin-list"></div></div>
            <div class="card"><h3>⚙️ 시스템 설정</h3>암호:<input type="text" id="conf-pass"> 지각:<input type="time" id="conf-late"> 마감:<input type="time" id="conf-close"> 루틴:<textarea id="conf-routine" rows="5"></textarea><button onclick="saveSettings()">저장</button></div>
            <div class="card"><h3>🎁 레벨업 보상</h3><textarea id="conf-gifts" rows="5" placeholder="사탕&#13;&#10;초콜릿&#13;&#10;쿠폰"></textarea><button onclick="saveGifts()">저장</button></div>
            <div class="card"><h3>🆕 학생 일괄 등록</h3><textarea id="bulk-in" placeholder="이름,이메일" rows="4"></textarea><button onclick="bulkReg()">주입</button></div>
        </section>

        <button id="floating-point-btn" class="floating-btn" onclick="openPointBulkPopup()">⚖️</button>
        <button id="floating-score-btn" class="floating-btn" style="right: 140px;" onclick="openScorePopup()">🎯</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDWdWrw8LJ6tSiyF1X5tENJEvBfY-DzSw0", authDomain: "cs6-6class.firebaseapp.com", databaseURL: "https://cs6-6class-default-rtdb.firebaseio.com/", projectId: "cs6-6class", storageBucket: "cs6-6class.firebasestorage.app", messagingSenderId: "644235499537", appId: "1:644235499537:web:2ede2611f4ec6a3e8179b0" };
        const adminEmail = "ksosuny@cberi.go.kr"; firebase.initializeApp(firebaseConfig); const db = firebase.database(); const auth = firebase.auth(); const provider = new firebase.auth.GoogleAuthProvider();
        let myName = "", isAdmin = false, currentUsers = [], allLogs = [], rIdx = 0, routineItems = [], giftList = [];
        let currentTab = sessionStorage.getItem('activeTab') || 'main';

        // 아바타 로직 복구
        function getAvatar(lv) { let lvClass = lv >= 30 ? "avatar-lv30" : lv >= 20 ? "avatar-lv20" : lv >= 15 ? "avatar-lv15" : lv >= 10 ? "avatar-lv10" : lv >= 5 ? "avatar-lv5" : "avatar-lv1"; return `<div class="pixel-avatar ${lvClass}"></div>`; }

        auth.onAuthStateChanged((user) => {
            if (user) {
                isAdmin = (user.email.toLowerCase() === adminEmail.toLowerCase());
                const eKey = user.email.replace(/\./g, ',');
                db.ref('userEmails/' + eKey).once('value', snap => {
                    if (snap.exists() || isAdmin) {
                        myName = snap.val() || "총사령관";
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('main-app').style.display = 'block';
                        if(isAdmin) { ['floating-point-btn', 'floating-score-btn', 'btn-guide', 'btn-logs', 'btn-admin'].forEach(id => { const el = document.getElementById(id); if(el) el.style.display = id.includes('btn') ? 'block' : 'flex'; }); }
                        startApp(); showTab(currentTab); document.getElementById('loading-screen').style.display = 'none';
                    } else { alert("미등록!"); auth.signOut(); }
                });
            } else { document.getElementById('loading-screen').style.display = 'none'; document.getElementById('login-screen').style.display = 'flex'; document.getElementById('main-app').style.display = 'none'; }
        });

        function handleLogin() { auth.signInWithPopup(provider); }
        function showTab(t) { currentTab = t; sessionStorage.setItem('activeTab', t); document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active')); document.querySelectorAll('.tab-menu button').forEach(b => b.classList.remove('active')); if(document.getElementById('tab-'+t)) document.getElementById('tab-'+t).classList.add('active'); if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.add('active'); }

        function startApp() {
            const todayStr = new Date().toISOString().split('T')[0];
            const dateInput = document.getElementById('checkin-date-filter');
            if(dateInput && !dateInput.value) { dateInput.value = todayStr; dateInput.onchange = () => renderCheckinBoard(); }

            db.ref('pointLogs').on('value', snap => { allLogs = []; snap.forEach(c => { if(c.val()) allLogs.push(c.val()); }); renderHistory(); });
            db.ref('settings').on('value', snap => {
                const s = snap.val() || {}; giftList = (s.giftList || []).filter(g => g.trim() !== "");
                document.getElementById('conf-pass').value = s.password || "";
                document.getElementById('conf-late').value = s.lateTime || "08:40";
                document.getElementById('conf-close').value = s.closeTime || "09:00";
                document.getElementById('conf-routine').value = s.routineText || "";
                document.getElementById('conf-gifts').value = giftList.join('\n');
                routineItems = (s.routineText || "").split('\n').filter(t => t.trim() !== "");
                document.getElementById('checkin-guide').innerText = `✅ 정상: ~${s.lateTime} | ⚠️ 지각: ~${s.closeTime}`;
            });

            db.ref('users').on('value', snap => {
                let users = []; snap.forEach(c => { let u = c.val(); if(u){ u.name = u.name || c.key; users.push(u); }});
                users.sort((a, b) => (parseInt(a.no) || 999) - (parseInt(b.no) || 999));
                currentUsers = users;
                let gH = "";
                users.forEach(u => {
                    // [핵심수정] 총사령관 완벽 은신
                    if(u.name === "총사령관" || (u.email && u.email.toLowerCase() === adminEmail.toLowerCase())) return;
                    const isMe = (u.name === myName);
                    gH += `<div class="hero-card ${isMe?'me':''}" onclick="openUserHistory('${u.name}')"><span class="card-avatar">${getAvatar(u.lv||1)}</span><div class="card-name">LV.${u.lv||1} ${u.name}</div><div class="card-pt">${u.points||0}P</div></div>`;
                });
                document.getElementById('hero-grid').innerHTML = gH;
                renderCheckinBoard();
            });

            // 도감 표시 복구
            db.ref('pointGuide').on('value', snap => {
                let hH = ""; snap.forEach(c => { const g = c.val(); hH += `<div class="hero-card"><b>${g.title}</b><div class="card-pt">${g.p}P / ${g.e}E</div></div>`; });
                document.getElementById('guide-list').innerHTML = hH || "도감 비어있음";
            });

            db.ref('orders').on('value', snap => {
                let cH = "", oH = "";
                snap.forEach(c => {
                    const o = c.val();
                    if(o.user === myName && o.status !== '완료') {
                        const isW = (o.status === '사용요청');
                        cH += `<div class="coupon-card"><span>${o.item} ${isW?'(⏳요청중)':''}</span><button onclick="requestUseCoupon('${c.key}', '${o.item}')" style="width:auto; background:${isW?'#95a5a6':'var(--purple)'}; color:white; border:none; padding:10px;" ${isW?'disabled':''}>${isW?'대기':'사용'}</button></div>`;
                    }
                    if((isAdmin) && o.status === '사용요청') oH += `<div class="list-item"><span>${o.user}: ${o.item}</span><button onclick="approveOrder('${c.key}')" style="background:var(--green); width:auto; color:white; border:none; padding:10px;">승인</button></div>`;
                });
                document.getElementById('my-coupon-list').innerHTML = cH || "보유 물품 없음";
                if(isAdmin) document.getElementById('order-list').innerHTML = oH || "사용 요청 없음";
            });

            const renderCheckinBoard = () => {
                const targetDate = document.getElementById('checkin-date-filter').value;
                db.ref('checkinLogs').once('value', logSnap => {
                    const logs = {}; logSnap.forEach(c => { const l = c.val(); if(l.date === targetDate) logs[l.name] = l; });
                    let hH = `<div style="margin-bottom:10px; font-size:1.1rem; color:#666;">📌 <b>${targetDate}</b> 출석부</div>`;
                    currentUsers.forEach(u => {
                        // [핵심수정] 출석부에서도 총사령관 은신
                        if(u.name === "총사령관") return;
                        const log = logs[u.name]; let color = "#f1c40f", txt = "미등교", time = "-";
                        if (log) { time = log.time || ""; if (log.result.includes('정상')) { color = "var(--green)"; txt = "정상"; } else { color = "var(--red)"; txt = log.result; } }
                        hH += `<div class="list-item" style="border-left:15px solid ${color};"><span>${u.no}. <strong>${u.name}</strong></span><b>${txt}</b><span>${time}</span></div>`;
                    });
                    document.getElementById('checkin-history').innerHTML = hH;
                });
            };
            db.ref('checkinLogs').on('value', () => renderCheckinBoard());
            // 1. 상점 목록 출력 로직 수정 (관리자일 때만 삭제 버튼 노출)
db.ref('shop').on('value', snap => {
    let sH = ""; 
    snap.forEach(c => { 
        const i = c.val(); 
        const delBtn = isAdmin ? `<button onclick="deleteItem('${c.key}', '${i.name}')" style="width:auto; background:var(--red); color:white; border:none; padding:10px; margin-left:5px;">삭제</button>` : "";
        
        sH += `<div class="list-item">
                <span>[${i.cat||'✨'}] ${i.name} (${i.price}P)</span>
                <div>
                    <button onclick="buyItem('${c.key}', '${i.name}', ${i.price})" style="width:auto; background:var(--primary); color:white; border:none; padding:10px;">구매</button>
                    ${delBtn}
                </div>
               </div>`; 
    });
    document.getElementById('shop-list').innerHTML = sH || "보급소 준비 중";
});

// 2. 물품 삭제 함수 추가 (스크립트 하단에 추가)
function deleteItem(key, name) {
    if(confirm(`[${name}] 물품을 보급소에서 삭제하시겠습니까?`)) {
        db.ref('shop/' + key).remove()
            .then(() => alert("삭제되었습니다."))
            .catch((error) => alert("삭제 실패: " + error.message));
    }
}

        // [핵심수정] 상점 구매 알림 확실히 노출
        function buyItem(k, n, p) {
            db.ref('users/'+myName).once('value', sn => {
                const curP = (sn.val().points || 0);
                if(curP < p) return alert("포인트가 부족합니다!");
                if(confirm(`[${n}]을(를) ${p}P에 구매하시겠습니까?`)) {
                    updatePoint(myName, -p, n + " 구매");
                    db.ref('orders').push({ user: myName, item: n, status: '대기', time: new Date().toLocaleString() }).then(() => {
                        openPopup("🛍️ 구매 성공!", `<h3>[${n}] 구매 완료!</h3><p>인벤토리에서 확인 후 사용하세요.</p>`);
                    });
                }
            });
        }

        // [핵심수정] 레벨업 보상 정배 (관리 탭 목록만 사용)
        function triggerLevelUpRoulette(userName, newLv) {
            if (!giftList || giftList.length === 0) { openPopup("🎊 레벨업!", `<h3>축하합니다! LV.${newLv} 달성!</h3>`); return; }
            document.getElementById('pop-title').innerHTML = `<span class="lv-up-title">🎊 LEVEL UP! 🎊</span>`;
            document.getElementById('pop-content').innerHTML = `<div style="text-align:center; padding:10px;"><p style="font-size:1.4rem;"><b>${userName}</b> 용사, 레벨 <b>${newLv}</b> 달성!</p><div id="roulette-box">보상 탐색 중...</div></div>`;
            document.getElementById('pop-close-btn').style.display = 'none';
            document.getElementById('common-overlay').style.display = 'flex';
            let count = 0;
            const interval = setInterval(() => {
                document.getElementById('roulette-box').innerText = giftList[Math.floor(Math.random() * giftList.length)];
                count++;
                if (count > 20) {
                    clearInterval(interval);
                    const finalGift = giftList[Math.floor(Math.random() * giftList.length)];
                    const resultText = `[LV.${newLv} 레벨업 보상] ${finalGift}`;
                    document.getElementById('roulette-box').innerText = "⭐ " + finalGift + " ⭐";
                    document.getElementById('roulette-box').style.background = "var(--gold)";
                    document.getElementById('pop-close-btn').style.display = 'block';
                    db.ref('pointLogs').push({ name: userName, amount: 0, reason: resultText, time: new Date().toLocaleString() });
                    db.ref('orders').push({ user: userName, item: resultText, status: '대기', time: new Date().toLocaleString() });
                }
            }, 100);
        }

        function addScore(name, p, e, reason) {
            db.ref('users/'+name).once('value', sn => {
                const u = sn.val(); if(!u) return;
                let nE=(u.exp||0)+e, nL=(u.lv||1), nP=(u.points||0)+p;
                let leveledUp = false; while(nE >= 100){ nL++; nE -= 100; leveledUp = true; }
                db.ref('users/'+name).update({exp:nE, lv:nL, points:nP}).then(() => {
                    db.ref('pointLogs').push({name, amount:p, reason, time: new Date().toLocaleString()});
                    if (leveledUp) { if (name === myName) triggerLevelUpRoulette(name, nL); else alert(name + " 레벨업!"); }
                });
            });
        }

        // [핵심수정] 등교 시간 칼차단
        async function submitCheckIn() {
            const pw = document.getElementById('checkin-pass').value;
            const now = new Date(); const dateStr = now.toISOString().split('T')[0];
            const curT = now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');
            const snap = await db.ref('checkinLogs').orderByChild('date').equalTo(dateStr).once('value');
            let already = false; snap.forEach(c => { if(c.val().name === myName) already = true; });
            if(already) return alert("이미 등교했습니다!");

            db.ref('settings').once('value', sSnap => {
                const s = sSnap.val(); if(pw !== s.password) return alert("암호 오류!");
                if(curT > s.closeTime) return alert(`등교 시간이 마감되었습니다! (마감: ${s.closeTime})`);
                let res = "정상 등교", penalty = 0;
                if(curT > s.lateTime) {
                    const [lh, lm] = s.lateTime.split(':').map(Number);
                    const diff = (now.getHours()*60+now.getMinutes())-(lh*60+lm);
                    penalty = -diff; res = `지각(${diff}분)`;
                }
                updatePoint(myName, penalty, res);
                db.ref('checkinLogs').push({ name: myName, result: res, time: now.toLocaleTimeString('ko-KR'), date: dateStr });
                rIdx = 0; if(routineItems.length > 0) openPopup("✨ 성공", `[루틴]\n1단계: ${routineItems[0]}`, true); else openPopup("🎊 완료", "등교 완료!");
                document.getElementById('checkin-pass').value = "";
            });
        }

        function renderHistory() {
            let html = ""; [...allLogs].reverse().forEach(l => {
                if (isAdmin || l.name === myName) {
                    const color = l.amount > 0 ? "var(--green)" : (l.amount < 0 ? "var(--red)" : "#888");
                    html += `<div class="list-item" style="border-left:10px solid ${color}"><span><strong>${l.name}</strong></span><strong style="color:${color}">${l.amount>0?'+':''}${l.amount}P</strong><br><small>${l.reason} (${l.time})</small></div>`;
                }
            });
            document.getElementById('point-history-list').innerHTML = html || "기록 없음";
        }

        function openUserHistory(userName) {
            const userLogs = allLogs.filter(l => l.name === userName).reverse();
            let html = `<div style="text-align:left;">`;
            userLogs.forEach(l => {
                const color = l.amount > 0 ? "var(--green)" : (l.amount < 0 ? "var(--red)" : "#888");
                html += `<div class="list-item" style="border-left:10px solid ${color};"><div><strong>${l.reason}</strong><br><small>${l.time}</small></div><strong style="color:${color}">${l.amount>0?'+':''}${l.amount}P</strong></div>`;
            });
            html += `</div>`; openPopup(`${userName} 용사 연대기`, html);
        }

        function updatePoint(n, a, r) { db.ref('users/'+n).once('value', sn => { if(sn.val()) db.ref('users/'+n).update({points: (sn.val().points||0)+a}); db.ref('pointLogs').push({name:n, amount:a, reason:r, time:new Date().toLocaleString()}); }); }
        function requestUseCoupon(key, itemName) { if(confirm(`${itemName} 사용요청?`)) db.ref('orders/'+key).update({status:'사용요청', useTime:new Date().toLocaleString()}); }
        function approveOrder(id) { if(confirm("승인하시겠습니까?")) db.ref('orders/'+id).update({status:'완료'}); }
        function addItem() { const cat = document.getElementById('item-cat-in').value, n = document.getElementById('item-name-in').value, p = parseInt(document.getElementById('item-price-in').value); if(n && p) { db.ref('shop').push({cat, name:n, price:p}); document.getElementById('item-name-in').value=''; document.getElementById('item-price-in').value=''; }}
        function addGuide() { const t = document.getElementById('guide-title').value, p = parseInt(document.getElementById('guide-p').value)||0, e = parseInt(document.getElementById('guide-e').value)||0; if(t) { db.ref('pointGuide').push({title:t, p, e}); document.getElementById('guide-title').value=''; }}
        function saveSettings() { db.ref('settings').update({password: document.getElementById('conf-pass').value, lateTime: document.getElementById('conf-late').value, closeTime: document.getElementById('conf-close').value, routineText: document.getElementById('conf-routine').value}).then(()=>alert("저장됨!")); }
        function saveGifts() { db.ref('settings').update({giftList: document.getElementById('conf-gifts').value.split('\n')}).then(()=>alert("보상 저장됨!")); }
        function openPopup(title, contentHtml, isR = false) { document.getElementById('pop-title').innerHTML = title; document.getElementById('pop-content').innerHTML = contentHtml; document.getElementById('common-overlay').style.display = 'flex'; window.routineActive = isR; }
        function closePopup() { if(window.routineActive) { rIdx++; if(rIdx < routineItems.length) document.getElementById('pop-content').innerText = `다음: ${routineItems[rIdx]}`; else document.getElementById('common-overlay').style.display = 'none'; } else { document.getElementById('common-overlay').style.display = 'none'; } }
        function openPointBulkPopup() {
            let html = `<input type="text" id="pop-bulk-reason" placeholder="사유"><div style="margin-top:15px;">`;
            currentUsers.forEach(u => { if(u.name !== "총사령관") html += `<div class="list-item"><span>${u.no}. ${u.name}</span><div>P <input type="number" class="pop-bulk-p pop-score-input" data-name="${u.name}"> E <input type="number" class="pop-bulk-e pop-score-input" data-name="${u.name}"></div></div>`; });
            html += `</div>`; document.getElementById('point-pop-body').innerHTML = html;
            document.getElementById('point-apply-btn').onclick = () => { const r = document.getElementById('pop-bulk-reason').value; if(!r) return alert("사유!"); document.querySelectorAll('.pop-bulk-p').forEach((pI, i) => { const p=parseInt(pI.value)||0, e=parseInt(document.querySelectorAll('.pop-bulk-e')[i].value)||0; if(p||e) addScore(pI.dataset.name, p, e, r); }); closePointPopup(); };
            document.getElementById('point-popup').style.display = 'flex';
        }
        function openScorePopup() {
            let html = `<div>`; currentUsers.forEach(u => { if(u.name !== "총사령관") html += `<div class="list-item"><span>${u.no}. ${u.name}</span><div>P <input type="number" class="pop-one-p pop-score-input"> E <input type="number" class="pop-one-e pop-score-input"><button onclick="applyOneS('${u.name}', ${currentUsers.indexOf(u)})" style="width:auto; border-radius:10px; border:none; background:var(--primary); color:white; padding:10px;">OK</button></div></div>`; });
            html += `</div>`; document.getElementById('point-pop-body').innerHTML = html;
            document.getElementById('point-apply-btn').style.display = 'none'; document.getElementById('point-popup').style.display = 'flex';
        }
        function applyOneS(n, idx) { const p = parseInt(document.querySelectorAll('.pop-one-p')[idx].value) || 0; const e = parseInt(document.querySelectorAll('.pop-one-e')[idx].value) || 0; addScore(n, p, e, "개별 지급"); alert(n + " 지급 완료!"); }
        function closePointPopup() { document.getElementById('point-popup').style.display = 'none'; document.getElementById('point-apply-btn').style.display = 'block'; }
        function bulkReg() { const txt = document.getElementById('bulk-in').value; if(!txt) return; txt.split('\n').forEach(l => { const [n, e] = l.split(',').map(s=>s.trim()); if(n&&e) { db.ref('userEmails/'+e.replace(/\./g,',')).set(n); db.ref('users/'+n).update({name:n, email:e, points:0, exp:0, lv:1, no:""}); } }); alert("주입 완료!"); }
    </script>
</body>
</html>
