<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-6 용사 본부</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --gold: #f1c40f; --green: #2ecc71; --red: #ff4757; --bg: #ecf0f1; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 60px; font-size: 1.4rem; }
        input, button, textarea, select { width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; border: 2px solid #ccc; box-sizing: border-box; font-size: 1.4rem; }
        #loading-screen { display: flex; justify-content: center; align-items: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); color: white; z-index: 3000; font-size: 1.8rem; }
        #login-screen { display: none; justify-content: center; align-items: center; min-height: 100vh; background: var(--dark); padding: 20px; }
        .login-box { background: white; padding: 50px 40px; border-radius: 30px; text-align: center; width: 100%; max-width: 450px; }
        #main-app { display: none; }
        .tab-menu { display: flex; background: var(--dark); position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .tab-menu button { flex: 1; min-width: 95px; padding: 20px 10px; border: none; background: none; color: #95a5a6; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .tab-menu button.active { color: white; border-bottom: 5px solid var(--gold); }
        .tab-content { display: none; padding: 20px; max-width: 1200px; margin: auto; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 20px; margin-top: 20px; }
        .hero-card { background: white; border-radius: 20px; padding: 25px 15px; text-align: center; box-shadow: 0 6px 15px rgba(0,0,0,0.1); border: 3px solid transparent; cursor: pointer; }
        .hero-card.me { border-color: var(--gold); background: #fffdf2; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .popup-box { background: white; padding: 20px; border-radius: 25px; width: 95%; max-width: 700px; display: flex; flex-direction: column; max-height: 95vh; overflow-y: auto; }
        .floating-btn { position: fixed; bottom: 25px; width: 85px; height: 85px; border-radius: 45px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 999; font-size: 2.2rem; display: none; align-items: center; justify-content: center; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="loading-screen">🏰 용사 본부 접속 중...</div>

    <div id="common-overlay" class="overlay"><div class="popup-box"><h2 id="pop-title" style="margin:0; text-align:center;"></h2><div id="pop-content"></div><button onclick="closePopup()" style="background:var(--green); color:white; margin-top:15px;">닫기</button></div></div>
    
    <div id="reason-popup" class="overlay">
        <div class="popup-box" style="max-width:420px; border: 4px solid var(--primary);">
            <h3 id="reason-name" style="text-align:center;"></h3>
            <label>구분</label><select id="sel-type"><option value="결석">결석</option><option value="조퇴">조퇴</option><option value="지각">지각</option></select>
            <label>종류</label><select id="sel-sub"><option value="질병">질병</option><option value="출석인정">출석인정</option><option value="미인정">미인정</option></select>
            <input type="text" id="sel-note" placeholder="메모(복통 등)">
            <div style="display:flex; gap:10px;"><button onclick="saveReasonClick()" style="background:var(--primary); color:white;">저장</button><button onclick="closeReasonPopup()">취소</button></div>
            <button onclick="deleteReasonClick()" style="background:var(--red); color:white; margin-top:10px;">기록 삭제</button>
        </div>
    </div>

    <div id="login-screen"><div class="login-box"><h1>🏰 6-6 본부</h1><button onclick="handleLogin()" style="background:#4285F4; color:white; border:none; border-radius:15px; padding:20px;">Google 로그인</button></div></div>

    <div id="main-app">
        <nav class="tab-menu">
            <button id="btn-main" onclick="showTab('main')">🤺 용사들</button>
            <button id="btn-shop" onclick="showTab('shop')">🛍️ 상점</button>
            <button id="btn-logs" style="display:none;" onclick="showTab('logs')">📅 등교(책상)</button>
            <button id="btn-admin" style="display:none;" onclick="showTab('admin')">🛡️ 설정</button>
        </nav>

        <section id="tab-main" class="tab-content active"><div id="hero-grid" class="hero-grid"></div></section>
        
        <section id="tab-logs" class="tab-content">
            <div class="card">
                <div style="display:flex; gap:10px; margin-bottom:20px; justify-content:center;">
                    <input type="date" id="checkin-date-filter" onchange="renderCheckinBoard()" style="width:auto;">
                    <button onclick="toggleStats()" style="background:#e67e22; color:white; width:auto;">📊 통계</button>
                </div>
                <div id="stats-area" style="display:none; border:2px solid #e67e22; padding:15px; border-radius:15px; margin-bottom:20px;">
                    <div id="attendance-stats-content"></div>
                </div>
                <div id="desk-layout" style="display:grid; gap:12px; background:#dfe6e9; padding:20px; border-radius:20px;"></div>
            </div>
        </section>

        <section id="tab-admin" class="tab-content">
            <div class="card" style="border:3px solid var(--primary);">
                <h3>🪑 책상 배치</h3>
                가로: <input type="number" id="conf-cols" value="6" style="width:80px;">
                순서: <textarea id="conf-desks" rows="3" placeholder="선범,영민,비움..."></textarea>
                <button onclick="saveDeskSettings()" style="background:var(--primary); color:white;">저장</button>
            </div>
            <div class="card">
                <h3>⚙️ 시스템</h3>
                암호:<input type="text" id="conf-pass"> 지각시간:<input type="time" id="conf-late">
                <button onclick="saveSettings()">저장</button>
            </div>
        </section>
    </div>

   <script>
    // [설정] 파이어베이스 및 기본 변수 (기존 설정 유지)
    const firebaseConfig = { apiKey: "AIzaSyDWdWrw8LJ6tSiyF1X5tENJEvBfY-DzSw0", authDomain: "cs6-6class.firebaseapp.com", databaseURL: "https://cs6-6class-default-rtdb.firebaseio.com/", projectId: "cs6-6class", storageBucket: "cs6-6class.firebasestorage.app", messagingSenderId: "644235499537", appId: "1:644235499537:web:2ede2611f4ec6a3e8179b0" };
    const adminEmail = "ksosuny@cberi.go.kr"; 
    const githubImg = "https://github.com/sun-ny14/cs6-6/blob/main/%EC%9C%A1%EC%9C%A1%EC%9D%B4.jpg?raw=true";
    const animals = ["귀여운", "신사", "사랑스러운", "패셔니스타", "밥먹는", "날쌘돌이", "즐거운", "행복한", "정의로운", "천사", "닌자", "왕자", "공주", "근육맨", "마법사", "용사", "공부하는", "춤추는", "노래하는", "무지개"];

    firebase.initializeApp(firebaseConfig); 
    const db = firebase.database(); 
    const auth = firebase.auth(); 
    const provider = new firebase.auth.GoogleAuthProvider();

    let myName = "", isAdmin = false, isHelper = false, currentUsers = [], routineItems = [], giftList = [], rIdx = 0, selectedTarget = { name: '', date: '' };
    let currentTab = sessionStorage.getItem('activeTab') || 'main';

    function getTodayKST() { const now = new Date(); return new Date(now.getTime() + (9 * 60 * 60 * 1000)).toISOString().split('T')[0]; }

    // [V7 핵심] 아바타 정밀 좌표 계산 함수
    function getAvatar(lv, ani) {
        const name = ani || animals[Math.min(lv - 1, 19)];
        const index = animals.indexOf(name);
        const col = index % 5;
        const row = Math.floor(index / 5);
        const posX = col * 25; 
        const posY = [0, 33.3, 66.6, 100][row]; 

        return `
        <div style="width: 85px; height: 85px; overflow: hidden; border: 2px solid #eee; border-radius: 20px; background: white; margin: 0 auto; position: relative;">
            <div style="width: 100%; height: 100%; background-image: url('${githubImg}'); background-size: 505% 405%; background-position: ${posX}% ${posY}%; background-repeat: no-repeat; image-rendering: pixelated; transform: scale(1.4); transform-origin: center;"></div>
        </div>`;
    }

    // [V7 핵심] 아바타 전직 및 레벨 해금 로직
    function openAvatarPicker() {
        db.ref('users/' + myName).once('value', snap => {
            const lv = snap.val().lv || 1;
            const availableCount = Math.min(lv, 20);
            let h = `<div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; padding:10px;">`;
            animals.forEach((ani, i) => {
                if(i < availableCount) {
                    h += `<div onclick="selectAnimal('${ani}')" style="cursor:pointer; text-align:center; border:2px solid var(--gold); border-radius:15px; padding:10px; background:#fffdf2;">
                            ${getAvatar(i + 1, ani)}<div style="font-size:0.8rem; font-weight:bold; margin-top:8px;">${ani}</div></div>`;
                } else {
                    h += `<div style="text-align:center; border:1px solid #eee; border-radius:15px; padding:10px; background:#f5f5f5; opacity: 0.5;">
                            <div style="width: 85px; height: 85px; display:flex; align-items:center; justify-content:center; margin: 0 auto; font-size:1.8rem; background:#ddd; border-radius:15px;">🔒</div><div style="font-size:0.7rem; color:#888; margin-top:8px;">LV.${i+1}</div></div>`;
                }
            });
            openPopup("🎭 육육이 전직 본부", h + `</div>`);
        });
    }
    function selectAnimal(ani) { if(confirm(`${ani}(으)로 변신하시겠습니까?`)) { db.ref('users/' + myName).update({ selectedAnimal: ani }).then(() => { alert("변신 완료! ✨"); location.reload(); }); } }

    // [신규 통합] 책상 배치 렌더링 (지각 쨍한 빨강 + 왼쪽 정렬)
    function renderCheckinBoard() {
        const deskEl = document.getElementById('desk-layout');
        if(!deskEl) return;
        const targetDate = document.getElementById('checkin-date-filter').value || getTodayKST();
        
        db.ref('settings').once('value', sSnap => {
            const s = sSnap.val() || {};
            const cols = s.deskCols || 6;
            const order = s.deskOrder ? s.deskOrder.split(',').map(n => n.trim()) : [];
            deskEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

            db.ref('checkinLogs').once('value', lSnap => {
                const logs = {};
                lSnap.forEach(c => { if(c.val().date === targetDate) logs[c.val().name] = c.val(); });

                let html = "";
                order.forEach(name => {
                    if(!name || name === "비움") {
                        html += `<div style="height:90px; background:rgba(0,0,0,0.05); border-radius:15px; border:1px dashed #ccc;"></div>`;
                        return;
                    }
                    const user = currentUsers.find(u => u.name === name);
                    const log = logs[name];
                    
                    let bgColor = "#fff", textColor = "#333", status = "미출석";

                    if(log) {
                        if(log.result.includes('정상')) { bgColor = "#2ecc71"; textColor="#fff"; status="정상등교"; }
                        else if(log.result.includes('지각')) { bgColor = "#ff4757"; textColor="#fff"; status="지각!"; }
                        else { bgColor = "#747d8c"; textColor="#fff"; status=log.result.replace('제외(','').replace(')',''); }
                    } else if(user?.fixedExclude) {
                        bgColor = "#57606f"; textColor="#fff"; status="고정:"+user.fixedExclude;
                    } else {
                        bgColor = "#ffa502"; textColor="#fff"; status="미출석";
                    }

                    html += `
                        <div onclick="openReasonPopup('${name}', '${targetDate}')" style="background:${bgColor}; color:${textColor}; padding:12px; border-radius:15px; height:90px; display:flex; flex-direction:column; justify-content:center; align-items:flex-start; cursor:pointer; box-shadow:0 5px 0 rgba(0,0,0,0.1);">
                            <div style="font-weight:900; font-size:1.3rem;">${name}</div>
                            <div style="margin-top:5px; font-weight:bold; font-size:0.85rem;">${status}</div>
                        </div>`;
                });
                deskEl.innerHTML = html;
            });
        });
    }

    // [신규 통합] 사유 등록 및 삭제 함수
    function openReasonPopup(name, date) { if(!isAdmin) return; selectedTarget = { name, date }; document.getElementById('reason-name').innerText = `[${name}] 사유 등록`; document.getElementById('reason-popup').style.display = 'flex'; }
    function closeReasonPopup() { document.getElementById('reason-popup').style.display = 'none'; }
    function saveReasonClick() {
        const type = document.getElementById('sel-type').value, sub = document.getElementById('sel-sub').value, note = document.getElementById('sel-note').value;
        db.ref('checkinLogs').push({ name: selectedTarget.name, date: selectedTarget.date, time: "--:--", result: `제외(${type}-${sub}${note ? ':'+note : ''})` }).then(() => { closeReasonPopup(); renderCheckinBoard(); });
    }
    function deleteReasonClick() {
        if(confirm("기록을 삭제할까요?")) {
            db.ref('checkinLogs').once('value', snap => {
                snap.forEach(c => { if(c.val().name === selectedTarget.name && c.val().date === selectedTarget.date) db.ref('checkinLogs/'+c.key).remove(); });
                closeReasonPopup(); renderCheckinBoard();
            });
        }
    }

    // [V7 핵심] 포인트 지급 및 레벨업 룰렛 로직
    function addScore(n, p, e, r) {
        db.ref('users/'+n).once('value', sn => {
            const u=sn.val(); if(!u) return;
            let nP=(u.points||0)+p, nE=(u.exp||0)+e, nL=(u.lv||1), up=false;
            while(nE>=100){ nL++; nE-=100; up=true; }
            db.ref('users/'+n).update({points:nP, exp:nE, lv:nL}).then(()=>{
                db.ref('pointLogs').push({name:n, amount:p, reason:r, time:new Date().toLocaleString(), date:getTodayKST()});
                if(up && n===myName) alert("축하합니다! 레벨업! ✨");
            });
        });
    }

    // [기본 함수] 로그인, 탭이동, 설정저장 등
    auth.onAuthStateChanged(user => {
        if (user) {
            isAdmin = (user.email === adminEmail);
            db.ref('userEmails/' + user.email.replace(/\./g, ',')).once('value', snap => {
                if (snap.exists() || isAdmin) {
                    myName = snap.val() || "총사령관";
                    forceScreenDisplay('app');
                    if (isAdmin) { ['btn-logs','btn-admin','floating-point-btn'].forEach(id => {const el=document.getElementById(id); if(el) el.style.display='block';}); }
                    db.ref('users').on('value', uSnap => {
                        let us = []; uSnap.forEach(c => { let v=c.val(); v.name=c.key; us.push(v); });
                        currentUsers = us; renderCheckinBoard();
                        let h = ""; us.forEach(u => { if(u.name==="총사령관") return; 
                            h += `<div class="hero-card ${u.name===myName?'me':''}" onclick="${u.name===myName?'openAvatarPicker()':''}">
                                    ${getAvatar(u.lv||1, u.selectedAnimal)}<br><b>LV.${u.lv||1} ${u.name}</b><br><span>${u.points||0}P</span></div>`;
                        });
                        document.getElementById('hero-grid').innerHTML = h;
                    });
                }
            });
        } else { forceScreenDisplay('login'); }
    });

    function showTab(t) { 
        document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
        if(t==='logs') renderCheckinBoard();
    }
    function openPopup(t,h) { document.getElementById('pop-title').innerText=t; document.getElementById('pop-content').innerHTML=h; document.getElementById('common-overlay').style.display='flex'; }
    function closePopup() { document.getElementById('common-overlay').style.display='none'; }
    function saveSettings() { db.ref('settings').update({password:document.getElementById('conf-pass').value, lateTime:document.getElementById('conf-late').value}).then(()=>alert("저장됨")); }
</script>
</body>
</html>
