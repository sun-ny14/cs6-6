<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-6 용사 본부</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --purple: #9b59b6; --bg: #ecf0f1; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 50px; }
        #login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--dark); padding: 20px; box-sizing: border-box; }
        .login-box { background: white; padding: 40px 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 350px; }
        #main-app { display: none; }
        .tab-menu { display: flex; background: var(--dark); position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .tab-menu button { flex: 1; min-width: 70px; padding: 15px 5px; border: none; background: none; color: #95a5a6; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .tab-menu button.active { color: white; border-bottom: 4px solid var(--gold); }
        .tab-content { display: none; padding: 15px; max-width: 1000px; margin: auto; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 15px; }
        .hero-card { background: white; border-radius: 12px; padding: 15px 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 2px solid transparent; position: relative; }
        .hero-card.me { border-color: var(--gold); background: #fffdf2; transform: scale(1.02); }
        .card-no { position: absolute; top: 5px; left: 8px; font-size: 0.7rem; color: #999; font-weight: bold; }
        .card-avatar { font-size: 3rem; margin-bottom: 8px; display: block; }
        .card-lv { font-size: 0.75rem; background: var(--dark); color: white; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input, button, textarea, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; gap: 8px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .popup-box { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .pixel-avatar { width: 48px; height: 48px; background-image: url('avatars.png'); background-repeat: no-repeat; background-size: 288px 48px; display: inline-block; image-rendering: pixelated; vertical-align: middle; }
        .avatar-lv1 { background-position: 0px 0px; }
        .avatar-lv5 { background-position: -48px 0px; }
        .avatar-lv10 { background-position: -96px 0px; }
        .avatar-lv15 { background-position: -144px 0px; }
        .avatar-lv20 { background-position: -192px 0px; }
        .avatar-lv30 { background-position: -240px 0px; }
        .cat-title { margin-top: 15px; margin-bottom: 5px; padding: 5px 10px; background: var(--dark); color: white; border-radius: 6px; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="common-overlay" class="overlay">
        <div class="popup-box">
            <h2 id="pop-title">알림</h2>
            <div id="pop-content" style="margin-bottom: 20px; white-space: pre-wrap; font-size: 1.1rem;">내용</div>
            <button onclick="closePopup()" style="background:var(--green); font-size: 1.1rem; padding: 12px;">확인</button>
        </div>
    </div>

    <div id="login-screen">
        <div class="login-box">
            <h1>🏰<br>6-6 용사 본부</h1>
            <p style="color:#666; margin-bottom:20px;">6-6용사여, 구글 아이디로 로그인하라!</p>
            <button onclick="handleLogin()" style="background:#4285F4;">Google 로그인</button>
        </div>
    </div>

    <div id="main-app">
        <nav class="tab-menu">
            <button id="btn-main" class="active" onclick="showTab('main')">🤺 용사들</button>
            <button id="btn-shop" onclick="showTab('shop')">🛍️ 상점</button>
            <button id="btn-checkin" onclick="showTab('checkin')">⚔️ 등교</button>
            <button id="btn-points" onclick="showTab('points')">💰 포인트</button>
            <button id="btn-admin" onclick="showTab('admin')" style="display:none;">🛡️ 관리</button>
        </nav>
        
        <section id="tab-main" class="tab-content active"><div id="hero-grid" class="hero-grid"></div></section>
        
        <section id="tab-shop" class="tab-content">
            <div id="admin-shop-mgr" class="card" style="display:none; border:2px solid var(--purple);">
                <h3>📦 물품 등록 (관리자)</h3>
                <select id="item-cat-in">
                    <option value="🎫 쿠폰">🎫 쿠폰</option>
                    <option value="🍕 먹거리">🍕 먹거리</option>
                    <option value="🎲 뽑기">🎲 뽑기</option>
                    <option value="✨ 기타">✨ 기타</option>
                </select>
                <input type="text" id="item-name-in" placeholder="상품명">
                <input type="number" id="item-price-in" placeholder="가격 (P)">
                <button onclick="addItem()" style="background:var(--purple);">진열하기</button>
            </div>
            <div class="card"><h2>🛍️ 용사 보급소</h2><div id="shop-list"></div></div>
            <div id="admin-order-mgr" class="card" style="display:none; border:2px solid var(--red);"><h3>📜 요청 목록</h3><div id="order-list"></div></div>
        </section>

        <section id="tab-checkin" class="tab-content">
            <div class="card">
                <h2>⚔️ 등교 확인</h2>
                <div id="checkin-guide" style="margin-bottom:10px; font-weight:bold;"></div>
                <input type="text" id="checkin-pass" placeholder="오늘의 암호">
                <button onclick="submitCheckIn()" style="padding:15px; font-size:1.1rem;">본부 소환!</button>
            </div>
        </section>

        <section id="tab-points" class="tab-content">
            <div id="admin-mass-card" class="card" style="display:none; border:2px solid var(--primary);">
                <h3>⚖️ 점수 및 경험치 부여 (관리자)</h3>
                <div id="mass-score-board"></div>
                <button onclick="applyMassScores()">일괄 반영</button>
            </div>
            <div id="admin-point-mgr" class="card" style="display:none; border:2px solid var(--gold);">
                <h3>⚖️ 포인트 전령 (관리자)</h3>
                <input type="text" id="point-reason-bulk" placeholder="지급 사유 (예: 발표왕, 청소)">
                <div id="point-bulk-list" style="max-height: 300px; overflow-y: auto; margin: 10px 0; border: 1px solid #eee;"></div>
                <button onclick="applyPointsBulk()" style="background:var(--gold); color:var(--dark);">⚡ 선택 항목 일괄 적용</button>
            </div>
            <div class="card"><h3>📜 포인트 연대기</h3><div id="point-history-list" style="font-size: 0.9rem; max-height: 400px; overflow-y: auto;"></div></div>
        </section>

        <section id="tab-admin" class="tab-content">
            <div class="card"><h3>👥 명단 관리 (번호 & 이름 수정)</h3><div id="student-admin-list"></div></div>
            <div class="card"><h3>⚙️ 시스템 설정</h3>암호:<input type="text" id="conf-pass"> 지각:<input type="time" id="conf-late"> 마감:<input type="time" id="conf-close"> 루틴:<textarea id="conf-routine"></textarea><button onclick="saveSettings()">저장</button></div>
            <div class="card"><h3>🎁 레벨업 보상 목록</h3><textarea id="conf-gifts"></textarea><button onclick="saveGifts()">선물 저장</button></div>
            <div class="card"><h3>🆕 학생 일괄 등록</h3><textarea id="bulk-in" placeholder="이름,이메일"></textarea><button onclick="bulkReg()">주입</button></div>
        </section>
    </div>

    <script>
        // 선생님의 기존 Firebase 설정 (그대로 유지)
        const firebaseConfig = {
            apiKey: "AIzaSyDWdWrw8LJ6tSiyF1X5tENJEvBfY-DzSw0",
            authDomain: "cs6-6class.firebaseapp.com",
            databaseURL: "https://cs6-6class-default-rtdb.firebaseio.com/", 
            projectId: "cs6-6class",
            storageBucket: "cs6-6class.firebasestorage.app",
            messagingSenderId: "644235499537",
            appId: "1:644235499537:web:2ede2611f4ec6a3e8179b0"
        };
        const adminEmail = "ksosuny@cberi.go.kr";
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        let myName = "", isAdmin = false, routineItems = [], giftList = [], rIdx = 0;

        function getAvatar(lv) {
            let lvClass = "avatar-lv1";
            if(lv >= 30) lvClass = "avatar-lv30";
            else if(lv >= 20) lvClass = "avatar-lv20";
            else if(lv >= 15) lvClass = "avatar-lv15";
            else if(lv >= 10) lvClass = "avatar-lv10";
            else if(lv >= 5) lvClass = "avatar-lv5";
            return `<div class="pixel-avatar ${lvClass}"></div>`;
        }

        // 로그인 상태 감지 (기존 로직 복구)
        auth.onAuthStateChanged((user) => {
            if (user) {
                isAdmin = (user.email.toLowerCase() === adminEmail.toLowerCase());
                const eKey = user.email.replace(/\./g, ',');
                db.ref('userEmails/' + eKey).once('value', (snap) => {
                    if (snap.exists() || isAdmin) {
                        myName = snap.val() || "총사령관";
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('main-app').style.display = 'block';
                        startApp();
                    } else {
                        alert("미등록 계정: " + user.email);
                        auth.signOut();
                    }
                });
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            }
        });

        // 로그인 팝업 호출 (기존 로직 복구)
        function handleLogin() { 
            auth.signInWithPopup(provider).catch(err => {
                console.error(err);
                alert("로그인 오류: " + err.message);
            }); 
        }

        function startApp() {
            if (isAdmin) {
                ['btn-admin', 'admin-shop-mgr', 'admin-order-mgr', 'admin-point-mgr', 'admin-mass-card'].forEach(id => {
                    const el = document.getElementById(id); if(el) el.style.display = 'block';
                });
            }

            db.ref('settings').on('value', snap => {
                const s = snap.val() || {};
                document.getElementById('conf-pass').value = s.password || "";
                document.getElementById('conf-late').value = s.lateTime || "08:40";
                document.getElementById('conf-close').value = s.closeTime || "09:00";
                document.getElementById('conf-routine').value = s.routineText || "";
                document.getElementById('conf-gifts').value = (s.giftList || []).join('\n');
                giftList = s.giftList || [];
                routineItems = (s.routineText || "").split('\n').filter(t => t.trim() !== "");
                document.getElementById('checkin-guide').innerText = `✅ 정상: ~${s.lateTime} | ⚠️ 지각: ~${s.closeTime}`;
            });

            db.ref('users').on('value', snap => {
                let users = [];
                snap.forEach(c => { users.push(c.val()); });
                users.sort((a, b) => (parseInt(a.no) || 999) - (parseInt(b.no) || 999));

                let gH = "", mH = "", aH = "", pBulkH = "";
                users.forEach(u => {
                    gH += `<div class="hero-card ${u.name===myName?'me':''}">
                        <span class="card-no">${u.no || ''}</span><span class="card-lv">LV.${u.lv}</span>
                        <span class="card-avatar">${getAvatar(u.lv)}</span><div class="card-name">${u.name}</div>
                        <div class="card-pt">${u.points || 0} P</div>
                    </div>`;
                    mH += `<div class="list-item"><span>${u.no||'?'}. ${u.name}</span><div style="display:flex; gap:5px;">Exp<input type="number" class="m-exp" data-name="${u.name}" style="width:40px;"> P<input type="number" class="m-pts" style="width:40px;"></div></div>`;
                    aH += `<div class="list-item"><span>${u.no||'?'}. <strong>${u.name}</strong></span><button onclick="renameHero('${u.name}', '${u.email}', '${u.no}')" style="width:auto;">수정</button></div>`;
                    pBulkH += `<div class="list-item"><span>${u.no||'?'}. ${u.name}</span><input type="number" class="bulk-p-input" data-name="${u.name}" style="width:60px;"></div>`;
                });
                document.getElementById('hero-grid').innerHTML = gH;
                document.getElementById('mass-score-board').innerHTML = mH;
                document.getElementById('student-admin-list').innerHTML = aH;
                document.getElementById('point-bulk-list').innerHTML = pBulkH;
            });

            db.ref('shop').on('value', snap => {
                let sH = ""; let currentCat = "";
                snap.forEach(c => {
                    const i = c.val();
                    if (i.category !== currentCat) {
                        currentCat = i.category || "✨ 기타";
                        sH += `<div class="cat-title">${currentCat}</div>`;
                    }
                    sH += `<div class="list-item"><span>${i.name} (<strong>${i.price}P</strong>)</span><div style="display:flex; gap:5px;"><button onclick="buyItem('${c.key}', '${i.name}', ${i.price})" style="width:auto;">구매</button>${isAdmin ? `<button onclick="db.ref('shop/${c.key}').remove()" style="background:red; width:auto;">삭제</button>` : ''}</div></div>`;
                });
                document.getElementById('shop-list').innerHTML = sH || "물건이 없습니다.";
            });

            if (isAdmin) {
                db.ref('orders').on('value', snap => {
                    let oH = ""; snap.forEach(c => { const o = c.val(); if(o.status === '대기') { oH += `<div class="list-item" style="background:#fff4f4;"><span>[${o.user}] ${o.item}</span><button onclick="approveOrder('${c.key}')" style="background:var(--green); width:auto;">지급완료</button></div>`; } });
                    document.getElementById('order-list').innerHTML = oH || "요청 없음";
                });
            }
        }

        function updatePoint(targetName, amount, reason) {
            const timestamp = new Date().toLocaleString();
            db.ref('pointLogs').push({ name: targetName, amount: amount, reason: reason, time: timestamp });
            db.ref('users/' + targetName).once('value', snap => {
                const u = snap.val();
                if (u) db.ref('users/' + targetName).update({ points: (u.points || 0) + amount });
            });
        }

        // 지각 분 단위 차감 적용된 등교 로직
        function submitCheckIn() {
            const pw = document.getElementById('checkin-pass').value;
            db.ref('settings').once('value', snap => {
                const s = snap.val(); if(pw !== s.password) return alert("암호 오류!");
                const now = new Date(); const curT = now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');
                if(curT > s.closeTime) return openPopup("🚫 실패", "마감 시간 경과!");
                
                let msg = "✨ 정상 등교 완료!", penalty = 0, reason = "정상 등교 성공";
                if(curT > s.lateTime) { 
                    const [lateH, lateM] = s.lateTime.split(':').map(Number);
                    const nowH = now.getHours(); const nowM = now.getMinutes();
                    const diffMin = (nowH * 60 + nowM) - (lateH * 60 + lateM);
                    penalty = -diffMin; 
                    msg = `⚠️ 지각 확정! (${curT})\n기준보다 ${diffMin}분 늦어 벌금 ${penalty}P 부과!`; 
                    reason = `지각 등교 (${diffMin}분 지각)`; 
                }
                
                updatePoint(myName, penalty, reason);
                rIdx = 0; if(routineItems.length > 0) openPopup(msg, `[아침 루틴]\n1단계: ${routineItems[0]}`, true); else openPopup("🎊 완료", msg);
                document.getElementById('checkin-pass').value = "";
            });
        }

        function applyMassScores() {
            const expInputs = document.querySelectorAll('.m-exp');
            const ptInputs = document.querySelectorAll('.m-pts');
            expInputs.forEach((e, i) => {
                const n = e.dataset.name, ae = parseInt(e.value)||0, ap = parseInt(ptInputs[i].value)||0;
                if(ae || ap) {
                    db.ref('users/'+n).once('value', sn => {
                        const u = sn.val(); 
                        let nE = (u.exp||0)+ae, nL = (u.lv||1), nP = (u.points||0)+ap, levelUps = 0;
                        while(nE >= 100) { nL++; nE -= 100; levelUps++; }
                        db.ref('users/'+n).update({exp:nE, lv:nL, points:nP});
                        if(ap !== 0) updatePoint(n, ap, "관리자 개별 지급/차감");
                    });
                }
                e.value = ""; ptInputs[i].value = "";
            });
            alert("반영 완료!");
        }

        function applyPointsBulk() {
            const reason = document.getElementById('point-reason-bulk').value;
            if(!reason) return alert("지급 사유를 입력해주세요!");
            const inputs = document.querySelectorAll('.bulk-p-input');
            inputs.forEach(input => {
                const val = parseInt(input.value);
                if(val && val !== 0) { updatePoint(input.dataset.name, val, reason); input.value = ""; }
            });
            document.getElementById('point-reason-bulk').value = "";
            alert("일괄 지급 완료!");
        }

        db.ref('pointLogs').orderByChild('time').limitToLast(50).on('value', snap => {
            let html = ""; let logs = []; snap.forEach(c => { logs.push(c.val()); });
            logs.reverse().forEach(log => {
                if (isAdmin || log.name === myName) {
                    const color = log.amount > 0 ? "var(--green)" : (log.amount < 0 ? "var(--red)" : "#888");
                    html += `<div class="list-item" style="border-left: 5px solid ${color}; margin-bottom: 5px; padding-left:10px;">
                        <div style="flex:1;"><strong>${log.name}</strong> <span style="color:${color}; font-weight:bold;">${log.amount>0?'+':''}${log.amount}P</span><br>
                        <small style="color:#888;">${log.reason}</small></div>
                        <div style="font-size:0.7rem; color:#bbb; min-width:65px; text-align:right;">${log.time.split(' ').slice(1,4).join(' ')}</div></div>`;
                }
            });
            document.getElementById('point-history-list').innerHTML = html || "아직 기록된 역사가 없습니다.";
        });

        function renameHero(oldName, email, oldNo) {
            const newNo = prompt(`'${oldName}' 용사의 새 번호를 입력하세요.`, oldNo);
            if (newNo === null) return;
            const newName = prompt(`'${oldName}' 용사의 새 이름을 입력하세요.`, oldName);
            if (!newName) return;
            db.ref('users/' + oldName).once('value', snap => {
                const userData = snap.val();
                userData.name = newName; userData.no = newNo;
                db.ref('users/' + newName).set(userData).then(() => {
                    db.ref('userEmails/' + email.replace(/\./g, ',')).set(newName);
                    if (oldName !== newName) db.ref('users/' + oldName).remove();
                    alert("정보 수정을 완료했습니다!");
                });
            });
        }

        function addItem() { 
            const cat = document.getElementById('item-cat-in').value;
            const n = document.getElementById('item-name-in').value, p = parseInt(document.getElementById('item-price-in').value); 
            if(n && p) db.ref('shop').push({category:cat, name:n, price:p}).then(() => { 
                alert("등록 완료!"); document.getElementById('item-name-in').value=""; document.getElementById('item-price-in').value=""; 
            }); 
        }
        function buyItem(id, name, price) { 
            db.ref('users/'+myName).once('value', sn => { 
                const u = sn.val(); if(!u || u.points < price) return alert("P가 부족합니다!"); 
                if(confirm(`${name}을(를) ${price}P에 구매하시겠습니까?`)) { 
                    updatePoint(myName, -price, `${name} 구매`);
                    db.ref('orders').push({ user: myName, item: name, status: '대기', time: new Date().toLocaleString() }); 
                    alert("구매 완료! 확인 대기 중."); 
                } 
            }); 
        }
        function approveOrder(id) { if(confirm("지급 완료 처리할까요?")) db.ref('orders/' + id).update({ status: '완료' }); }
        function saveSettings() { db.ref('settings').update({password:document.getElementById('conf-pass').value, lateTime:document.getElementById('conf-late').value, closeTime:document.getElementById('conf-close').value, routineText:document.getElementById('conf-routine').value}).then(()=>alert("저장 완료!")); }
        function saveGifts() { const list = document.getElementById('conf-gifts').value.split('\n').map(t=>t.trim()).filter(t=>t!==""); db.ref('settings').update({giftList: list}).then(()=>alert("선물 저장!")); }
        function openPopup(t, c, isR = false) { document.getElementById('pop-title').innerText=t; document.getElementById('pop-content').innerText=c; document.getElementById('common-overlay').style.display='flex'; window.routineActive = isR; }
        function closePopup() { if(window.routineActive) { rIdx++; if(rIdx < routineItems.length) { document.getElementById('pop-content').innerText = `다음 루틴: ${routineItems[rIdx]}`; } else { document.getElementById('common-overlay').style.display = 'none'; window.routineActive = false; } } else { document.getElementById('common-overlay').style.display = 'none'; } }
        function showTab(t) { document.querySelectorAll('.tab-content').forEach(s=>s.classList.remove('active')); document.querySelectorAll('.tab-menu button').forEach(b=>b.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active'); document.getElementById('btn-'+t).classList.add('active'); }
        function bulkReg() { document.getElementById('bulk-in').value.trim().split('\n').forEach(l => { const [n, e] = l.split(',').map(s=>s.trim()); if(n&&e) { db.ref('userEmails/'+e.replace(/\./g,',')).set(n); db.ref('users/'+n).update({name:n, email:e, points:0, exp:0, lv:1, no:""}); } }); alert("완료!"); }
    </script>
</body>
</html>
