<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-6 용사 본부</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --purple: #9b59b6; --bg: #ecf0f1; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 60px; font-size: 1.2rem; }
        #loading-screen { display: flex; justify-content: center; align-items: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); color: white; z-index: 3000; font-size: 1.8rem; }
        #login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--dark); padding: 20px; }
        .login-box { background: white; padding: 50px 40px; border-radius: 30px; text-align: center; width: 100%; max-width: 450px; }
        #main-app { display: none; }
        .tab-menu { display: flex; background: var(--dark); position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .tab-menu button { flex: 1; min-width: 95px; padding: 20px 10px; border: none; background: none; color: #95a5a6; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .tab-menu button.active { color: white; border-bottom: 5px solid var(--gold); }
        .tab-content { display: none; padding: 20px; max-width: 1200px; margin: auto; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; gap: 15px; font-size: 1.2rem; }
        input, button, textarea, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; font-size: 1.2rem; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .popup-box { background: white; padding: 30px; border-radius: 25px; width: 95%; max-width: 700px; display: flex; flex-direction: column; max-height: 85vh; }
        #pop-content { flex: 1; overflow-y: auto; margin: 20px 0; padding-right: 10px; text-align: left; }
        #pop-close-btn { background: var(--green); font-size: 1.4rem; padding: 18px; width: 100%; flex-shrink: 0; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 20px; margin-top: 20px; }
        .hero-card { background: white; border-radius: 20px; padding: 25px 15px; text-align: center; box-shadow: 0 6px 15px rgba(0,0,0,0.1); border: 3px solid transparent; position: relative; cursor: pointer; }
        .hero-card.me { border-color: var(--gold); background: #fffdf2; transform: scale(1.03); }
        .pixel-avatar { width: 64px; height: 64px; background-image: url('avatars.png'); background-repeat: no-repeat; background-size: 384px 64px; display: inline-block; image-rendering: pixelated; vertical-align: middle; }
        .avatar-lv1 { background-position: 0px 0px; } .avatar-lv5 { background-position: -64px 0px; } .avatar-lv10 { background-position: -128px 0px; } .avatar-lv15 { background-position: -192px 0px; } .avatar-lv20 { background-position: -256px 0px; } .avatar-lv30 { background-position: -320px 0px; }
        #roulette-box { font-size: 2rem; font-weight: bold; color: var(--purple); padding: 20px; border: 4px dashed var(--gold); margin: 20px 0; border-radius: 15px; background: #fffceb; text-align: center; }
        .lv-up-title { color: var(--gold); font-size: 2.5rem; text-shadow: 2px 2px var(--dark); text-align: center; width:100%; }
        .floating-btn { position: fixed; bottom: 25px; right: 25px; width: 85px; height: 85px; border-radius: 45px; background: var(--gold); color: var(--dark); box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 999; font-size: 2.2rem; display: none; align-items: center; justify-content: center; border: none; cursor: pointer; }
        .check-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; font-size: 1.3rem; }
        .check-item input[type="checkbox"] { width: 30px; height: 30px; margin-right: 15px; }
    </style>
</head>
<body>
    <div id="loading-screen">🏰 용사 본부 접속 중...</div>
    <div id="common-overlay" class="overlay"><div class="popup-box"><h2 id="pop-title" style="margin:0;">알림</h2><div id="pop-content"></div><button onclick="closePopup()" id="pop-close-btn">확인</button></div></div>
    <div id="point-popup" class="overlay"><div class="popup-box"><h2 id="point-pop-title" style="margin:0;">포인트 전령</h2><div id="point-pop-body" style="overflow-y:auto; flex:1;"></div><div style="display:flex; gap:15px; margin-top:20px;"><button onclick="closePointPopup()" style="background:#95a5a6; font-size: 1.3rem;">닫기</button><button id="point-apply-btn" style="background:var(--gold); color:var(--dark); font-size: 1.3rem;">지급하기</button></div></div></div>
    <div id="login-screen"><div class="login-box"><h1>🏰<br>6-6 용사 본부</h1><button onclick="handleLogin()" style="background:#4285F4; font-size: 1.5rem; padding: 22px;">Google 로그인</button></div></div>
    <div id="main-app">
        <nav class="tab-menu"><button id="btn-main" onclick="showTab('main')">🤺 용사들</button><button id="btn-shop" onclick="showTab('shop')">🛍️ 상점</button><button id="btn-guide" style="display:none;" onclick="showTab('guide')">📜 도감</button><button id="btn-checkin" onclick="showTab('checkin')">⚔️ 등교</button><button id="btn-logs" style="display:none;" onclick="showTab('logs')">📅 등교로그</button><button id="btn-points" onclick="showTab('points')">💰 연대기</button><button id="btn-admin" style="display:none;" onclick="showTab('admin')">🛡️ 관리</button></nav>
        <section id="tab-main" class="tab-content active"><div id="hero-grid" class="hero-grid"></div></section>
        <section id="tab-shop" class="tab-content"><div id="admin-shop-mgr" class="card" style="display:none; border:3px solid var(--purple);"><h3>📦 물품 등록</h3><select id="item-cat-in"><option value="🍕 먹거리">🍕 먹거리</option><option value="🎫 쿠폰">🎫 쿠폰</option><option value="🎲 뽑기">🎲 뽑기</option><option value="✏️ 학용품">✏️ 학용품</option><option value="✨ 기타">✨ 기타</option></select><input type="text" id="item-name-in" placeholder="상품명"><input type="number" id="item-price-in" placeholder="가격 (P)"><button onclick="addItem()" style="background:var(--purple);">진열</button></div><div class="card"><h2>🛍️ 용사 보급소</h2><div id="shop-list"></div></div><div id="admin-order-mgr" class="card" style="display:none; border:2.5px solid var(--red);"><h3>📜 사용 요청 목록</h3><div id="order-list"></div></div></section>
        <section id="tab-guide" class="tab-content"><div id="admin-guide-mgr" class="card" style="display:none; border:3px solid var(--primary);"><h3>📋 사유 등록</h3><input type="text" id="guide-title" placeholder="항목"><input type="number" id="guide-p" placeholder="P"><input type="number" id="guide-e" placeholder="E"><button onclick="addGuide()" style="background:var(--primary);">등록</button></div><div class="card"><h2>📜 포인트 도감</h2><div id="guide-list" class="hero-grid"></div></div></section>
        <section id="tab-checkin" class="tab-content"><div class="card"><h2>⚔️ 등교 확인</h2><div id="checkin-guide" style="font-weight:bold; font-size:1.4rem; margin-bottom:15px;"></div><input type="text" id="checkin-pass" placeholder="오늘의 암호" style="text-align:center;"><button onclick="submitCheckIn()" style="padding:25px; font-size:1.6rem;">본부 소환!</button></div></section>
        <section id="tab-logs" class="tab-content"><div class="card"><h2>📅 등교 기록부</h2><div style="margin-bottom:15px; display:flex; gap:10px; align-items:center;"><span style="font-weight:bold;">날짜:</span><input type="date" id="checkin-date-filter" style="flex:1; font-size:1.3rem; padding:10px;"></div><div id="checkin-history"></div></div></section>
        <section id="tab-points" class="tab-content"><div id="my-inventory" class="card"><h3>🎁 나의 인벤토리</h3><div id="my-coupon-list"></div></div><div class="card"><h3>📜 포인트 연대기</h3><div id="point-history-list"></div></div></section>
        <section id="tab-admin" class="tab-content"><div class="card"><h3>👥 명단 관리</h3><div id="student-admin-list"></div></div><div class="card"><h3>⚙️ 시스템 설정</h3>암호:<input type="text" id="conf-pass"> 지각:<input type="time" id="conf-late"> 마감:<input type="time" id="conf-close"> 루틴:<textarea id="conf-routine" rows="5"></textarea><button onclick="saveSettings()">저장</button></div><div class="card"><h3>🎁 레벨업 보상</h3><textarea id="conf-gifts" rows="5"></textarea><button onclick="saveGifts()">저장</button></div><div class="card"><h3>🆕 학생 일괄 등록</h3><textarea id="bulk-in" placeholder="이름,이메일" rows="4"></textarea><button onclick="bulkReg()">주입</button></div></section>
        <button id="floating-point-btn" class="floating-btn" onclick="openPointBulkPopup()">⚖️</button><button id="floating-score-btn" class="floating-btn" style="right: 140px;" onclick="openScorePopup()">🎯</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDWdWrw8LJ6tSiyF1X5tENJEvBfY-DzSw0", authDomain: "cs6-6class.firebaseapp.com", databaseURL: "https://cs6-6class-default-rtdb.firebaseio.com/", projectId: "cs6-6class", storageBucket: "cs6-6class.firebasestorage.app", messagingSenderId: "644235499537", appId: "1:644235499537:web:2ede2611f4ec6a3e8179b0" };
        const adminEmail = "ksosuny@cberi.go.kr";
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(); const auth = firebase.auth(); const provider = new firebase.auth.GoogleAuthProvider();
        let myName = "", isAdmin = false, currentUsers = [], allLogs = [], giftList = [], rIdx = 0, routineItems = [];
        let currentTab = sessionStorage.getItem('activeTab') || 'main';

        function getAvatar(lv) { let lvClass = lv >= 30 ? "avatar-lv30" : lv >= 20 ? "avatar-lv20" : lv >= 15 ? "avatar-lv15" : lv >= 10 ? "avatar-lv10" : lv >= 5 ? "avatar-lv5" : "avatar-lv1"; return `<div class="pixel-avatar ${lvClass}"></div>`; }

        auth.onAuthStateChanged((user) => {
            if (user) {
                isAdmin = (user.email.toLowerCase() === adminEmail.toLowerCase());
                const eKey = user.email.replace(/\./g, ',');
                db.ref('userEmails/' + eKey).once('value', snap => {
                    if (snap.exists() || isAdmin) {
                        myName = snap.val() || "총사령관";
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('main-app').style.display = 'block';
                        if(isAdmin) { ['floating-point-btn', 'floating-score-btn', 'btn-guide', 'btn-logs', 'btn-admin'].forEach(id => { const el = document.getElementById(id); if(el) el.style.display = id.includes('btn') ? 'block' : 'flex'; }); }
                        startApp(); showTab(currentTab); document.getElementById('loading-screen').style.display = 'none';
                    } else { alert("미등록!"); auth.signOut(); }
                });
            } else { document.getElementById('loading-screen').style.display = 'none'; document.getElementById('login-screen').style.display = 'flex'; document.getElementById('main-app').style.display = 'none'; }
        });

        function handleLogin() { auth.signInWithPopup(provider); }
        function showTab(t) { currentTab = t; sessionStorage.setItem('activeTab', t); document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active')); document.querySelectorAll('.tab-menu button').forEach(b => b.classList.remove('active')); if(document.getElementById('tab-'+t)) document.getElementById('tab-'+t).classList.add('active'); if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.add('active'); }

        function startApp() {
            // [날짜 설정]
            const dateInput = document.getElementById('checkin-date-filter');
            const todayStr = new Date().toISOString().split('T')[0];
            if(dateInput && !dateInput.value) { dateInput.value = todayStr; dateInput.onchange = () => renderCheckinBoard(); }

            // [경험치 실시간 감시 - 레벨업 팝업 전용]
            db.ref('users/' + myName).on('value', snap => {
                const u = snap.val(); if(!u) return;
                const newLv = u.lv || 1;
                if (window.myOldLv && window.myOldLv < newLv) { triggerLevelUpRoulette(myName, newLv); }
                window.myOldLv = newLv;
            });

            db.ref('pointLogs').on('value', snap => { allLogs = []; snap.forEach(c => { if(c.val()) allLogs.push(c.val()); }); renderHistory(); });
            db.ref('settings').on('value', snap => {
                const s = snap.val() || {}; giftList = s.giftList || [];
                document.getElementById('conf-pass').value = s.password || "";
                document.getElementById('conf-late').value = s.lateTime || "08:40";
                document.getElementById('conf-close').value = s.closeTime || "09:00";
                document.getElementById('conf-routine').value = s.routineText || "";
                document.getElementById('conf-gifts').value = giftList.join('\n');
                routineItems = (s.routineText || "").split('\n').filter(t => t.trim() !== "");
                document.getElementById('checkin-guide').innerText = `✅ 정상: ~${s.lateTime} | ⚠️ 지각: ~${s.closeTime}`;
            });

            db.ref('users').on('value', snap => {
                let users = []; snap.forEach(c => { let u = c.val(); if(u){ u.name = u.name || c.key; users.push(u); }});
                users.sort((a, b) => (parseInt(a.no) || 999) - (parseInt(b.no) || 999));
                currentUsers = users;
                let gH = "", aH = "";
                users.forEach(u => {
                    const isMe = (u.name === myName);
                    const clickAction = (isMe || isAdmin) ? `onclick="openUserHistory('${u.name}')"` : `onclick="alert('비밀입니다!')"`;
                    gH += `<div class="hero-card ${isMe?'me':''}" ${clickAction}><span class="card-avatar">${getAvatar(u.lv||1)}</span><div class="card-name">LV.${u.lv||1} ${u.name}</div><div class="card-pt">${u.points||0}P</div></div>`;
                    aH += `<div class="list-item"><div style="display:flex; gap:10px; flex:1;"><input type="number" class="edit-no" value="${u.no||''}" style="width:70px; margin:0;" data-old="${u.name}"><input type="text" class="edit-name" value="${u.name}" style="width:110px; margin:0;" data-old="${u.name}"></div><button onclick="updateHeroInfo('${u.name}')" style="width:auto; padding:10px; margin:0;">저장</button><button onclick="deleteHero('${u.name}', '${u.email||''}')" style="background:var(--red); width:auto; padding:10px; margin:0;">삭제</button></div>`;
                });
                document.getElementById('hero-grid').innerHTML = gH;
                document.getElementById('student-admin-list').innerHTML = aH;
                renderCheckinBoard();
            });

            const renderCheckinBoard = () => {
                const targetDate = document.getElementById('checkin-date-filter').value;
                const isToday = (targetDate === todayStr);
                db.ref('checkinLogs').once('value', logSnap => {
                    const logs = {}; logSnap.forEach(c => { const l = c.val(); if(l.date === targetDate) logs[l.name] = l; else if(isToday && !l.date && l.time && (l.time.includes('오전') || l.time.includes('오후'))) logs[l.name] = l; });
                    let hH = "";
                    currentUsers.forEach(u => {
                        const log = logs[u.name]; let color = "#f1c40f", txt = "미등교", time = "-";
                        if (log) { time = log.time || ""; if (log.result.includes('정상')) { color = "var(--green)"; txt = "정상"; } else { color = "var(--red)"; txt = log.result; } }
                        hH += `<div class="list-item" style="border-left:15px solid ${color};"><span>${u.no}. <strong>${u.name}</strong></span><b>${txt}</b><span>${time}</span></div>`;
                    });
                    document.getElementById('checkin-history').innerHTML = hH || "기록 없음";
                });
            };
            db.ref('checkinLogs').on('value', () => renderCheckinBoard());
            db.ref('shop').on('value', snap => {
                let sH = ""; snap.forEach(c => { const i = c.val(); sH += `<div class="list-item"><span>${i.category} | ${i.name} (${i.price}P)</span><button onclick="buyItem('${c.key}', '${i.name}', ${i.price})" style="width:auto;">구매</button>${isAdmin?`<button onclick="deleteShopItem('${c.key}')" style="background:red; width:auto;">삭제</button>`:''}</div>`; });
                document.getElementById('shop-list').innerHTML = sH || "비어있음";
            });
            db.ref('guides').on('value', snap => {
                let gH = ""; snap.forEach(c => { const g = c.val(); gH += `<div class="hero-card" onclick="openGuidePayPopup('${g.title}', ${g.p}, ${g.e})"><strong>${g.title}</strong><br><small>${g.p}P / ${g.e}E</small>${isAdmin?`<button onclick="event.stopPropagation(); deleteGuide('${c.key}')" style="background:red; font-size:0.8rem; padding:5px; margin-top:10px;">삭제</button>`:''}</div>`; });
                document.getElementById('guide-list').innerHTML = gH || "항목 없음";
            });
            if (isAdmin) { ['admin-shop-mgr', 'admin-order-mgr', 'admin-guide-mgr'].forEach(id => { const el = document.getElementById(id); if(el) el.style.display = 'block'; }); }
        }

        function triggerLevelUpRoulette(userName, newLv) {
            if (giftList.length === 0 || !giftList[0]) { openPopup("🎊 레벨업!", `<b>${userName}</b> 용사, 레벨 <b>${newLv}</b> 달성!`); return; }
            document.getElementById('pop-title').innerHTML = `<span class="lv-up-title">🎊 LEVEL UP! 🎊</span>`;
            document.getElementById('pop-content').innerHTML = `<div style="text-align:center;"><p style="font-size:1.5rem;"><b>${userName}</b> 용사, 레벨 <b>${newLv}</b> 달성!</p><div id="roulette-box">보상 탐색...</div></div>`;
            document.getElementById('pop-close-btn').style.display = 'none'; document.getElementById('common-overlay').style.display = 'flex';
            let count = 0; const interval = setInterval(() => {
                document.getElementById('roulette-box').innerText = giftList[Math.floor(Math.random() * giftList.length)];
                count++; if (count > 15) {
                    clearInterval(interval); const finalGift = giftList[Math.floor(Math.random() * giftList.length)];
                    document.getElementById('roulette-box').innerText = "⭐ " + finalGift + " ⭐"; document.getElementById('pop-close-btn').style.display = 'block';
                    if (userName === myName) db.ref('pointLogs').push({ name: userName, amount: 0, reason: `🎁 LV.${newLv} 보상 당첨: [${finalGift}]`, time: new Date().toLocaleString() });
                }
            }, 100);
        }

        function addScore(name, p, e, reason) {
            db.ref('users/'+name).once('value', sn => {
                const u = sn.val(); if(!u) return;
                let nE=(u.exp||0)+e, nL=(u.lv||1), nP=(u.points||0)+p;
                while(nE >= 100){ nL++; nE -= 100; }
                db.ref('users/'+name).update({exp:nE, lv:nL, points:nP});
                db.ref('pointLogs').push({name, amount:p, reason, time: new Date().toLocaleString()});
            });
        }

        function openGuidePayPopup(title, p, e) {
            if(!isAdmin) return alert("도감 항목: " + title);
            let html = `<div style="padding:10px; border-bottom:2px solid var(--primary); margin-bottom:15px;"><h3 style="margin:0;">사유: ${title}</h3><label><input type="checkbox" id="check-all" onclick="toggleAllCheck(this)"> <b>전체 선택</b></label></div>`;
            currentUsers.forEach(u => { html += `<div class="check-item"><input type="checkbox" class="student-checkbox" value="${u.name}"><span>${u.no}. ${u.name}</span></div>`; });
            document.getElementById('point-pop-title').innerText = "⚖️ 일괄 지급"; document.getElementById('point-pop-body').innerHTML = html;
            document.getElementById('point-apply-btn').onclick = () => {
                const selected = Array.from(document.querySelectorAll('.student-checkbox:checked')).map(cb => cb.value);
                if(selected.length === 0) return alert("용사를 선택하세요!");
                selected.forEach(name => addScore(name, p, e, title)); alert("완료!"); closePointPopup();
            };
            document.getElementById('point-popup').style.display = 'flex';
        }
        function toggleAllCheck(m) { document.querySelectorAll('.student-checkbox').forEach(cb => cb.checked = m.checked); }
        function deleteGuide(key) { if(confirm("삭제?")) db.ref('guides/'+key).remove(); }
        function deleteShopItem(key) { if(confirm("삭제?")) db.ref('shop/'+key).remove(); }
        function renderHistory() { let html = ""; [...allLogs].reverse().forEach(l => { if (isAdmin || l.name === myName) { const color = l.amount > 0 ? "var(--green)" : (l.amount < 0 ? "var(--red)" : "#888"); html += `<div class="list-item" style="border-left:10px solid ${color}"><span><strong>${l.name}</strong></span><strong style="color:${color}">${l.amount>0?'+':''}${l.amount}P</strong><br><small>${l.reason} (${l.time})</small></div>`; } }); document.getElementById('point-history-list').innerHTML = html || "기록 없음"; }
        function openUserHistory(userName) { const userLogs = allLogs.filter(l => l.name === userName).reverse(); let html = `<div style="text-align:left; font-size:1.15rem;">`; userLogs.forEach(l => { const color = l.amount > 0 ? "var(--green)" : (l.amount < 0 ? "var(--red)" : "#888"); html += `<div class="list-item" style="border-left:10px solid ${color}; background:#f9f9f9; padding:15px; margin-bottom:10px; border-radius:15px;"><div><strong>${l.reason}</strong><br><small>${l.time}</small></div><strong style="color:${color}">${l.amount>0?'+':''}${l.amount}P</strong></div>`; }); html += `</div>`; openPopup(`${userName} 연대기`, html); }
        function submitCheckIn() { const pw = document.getElementById('checkin-pass').value; db.ref('settings').once('value', snap => { const s = snap.val(); if(pw !== s.password) return alert("암호 오류!"); const now = new Date(); const dateStr = now.toISOString().split('T')[0]; const curT = now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0'); let res = "정상 등교", penalty = 0; if(curT > s.lateTime) { const [lh, lm] = s.lateTime.split(':').map(Number); const diff = (now.getHours()*60+now.getMinutes())-(lh*60+lm); penalty = -diff; res = `지각(${diff}분)`; } updatePoint(myName, penalty, res); db.ref('checkinLogs').push({ name: myName, result: res, time: now.toLocaleTimeString('ko-KR'), date: dateStr }); rIdx = 0; if(routineItems.length > 0) openPopup("✨ 성공", `[루틴]\n1단계: ${routineItems[0]}`, true); else openPopup("🎊 완료", "등교 완료!"); document.getElementById('checkin-pass').value = ""; }); }
        function updatePoint(n, a, r) { db.ref('users/'+n).once('value', sn => { if(sn.val()) db.ref('users/'+n).update({points: (sn.val().points||0)+a}); db.ref('pointLogs').push({name:n, amount:a, reason:r, time:new Date().toLocaleString()}); }); }
        function approveOrder(id) { if(confirm("승인?")) db.ref('orders/'+id).update({status:'완료'}); }
        function buyItem(k, n, p) { db.ref('users/'+myName).once('value', sn => { if((sn.val().points||0) < p) return alert("P 부족!"); updatePoint(myName, -p, n+" 구매"); db.ref('orders').push({user:myName, item:n, status:'대기', time:new Date().toLocaleString()}); }); }
        function updateHeroInfo(oldN) { const list = document.querySelectorAll('#student-admin-list .list-item'); let nNo = "", nN = ""; list.forEach(i => { const nameInp = i.querySelector('.edit-name'); if(nameInp.dataset.old === oldN) { nNo = i.querySelector('.edit-no').value; nN = nameInp.value; } }); db.ref('users/'+oldN).once('value', sn => { let d = sn.val(); d.no = nNo; d.name = nN; db.ref('users/'+nN).set(d).then(() => { if(oldN!==nN) { db.ref('users/'+oldN).remove(); db.ref('userEmails').once('value', es => { es.forEach(e => { if(e.val()===oldN) db.ref('userEmails/'+e.key).set(nN); }); }); } alert("저장 완료!"); }); }); }
        function deleteHero(n, e) { if(confirm("삭제?")) { db.ref('users/'+n).remove(); if(e) db.ref('userEmails/'+e.replace(/\./g,',')).remove(); } }
        function saveSettings() { db.ref('settings').update({password: document.getElementById('conf-pass').value, lateTime: document.getElementById('conf-late').value, closeTime: document.getElementById('conf-close').value, routineText: document.getElementById('conf-routine').value}).then(()=>alert("저장됨!")); }
        function saveGifts() { db.ref('settings').update({giftList: document.getElementById('conf-gifts').value.split('\n')}).then(()=>alert("보상 저장됨!")); }
        function addItem() { const c=document.getElementById('item-cat-in').value, n=document.getElementById('item-name-in').value, p=parseInt(document.getElementById('item-price-in').value); if(n&&p) { db.ref('shop').push({category:c, name:n, price:p}).then(()=> { alert("진열 완료!"); document.getElementById('item-name-in').value=""; document.getElementById('item-price-in').value=""; }); } }
        function addGuide() { const t=document.getElementById('guide-title').value, p=parseInt(document.getElementById('guide-p').value)||0, e=parseInt(document.getElementById('guide-e').value)||0; if(t) db.ref('guides').push({title:t, p, e}).then(()=> { alert("등록됨!"); document.getElementById('guide-title').value=""; }); }
        function openPopup(t, h, isR=false) { document.getElementById('pop-title').innerHTML = t; document.getElementById('pop-content').innerHTML = h; document.getElementById('common-overlay').style.display='flex'; window.routineActive=isR; document.getElementById('pop-content').scrollTop = 0; }
        function closePopup() { if(window.routineActive) { rIdx++; if(rIdx < routineItems.length) document.getElementById('pop-content').innerText = `다음: ${routineItems[rIdx]}`; else document.getElementById('common-overlay').style.display = 'none'; } else document.getElementById('common-overlay').style.display = 'none'; }
        function openPointBulkPopup() { let html = `<input type="text" id="pop-bulk-reason" placeholder="사유"><div style="margin-top:15px;">`; currentUsers.forEach(u => { html += `<div class="list-item"><span>${u.no}. ${u.name}</span><div>P <input type="number" class="pop-bulk-p pop-score-input" data-name="${u.name}"> E <input type="number" class="pop-bulk-e pop-score-input" data-name="${u.name}"></div></div>`; }); html += `</div>`; document.getElementById('point-pop-body').innerHTML = html; document.getElementById('point-apply-btn').onclick = () => { const r = document.getElementById('pop-bulk-reason').value; if(!r) return alert("사유!"); document.querySelectorAll('.pop-bulk-p').forEach((pI, i) => { const p=parseInt(pI.value)||0, e=parseInt(document.querySelectorAll('.pop-bulk-e')[i].value)||0; if(p||e) addScore(pI.dataset.name, p, e, r); }); closePointPopup(); }; document.getElementById('point-popup').style.display = 'flex'; }
        function openScorePopup() { let html = `<div>`; currentUsers.forEach(u => { html += `<div class="list-item"><span>${u.no}. ${u.name}</span><div>P <input type="number" class="pop-one-p pop-score-input"> E <input type="number" class="pop-one-e pop-score-input"><button onclick="applyOneS('${u.name}', ${currentUsers.indexOf(u)})" style="width:auto;">OK</button></div></div>`; }); html += `</div>`; document.getElementById('point-pop-body').innerHTML = html; document.getElementById('point-apply-btn').style.display = 'none'; document.getElementById('point-popup').style.display = 'flex'; }
        function applyOneS(n, idx) { const p=parseInt(document.querySelectorAll('.pop-one-p')[idx].value)||0, e=parseInt(document.querySelectorAll('.pop-one-e')[idx].value)||0; addScore(n, p, e, "개별 지급"); alert(n + " 완료!"); }
        function closePointPopup() { document.getElementById('point-popup').style.display = 'none'; document.getElementById('point-apply-btn').style.display = 'block'; }
        function bulkReg() { const txt = document.getElementById('bulk-in').value; if(!txt) return; txt.split('\n').forEach(l => { const [n, e] = l.split(',').map(s=>s.trim()); if(n&&e) { db.ref('userEmails/'+e.replace(/\./g,',')).set(n); db.ref('users/'+n).update({name:n, email:e, points:0, exp:0, lv:1, no:""}); } }); alert("주입 완료!"); }
    </script>
</body>
</html>
