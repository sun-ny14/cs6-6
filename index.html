<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-6 용사 본부</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --purple: #9b59b6; --bg: #ecf0f1; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 50px; }
        #login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--dark); padding: 20px; box-sizing: border-box; }
        .login-box { background: white; padding: 40px 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 350px; }
        #main-app { display: none; }
        .tab-menu { display: flex; background: var(--dark); position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .tab-menu button { flex: 1; min-width: 70px; padding: 15px 5px; border: none; background: none; color: #95a5a6; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .tab-menu button.active { color: white; border-bottom: 4px solid var(--gold); }
        .tab-content { display: none; padding: 15px; max-width: 1000px; margin: auto; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 15px; }
        .hero-card { background: white; border-radius: 12px; padding: 15px 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 2px solid transparent; position: relative; }
        .hero-card.me { border-color: var(--gold); background: #fffdf2; transform: scale(1.02); }
        .card-lv { font-size: 0.75rem; background: var(--dark); color: white; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        .card-avatar { font-size: 3rem; margin-bottom: 8px; display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input, button, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .popup-box { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; text-align: center; max-height: 85vh; overflow-y: auto; }
        .student-chip { display: inline-block; padding: 8px 12px; margin: 4px; border-radius: 20px; border: 1px solid #ddd; cursor: pointer; font-size: 0.9rem; }
        .student-chip.selected { background: var(--gold); border-color: var(--dark); font-weight: bold; }
        .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .preset-card { background: #f9f9f9; padding: 15px; border-radius: 10px; border: 2px dashed #ccc; cursor: pointer; text-align: center; }
        .preset-card:hover { border-color: var(--primary); background: #eef7ff; }
        .gift-box { font-size: 5rem; cursor: pointer; transition: transform 0.3s; }
        .gift-box:hover { transform: scale(1.2) rotate(5deg); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="common-overlay" class="overlay">
        <div class="popup-box"><h2 id="pop-title">알림</h2><div id="pop-content" style="margin-bottom: 20px; white-space: pre-wrap;"></div><button onclick="closePopup()">확인</button></div>
    </div>

    <div id="level-up-overlay" class="overlay">
        <div class="popup-box">
            <h1 style="color:var(--gold);">🎊 LEVEL UP! 🎊</h1>
            <p>축하합니다! 새로운 레벨에 도달했습니다.</p>
            <div id="gift-animation-area">
                <div class="gift-box" onclick="openGift()">🎁</div>
                <p>상자를 클릭하여 보상을 확인하세요!</p>
            </div>
            <div id="gift-result-area" style="display:none;">
                <h2 id="gift-name" style="color:var(--purple);">보상 이름</h2>
                <button onclick="closeGiftPopup()" style="background:var(--dark);">본부로 복귀</button>
            </div>
        </div>
    </div>

    <div id="point-modal" class="overlay">
        <div class="popup-box" style="text-align: left;">
            <h2 id="modal-title" style="text-align: center;">⚡ 포인트 하사</h2>
            <div id="preset-area" class="preset-grid"></div>
            <hr>
            <div id="custom-input-area">
                <div style="display: flex; gap: 5px;">
                    <input type="number" id="m-p-val" placeholder="P"><input type="number" id="m-e-val" placeholder="EXP">
                </div>
                <input type="text" id="m-reason" placeholder="사유 입력 (예: 배움노트 제출)">
            </div>
            <p style="font-size:0.8rem; color:#666; margin-top:10px;">대상 용사 선택:</p>
            <div id="modal-student-list" style="max-height: 200px; overflow-y: auto; border: 1px solid #eee; padding: 5px; border-radius: 8px;"></div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button onclick="applyPoints()" style="background:var(--gold); color:var(--dark);">지급하기</button>
                <button onclick="document.getElementById('point-modal').style.display='none'" style="background:#95a5a6;">취소</button>
            </div>
        </div>
    </div>

    <div id="login-screen">
        <div class="login-box">
            <h1>🏰<br>6-6 용사 본부</h1>
            <button onclick="handleLogin()" style="background:#4285F4; padding:15px; font-size:1.1rem; border-radius:10px;">Google 로그인</button>
        </div>
    </div>

    <div id="main-app">
        <nav class="tab-menu">
            <button id="btn-main" class="active" onclick="showTab('main')">🤺 용사들</button>
            <button id="btn-jobs" onclick="showTab('jobs')">💼 직업</button>
            <button id="btn-shop" onclick="showTab('shop')">🛍️ 상점</button>
            <button id="btn-checkin" onclick="showTab('checkin')">⚔️ 등교</button>
            <button id="btn-points" onclick="showTab('points')">💰 포인트</button>
            <button id="btn-admin" onclick="showTab('admin')" style="display:none;">🛡️ 관리</button>
        </nav>

        <section id="tab-main" class="tab-content active"><div id="hero-grid" class="hero-grid"></div></section>

        <section id="tab-jobs" class="tab-content">
            <div id="admin-job-mgr" class="card" style="display:none; border:2px solid var(--purple);">
                <h3>🆕 직업 등록</h3>
                <input type="text" id="job-name-in" placeholder="직업명 (예: 전사)">
                <textarea id="job-desc-in" placeholder="설명 및 혜택"></textarea>
                <button onclick="addJob()" style="background:var(--purple);">등록</button>
            </div>
            <div class="card"><h2>💼 직업 도감</h2><div id="job-list-display"></div></div>
        </section>

        <section id="tab-shop" class="tab-content">
            <div id="admin-shop-mgr" class="card" style="display:none; border:2px solid var(--purple);">
                <h3>📦 물품 등록</h3>
                <input type="text" id="item-name-in" placeholder="상품명">
                <input type="number" id="item-price-in" placeholder="가격 (P)">
                <button onclick="addItem()" style="background:var(--purple);">진열</button>
            </div>
            <div class="card"><h2>🛍️ 용사 보급소</h2><div id="shop-list"></div></div>
        </section>

        <section id="tab-checkin" class="tab-content">
            <div class="card"><h2>⚔️ 등교 확인</h2><div id="checkin-guide" style="margin-bottom:10px; font-weight:bold;"></div><input type="text" id="checkin-pass" placeholder="오늘의 암호"><button onclick="submitCheckIn()" style="padding:15px; font-size:1.1rem;">본부 소환!</button></div>
            <div id="admin-checkin-log" style="display:none;" class="card"><h3>📅 오늘의 등교 현황</h3><div id="checkin-list-area"></div></div>
        </section>

        <section id="tab-points" class="tab-content">
            <div id="admin-p-area" style="display:none; flex-direction:column; gap:10px;">
                <div class="card" style="border:2px solid var(--gold);">
                    <h3>⚙️ 자주 쓰는 포인트 설정</h3>
                    <div style="display:flex; gap:5px;"><input type="text" id="pre-name" placeholder="항목명"><input type="number" id="pre-p" placeholder="P" style="width:60px;"><input type="number" id="pre-e" placeholder="E" style="width:60px;"></div>
                    <button onclick="savePreset()" style="background:var(--gold); color:var(--dark);">프리셋 저장</button>
                </div>
                <button onclick="openPointModal()" style="padding:20px; font-size:1.2rem; background:var(--primary);">⚡ 포인트 지급 모드 실행</button>
            </div>
        </section>

        <section id="tab-admin" class="tab-content">
            <div class="card"><h3>⚙️ 시스템 설정</h3>암호:<input type="text" id="conf-pass"> 지각:<input type="time" id="conf-late"> 마감:<input type="time" id="conf-close"> 루틴:<textarea id="conf-routine"></textarea><button onclick="saveSettings()">저장</button></div>
            <div class="card"><h3>👥 명단 관리</h3><div id="student-admin-list"></div></div>
        </section>
    </div>

    <script>
    // 1. 초기화
    const firebaseConfig = {
        apiKey: "AIzaSyDWdWrw8LJ6tSiyF1X5tENJEvBfY-DzSw0",
        authDomain: "cs6-6class.firebaseapp.com",
        databaseURL: "https://cs6-6class-default-rtdb.firebaseio.com/", 
        projectId: "cs6-6class",
        storageBucket: "cs6-6class.firebasestorage.app",
        messagingSenderId: "644235499537",
        appId: "1:644235499537:web:2ede2611f4ec6a3e8179b0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });

    const adminEmail = "ksosuny@cberi.go.kr";
    let myName = "", isAdmin = false, myData = {};

    // 2. 로그인 & 권한
    function handleLogin() { auth.signInWithPopup(provider).catch(e => auth.signInWithRedirect(provider)); }
    auth.onAuthStateChanged(user => {
        if (user) {
            isAdmin = (user.email.toLowerCase() === adminEmail.toLowerCase());
            const eKey = user.email.replace(/\./g, ',');
            db.ref('userEmails/' + eKey).once('value', sn => {
                if (sn.exists() || isAdmin) { myName = sn.val() || "총사령관"; startApp(); }
                else { alert("미등록 계정"); auth.signOut(); }
            });
        } else { document.getElementById('login-screen').style.display='flex'; document.getElementById('main-app').style.display='none'; }
    });

    // 3. 메인 로직
    function startApp() {
        document.getElementById('login-screen').style.display='none';
        document.getElementById('main-app').style.display='block';
        if (isAdmin) {
            document.getElementById('btn-admin').style.display='block';
            document.getElementById('admin-p-area').style.display='flex';
            document.getElementById('admin-job-mgr').style.display='block';
            document.getElementById('admin-shop-mgr').style.display='block';
            document.getElementById('admin-checkin-log').style.display='block';
        }

        // 실시간 사용자 정보 감시 (레벨업 체크 포함)
        db.ref('users/' + myName).on('value', sn => {
            const newData = sn.val();
            if(!isAdmin && myData.lv && newData.lv > myData.lv) {
                showLevelUpPopup(newData.lv);
            }
            myData = newData || {};
        });

        // 용사들 목록
        db.ref('users').on('value', sn => {
            let list = [], gH = "", aH = "";
            sn.forEach(c => list.push(c.val()));
            list.sort((a,b)=>(a.no||999)-(b.no||999));
            list.forEach(u => {
                gH += `<div class="hero-card ${u.name===myName?'me':''}">
                    <span class="card-lv">LV.${u.lv}</span>
                    <span class="card-avatar">🥚</span><div class="card-name"><b>${u.name}</b></div>
                    <div style="color:var(--primary); font-weight:bold;">${u.points||0} P / ${u.exp||0}%</div>
                </div>`;
                if(isAdmin) aH += `<div class="card">${u.no}. ${u.name} <button onclick="deleteHero('${u.name}')" style="background:red; width:auto;">삭제</button></div>`;
            });
            document.getElementById('hero-grid').innerHTML = gH;
            if(isAdmin) document.getElementById('student-admin-list').innerHTML = aH;
        });

        loadPresets(); loadShop(); loadJobs();
    }

    // 4. 포인트 프리셋 기능
    function savePreset() {
        const n = document.getElementById('pre-name').value;
        const p = parseInt(document.getElementById('pre-p').value)||0;
        const e = parseInt(document.getElementById('pre-e').value)||0;
        if(!n) return;
        db.ref('presets').push({n, p, e}).then(() => { alert("저장됨!"); loadPresets(); });
    }

    function loadPresets() {
        db.ref('presets').on('value', sn => {
            let h = "";
            sn.forEach(c => {
                const v = c.val();
                h += `<div class="preset-card" onclick="setPreset('${v.n}', ${v.p}, ${v.e})">
                    <b>${v.n}</b><br><small>${v.p}P / ${v.e}E</small>
                </div>`;
            });
            document.getElementById('preset-area').innerHTML = h;
        });
    }

    function setPreset(n, p, e) {
        document.getElementById('m-p-val').value = p;
        document.getElementById('m-e-val').value = e;
        document.getElementById('m-reason').value = n;
    }

    function openPointModal() {
        document.getElementById('point-modal').style.display='flex';
        db.ref('users').once('value', sn => {
            let h = "";
            sn.forEach(c => { h += `<div class="student-chip" onclick="this.classList.toggle('selected')" data-name="${c.key}">${c.key}</div>`; });
            document.getElementById('modal-student-list').innerHTML = h;
        });
    }

    async function applyPoints() {
        const p = parseInt(document.getElementById('m-p-val').value)||0;
        const e = parseInt(document.getElementById('m-e-val').value)||0;
        const r = document.getElementById('m-reason').value;
        const selected = document.querySelectorAll('.student-chip.selected');
        if(!r || selected.length === 0) return alert("사유와 대상을 선택하세요!");

        for(let chip of selected) {
            const name = chip.dataset.name;
            const sn = await db.ref('users/'+name).once('value');
            const u = sn.val();
            let nP = (u.points||0)+p, nE = (u.exp||0)+e, nL = (u.lv||1);
            while(nE>=100){ nL++; nE-=100; }
            await db.ref('users/'+name).update({points:nP, exp:nE, lv:nL});
            await db.ref('pointLogs').push({name, pAmt:p, eAmt:e, reason:r, time:new Date().toLocaleString()});
        }
        document.getElementById('point-modal').style.display='none';
        alert("하사 완료!");
    }

    // 5. 레벨업 깜짝 선물
    const gifts = ["💎 전설의 보물상자", "🎫 면제권 1매", "🍬 사탕 주머니", "⚔️ 전설의 무기", "🛡️ 수호의 방패"];
    function showLevelUpPopup(lv) {
        document.getElementById('level-up-overlay').style.display='flex';
        document.getElementById('gift-animation-area').style.display='block';
        document.getElementById('gift-result-area').style.display='none';
    }
    function openGift() {
        const gift = gifts[Math.floor(Math.random()*gifts.length)];
        document.getElementById('gift-name').innerText = gift;
        document.getElementById('gift-animation-area').style.display='none';
        document.getElementById('gift-result-area').style.display='block';
        // 로그에 기록
        db.ref('pointLogs').push({name:myName, reason:"🎁 레벨업 보상: " + gift, time:new Date().toLocaleString()});
    }
    function closeGiftPopup() { document.getElementById('level-up-overlay').style.display='none'; }

    // 6. 상점 & 직업 복구
    function addItem() {
        const n = document.getElementById('item-name-in').value;
        const p = document.getElementById('item-price-in').value;
        if(n&&p) db.ref('shop').push({n, p}).then(()=>alert("진열됨"));
    }
    function loadShop() {
        db.ref('shop').on('value', sn => {
            let h = "";
            sn.forEach(c => { const v=c.val(); h+=`<div class="list-item"><b>${v.n}</b> <span>${v.p}P</span></div>`; });
            document.getElementById('shop-list').innerHTML = h || "상점이 텅 비었습니다.";
        });
    }
    function addJob() {
        const n = document.getElementById('job-name-in').value;
        const d = document.getElementById('job-desc-in').value;
        if(n&&d) db.ref('jobs').push({n, d}).then(()=>alert("등록됨"));
    }
    function loadJobs() {
        db.ref('jobs').on('value', sn => {
            let h = "";
            sn.forEach(c => { const v=c.val(); h+=`<div class="card"><b>${v.n}</b><p>${v.d}</p></div>`; });
            document.getElementById('job-list-display').innerHTML = h || "직업이 없습니다.";
        });
    }

    // 탭 전환 및 기타
    function showTab(t) {
        document.querySelectorAll('.tab-content').forEach(s=>s.classList.remove('active'));
        document.querySelectorAll('.tab-menu button').forEach(b=>b.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
        document.getElementById('btn-'+t).classList.add('active');
    }
    function closePopup() { document.getElementById('common-overlay').style.display='none'; }
    </script>
</body>
</html>
